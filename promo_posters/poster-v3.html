<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<title>WorkHive Promo · Mascot Spotlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="poster-kit.css">
<style>
  .poster{background:radial-gradient(720px 600px at 50% 40%,#263a58 0%,#16294a 44%,#0d1a30 74%,#091324 100%)}
  .blob.a{left:50%;top:34%;transform:translate(-50%,-50%);width:720px;height:720px;opacity:.85}
  .vignette{background:radial-gradient(90% 90% at 50% 42%,transparent 46%,rgba(5,9,18,.66) 100%)}
  .spot{left:50%;top:340px;transform:translate(-50%,-50%);width:640px;height:640px}

  .wh-logo{position:absolute;left:82px;top:64px;height:58px;z-index:8}

  .halo{position:absolute;left:50%;top:344px;transform:translate(-50%,-50%);z-index:4;width:720px;height:720px}
  .halo svg{width:100%;height:100%;overflow:visible}
  .halo .r1{fill:none;stroke:rgba(247,168,37,.42);stroke-width:2.5}
  .halo .r2{fill:none;stroke:rgba(41,182,246,.34);stroke-width:2.5}
  .halo .dot{fill:rgba(247,168,37,.9)}
  .halo .dotc{fill:rgba(41,182,246,.9)}

  .beeaura{left:50%;top:344px;transform:translate(-50%,-50%);width:500px;height:500px}
  .bee{left:50%;top:52px;transform:translateX(-50%);width:452px;height:512px;z-index:25}

  .ocell{position:absolute;z-index:20;width:92px;height:104px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:linear-gradient(160deg,rgba(28,44,68,.97),rgba(14,24,40,.97));box-shadow:0 6px 14px rgba(0,0,0,.4),0 16px 34px rgba(0,0,0,.5)}
  .ocell .ring{position:absolute;inset:0;clip-path:inherit;background:linear-gradient(160deg,var(--amber),var(--cyan)) border-box;
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:2px;opacity:.8}
  .ocell svg{width:26px;height:26px;stroke:var(--amber-lt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:2}
  .ocell.c svg{stroke:var(--cyan-lt)}
  .ocell .nm{position:relative;z-index:2;font-size:10.5px;font-weight:700;color:#e9f0f7}

  .stage{position:absolute;left:0;right:0;top:596px;z-index:26;text-align:center}
  .stage .eyebrow{margin-bottom:16px}
  .stage .h1{font-size:50px}
  .stage .lede{font-size:18px;margin:15px auto 0;max-width:700px}
  .stage .cta{margin-top:24px}
  .stage .url{margin-top:13px}
</style></head>
<body>
<div class="poster" id="poster">
  <div class="hivebg" data-hex="54" data-op="0.055"></div>
  <div class="blob a"></div>
  <div class="spot"></div>
  <div class="vignette"></div>
  <img class="wh-logo" src="../brand_assets/workhive-logo-tight.png" alt="WorkHive"/>

  <div class="halo"><svg viewBox="0 0 720 720">
    <polygon class="r1" points="360,64 616,212 616,508 360,656 104,508 104,212"/>
    <polygon class="r2" points="360,142 548,250 548,470 360,578 172,470 172,250"/>
    <circle class="dot"  cx="360" cy="64" r="6"/><circle class="dotc" cx="616" cy="212" r="6"/>
    <circle class="dot"  cx="616" cy="508" r="6"/><circle class="dotc" cx="360" cy="656" r="6"/>
    <circle class="dot"  cx="104" cy="508" r="6"/><circle class="dotc" cx="104" cy="212" r="6"/>
  </svg></div>

  <div class="beeaura"></div>
  <svg class="bee"><use href="#bee-mascot"/></svg>

  <div class="ocell"   style="left:508px;top:180px"><span class="ring"></span>
    <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg><span class="nm">Logbook</span></div>
  <div class="ocell c" style="left:1000px;top:180px"><span class="ring"></span>
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/><path d="m8.5 15 2 2 4-4"/></svg><span class="nm">PM</span></div>
  <div class="ocell c" style="left:452px;top:404px"><span class="ring"></span>
    <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/></svg><span class="nm">Parts</span></div>
  <div class="ocell"   style="left:1056px;top:404px"><span class="ring"></span>
    <svg viewBox="0 0 24 24"><path d="M12 3l1.9 4.6L18.5 9.5 13.9 11.4 12 16l-1.9-4.6L5.5 9.5l4.6-1.9z"/></svg><span class="nm">AI</span></div>

  <div class="stage">
    <span class="eyebrow"><span class="dot"></span>MEET YOUR WORKER BEE</span>
    <h1 class="h1">Built to work as hard as <span class="amber">you do.</span></h1>
    <p class="lede">One friendly hive that watches every machine, PM, and part — and speaks up <b style="color:#eaf1f8">before</b> a breakdown costs you. English or Tagalog.</p>
    <a class="cta" href="#">Start free in your browser
      <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
    <div class="url"><b>workhiveph.com</b> · No download.</div>
  </div>
</div>
<script src="bee.js"></script><script src="hive.js"></script>
</body></html>
