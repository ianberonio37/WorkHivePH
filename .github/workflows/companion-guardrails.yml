name: Companion Guardrails

# The companion quality/safety guardrails in CI (AI_SURFACE_MAP.md §0.5 Pri 4). When the
# conversational companion or its edge functions change, run the STATIC, offline checks that
# lock in everything built during the reds-cleanup + Family P/T arc:
#   - the fabrication / action / safety GRADER self-test (deterministic, DB-free)
#   - the persona contract (incl. L9 recall carve-out, L10 out-of-scope-domains guard,
#     L11 faithfulness output-rail) — so a future edit can't silently delete a guard
#   - the multi-provider fallback chain shape (provider order / cooldown helpers)
#
# These are STATIC (no Supabase, no free-tier chain) so they run in CI. The LIVE ~100-probe
# sweep (tools/companion_fabrication_sweep.py --family all) needs the local stack + auth and is
# a developer/deploy-time step, not a CI step — see workflows/companion_fabrication_sweep.md.

on:
  push:
    branches: [master, main]
    paths:
      - 'supabase/functions/voice-journal-agent/**'
      - 'supabase/functions/voice-action-router/**'
      - 'supabase/functions/ai-gateway/**'
      - 'supabase/functions/_shared/persona.ts'
      - 'supabase/functions/_shared/ai-chain.ts'
      - 'supabase/functions/_shared/provider-health.ts'
      - 'tools/companion_fabrication_sweep.py'
      - 'validate_persona_contract.py'
      - 'validate_groq_fallback.py'
  pull_request:
    branches: [master, main]
    paths:
      - 'supabase/functions/voice-journal-agent/**'
      - 'supabase/functions/voice-action-router/**'
      - 'supabase/functions/ai-gateway/**'
      - 'supabase/functions/_shared/persona.ts'
      - 'supabase/functions/_shared/ai-chain.ts'
      - 'supabase/functions/_shared/provider-health.ts'
      - 'tools/companion_fabrication_sweep.py'
      - 'validate_persona_contract.py'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONIOENCODING: 'utf-8'
  PYTHONUTF8: '1'

jobs:
  guardrails:
    name: Companion grader + guard contract
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - name: Install deps
        run: python -m pip install --upgrade pip requests

      # 1. Mechanical grader self-test (fabrication + action + safety). Deterministic, DB-free.
      #    Catches a grader-fit regression (a calibration that re-introduces a false positive/
      #    negative) — every fix in the reds-cleanup added a self-test case as its ratchet.
      - name: Grader self-test
        run: python tools/companion_fabrication_sweep.py --self-test

      # 2. Persona contract (11 layers). L10 = out-of-scope-domains guard (no invented project/
      #    inventory/skill specifics), L11 = faithfulness output-rail (stripUngroundedKpi).
      #    A future edit that deletes either guard FAILs here (both are teeth-proven).
      - name: Persona contract + guards
        run: python validate_persona_contract.py

      # 3. Fallback-chain shape (provider order + cooldown/penalty helpers in provider-health.ts).
      #    Static parse; skips gracefully if the validator is absent.
      - name: Fallback chain shape
        run: |
          if [ -f validate_groq_fallback.py ]; then
            python validate_groq_fallback.py
          else
            echo "::notice::validate_groq_fallback.py not present — skipping."
          fi

      - name: Live-sweep reminder
        run: |
          echo "::notice::CI verified the STATIC companion guardrails (grader self-test 55/55 + 12-layer guard contract)."
          echo "::notice::The LIVE ~100-probe sweep needs the local stack: python tools/companion_fabrication_sweep.py --family all --fresh-memory"
