name: Persona Corpus Freshness

# The W12 freshness engine in CI. When outward content or the persona corpus changes,
# verify nothing has drifted:
#   - the platform_catalog.json manifest is regenerated (not stale)
#   - all outward content is still grounded (content grounding gate)
#   - the embedding chain stays consistent (ingest model == edge pin, one space, Mistral out)
#
# These are STATIC checks (no DB) so they run in CI. The actual corpus reconcile/sweep
# against the live DB (tools/reconcile_persona_corpus.py) is a DEPLOY step — run it after
# deploy against the prod DB, since CI has no Supabase. The nightly cron catches drift
# that accumulated between merges.

on:
  push:
    branches: [master, main]
    paths:
      - 'learn/**'
      - 'persona_corpus/**'
      - 'platform_catalog.json'
      - 'index.html'
      - 'sitemap.xml'
      - 'tools/ingest_persona_knowledge.py'
      - 'tools/reconcile_persona_corpus.py'
      - 'tools/platform_catalog.py'
      - 'supabase/functions/_shared/embedding-chain.ts'
      - 'supabase/functions/_shared/persona-knowledge.ts'
  pull_request:
    branches: [master, main]
    paths:
      - 'learn/**'
      - 'persona_corpus/**'
      - 'platform_catalog.json'
      - 'index.html'
      - 'sitemap.xml'
      - 'supabase/functions/_shared/embedding-chain.ts'
      - 'supabase/functions/_shared/persona-knowledge.ts'
  schedule:
    - cron: '0 4 * * *'   # 4am UTC nightly safety net

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONIOENCODING: 'utf-8'

jobs:
  freshness:
    name: Persona corpus + content freshness
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - name: Install deps
        run: python -m pip install --upgrade pip beautifulsoup4 requests

      # 1. Catalog-drift gate: the committed platform_catalog.json must equal a fresh
      #    regeneration. Catches "added a learn article but didn't regenerate the catalog"
      #    (which would also leave the persona corpus unable to discover it).
      - name: Catalog drift (manifest must be current)
        run: |
          cp platform_catalog.json /tmp/committed_catalog.json
          python tools/platform_catalog.py
          python - <<'PY'
          import json, sys
          a = json.load(open('/tmp/committed_catalog.json'))
          b = json.load(open('platform_catalog.json'))
          # ignore the regeneration timestamp (always changes; not a drift signal)
          for d in (a, b):
              d.pop('generated_at', None)
          if a != b:
              print("::error::platform_catalog.json is STALE — run 'python tools/platform_catalog.py' and commit it.")
              ka, kb = set(a), set(b)
              for k in sorted(ka | kb):
                  if a.get(k) != b.get(k):
                      print(f"  drift in '{k}'")
              sys.exit(1)
          print("platform_catalog.json is current (ignoring generated_at).")
          PY

      # 2. Content grounding gate: outward content (counts, learn-hub listing, sitemap,
      #    capability claims) stays grounded in the catalog. Forward-only ratchet.
      - name: Content grounding gate
        run: python tools/content_grounding_gate.py

      # 3. Embedding-chain consistency (static): ingest default == edge pin, the chain is
      #    pinned + warns on divergence, Mistral is absent. The live one-space/two-planes
      #    DB checks SKIP in CI (no Postgres) — that is by design.
      - name: Embedding-chain consistency
        run: python tools/validate_embedding_chain_consistency.py --self-test

      # 4. Reminder: the DB-side reconcile/sweep is a deploy step, not a CI step.
      - name: Deploy-step reminder
        run: |
          echo "::notice::CI verified static freshness. On deploy, run against the prod DB:"
          echo "::notice::  python tools/reconcile_persona_corpus.py --ingest   (add new + SWEEP retired corpus chunks)"
