<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Marketing | WorkHive</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #162032;
      --mid:    #1F2E45;
      --light:  #2A3D58;
      --orange: #F7A21B;
      --orange-dk: #D88A0E;
      --orange-lt: #FDB94A;
      --blue:   #29B6D9;
      --steel:  #7B8794;
      --cloud:  #F4F6FA;
      --green:  #22c55e;
      --purple: #a855f7;
      --red:    #ef4444;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--navy);
      color: var(--cloud);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .hdr {
      background: var(--mid);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 1.25rem;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .hdr-brand {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .hdr-logo {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.01em;
    }

    .hdr-title {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--steel);
    }

    .hdr-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.1);
    }

    .hdr-stats {
      display: flex;
      gap: 0.5rem;
    }

    .stat-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .stat-pill.s-idea     { color: var(--steel);  border-color: rgba(123,135,148,0.3); }
    .stat-pill.s-scripted { color: var(--blue);   border-color: rgba(41,182,217,0.3); }
    .stat-pill.s-live     { color: var(--green);  border-color: rgba(34,197,94,0.3); }

    .hdr-spacer { flex: 1; }

    .gen-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .gen-label {
      font-size: 0.72rem;
      color: var(--steel);
      white-space: nowrap;
    }

    input.gen-count {
      width: 54px;
      background: rgba(22,32,50,0.8);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 0.5rem;
      color: white;
      padding: 0.35rem 0.5rem;
      font-size: 0.8rem;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    input.gen-count:focus { outline: none; border-color: rgba(247,162,27,0.4); }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #F7A21B, #FDB94A);
      color: #162032;
      font-weight: 700;
      border: none;
      border-radius: 0.5rem;
      padding: 0.45rem 1rem;
      font-size: 0.78rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary:hover   { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(247,162,27,0.35); }
    .btn-primary:active  { opacity: 0.8; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.13);
      color: var(--cloud);
      font-family: 'Poppins', sans-serif;
      border-radius: 0.5rem;
      padding: 0.4rem 0.85rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-ghost:hover  { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.25); }
    .btn-ghost:active { opacity: 0.7; }
    .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-blue {
      background: rgba(41,182,217,0.12);
      border: 1px solid rgba(41,182,217,0.28);
      color: var(--blue);
      font-family: 'Poppins', sans-serif;
      border-radius: 0.5rem;
      padding: 0.4rem 0.85rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-blue:hover { background: rgba(41,182,217,0.2); }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 360px;
      min-width: 300px;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .filter-row {
      display: flex;
      gap: 0.3rem;
      padding: 0.6rem 0.85rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .ftab {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.18rem 0.6rem;
      font-size: 0.66rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      color: var(--steel);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ftab:hover  { color: var(--cloud); border-color: rgba(255,255,255,0.14); }
    .ftab.active { color: var(--orange); border-color: rgba(247,162,27,0.4); background: rgba(247,162,27,0.08); }

    .low-warn {
      margin: 0.4rem 0.85rem;
      background: rgba(247,162,27,0.08);
      border: 1px solid rgba(247,162,27,0.22);
      border-radius: 0.5rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.7rem;
      color: var(--orange);
      font-weight: 500;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .ideas-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .ideas-list::-webkit-scrollbar { width: 3px; }
    .ideas-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* ── Idea Card ── */
    .idea-card {
      background: linear-gradient(145deg, rgba(42,61,88,0.45), rgba(31,46,69,0.65));
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 3px solid transparent;
      border-radius: 0.75rem;
      padding: 0.8rem 0.9rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .idea-card:hover   { border-color: rgba(255,255,255,0.12); background: rgba(42,61,88,0.65); }
    .idea-card.active  { border-left-color: var(--orange); border-color: rgba(247,162,27,0.22); background: rgba(42,61,88,0.75); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.3rem;
    }

    .card-id {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--steel);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--cloud);
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }

    .card-hook {
      font-size: 0.7rem;
      color: var(--steel);
      line-height: 1.45;
      margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
    }

    .badges { display: flex; gap: 0.28rem; flex-wrap: wrap; }

    .badge {
      font-size: 0.58rem;
      font-weight: 700;
      padding: 0.13rem 0.45rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .b-storytelling { background: rgba(41,182,217,0.13); color: var(--blue); }
    .b-testimonial  { background: rgba(168,85,247,0.13); color: var(--purple); }
    .b-comparison   { background: rgba(247,162,27,0.13); color: var(--orange); }
    .b-educational  { background: rgba(34,197,94,0.13);  color: var(--green); }
    .b-emotional    { background: rgba(239,68,68,0.13);  color: var(--red); }
    .b-muted        { background: rgba(255,255,255,0.06); color: var(--steel); }

    .s-idea      { background: rgba(123,135,148,0.2); color: var(--steel); }
    .s-scripted  { background: rgba(41,182,217,0.18); color: var(--blue); }
    .s-filming   { background: rgba(247,162,27,0.18); color: var(--orange); }
    .s-produced  { background: rgba(168,85,247,0.18); color: var(--purple); }
    .s-published { background: rgba(34,197,94,0.18);  color: var(--green); }

    .card-btn {
      background: rgba(247,162,27,0.1);
      border: 1px solid rgba(247,162,27,0.22);
      color: var(--orange);
      border-radius: 0.4rem;
      padding: 0.22rem 0.6rem;
      font-size: 0.65rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-btn:hover   { background: rgba(247,162,27,0.18); }
    .card-btn.has-script { background: rgba(41,182,217,0.1); border-color: rgba(41,182,217,0.22); color: var(--blue); }
    .card-btn.has-script:hover { background: rgba(41,182,217,0.18); }

    /* ── Detail Panel ── */
    .detail {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      min-width: 0;
    }

    .detail::-webkit-scrollbar { width: 3px; }
    .detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* Welcome */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      text-align: center;
      color: var(--steel);
    }

    .welcome-icon  { font-size: 3rem; }
    .welcome-title { font-size: 1.1rem; font-weight: 600; color: var(--cloud); }
    .welcome-sub   { font-size: 0.82rem; max-width: 300px; line-height: 1.6; }

    /* Detail sections */
    .detail-title {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .detail-meta {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .ibox {
      background: rgba(31,46,69,0.55);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.65rem;
      padding: 0.75rem 0.9rem;
    }

    .ibox.span2   { grid-column: span 2; }
    .ibox.b-orange { border-color: rgba(247,162,27,0.2); }
    .ibox.b-blue   { border-color: rgba(41,182,217,0.2); }

    .ibox-label {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--steel);
      margin-bottom: 0.3rem;
    }

    .ibox-val {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.5;
    }

    /* Status stepper */
    .stepper {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .step-btn {
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
      font-size: 0.65rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: var(--steel);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .step-btn:hover   { color: var(--cloud); border-color: rgba(255,255,255,0.28); }
    .step-btn.current { color: var(--orange); border-color: rgba(247,162,27,0.4); background: rgba(247,162,27,0.09); }
    .step-btn.done    { color: var(--green);  border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.07); }

    .step-arrow { color: var(--steel); font-size: 0.65rem; }

    /* Action bar */
    .action-bar { display: flex; gap: 0.65rem; flex-wrap: wrap; align-items: center; }

    /* Script panel */
    .script-panel {
      background: rgba(22,32,50,0.55);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .script-top {
      padding: 0.75rem 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: rgba(31,46,69,0.4);
    }

    .script-top-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--steel);
    }

    .copy-bar { display: flex; gap: 0.4rem; }

    .script-body {
      padding: 1.25rem 1.4rem;
      font-size: 0.8rem;
      line-height: 1.75;
      color: rgba(244,246,250,0.88);
    }

    .script-body h1 { font-size: 1.05rem; color: var(--orange); margin-bottom: 0.75rem; font-weight: 700; }
    .script-body h2 { font-size: 0.85rem; color: var(--blue); margin: 1.25rem 0 0.45rem; border-bottom: 1px solid rgba(41,182,217,0.18); padding-bottom: 0.2rem; font-weight: 700; letter-spacing: 0.02em; }
    .script-body h3 { font-size: 0.78rem; color: var(--cloud); margin: 0.75rem 0 0.2rem; font-weight: 600; }
    .script-body p  { margin-bottom: 0.45rem; }
    .script-body strong { color: var(--cloud); font-weight: 600; }
    .script-body em { color: #a0aec0; }
    .script-body code { background: rgba(255,255,255,0.07); padding: 0.08rem 0.3rem; border-radius: 0.2rem; font-size: 0.76rem; }
    .script-body hr { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 1rem 0; }
    .script-body table { width: 100%; border-collapse: collapse; margin: 0.4rem 0 0.9rem; font-size: 0.76rem; }
    .script-body th { background: rgba(255,255,255,0.05); padding: 0.35rem 0.7rem; text-align: left; border: 1px solid rgba(255,255,255,0.08); color: var(--steel); font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .script-body td { padding: 0.35rem 0.7rem; border: 1px solid rgba(255,255,255,0.06); }
    .script-body ul, .script-body ol { padding-left: 1.1rem; margin-bottom: 0.4rem; }
    .script-body li { margin-bottom: 0.15rem; }

    /* Skeleton */
    .skel {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shim 1.5s infinite;
      border-radius: 0.3rem;
      height: 0.85rem;
      margin-bottom: 0.45rem;
    }

    @keyframes shim { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .skel.w90  { width: 90%; }
    .skel.w70  { width: 70%; }
    .skel.w55  { width: 55%; }
    .skel.tall { height: 1.3rem; }

    /* Toast */
    .toast-wrap {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      z-index: 999;
    }

    .toast {
      background: var(--mid);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.65rem;
      padding: 0.55rem 1.1rem;
      font-size: 0.78rem;
      font-weight: 500;
      box-shadow: 0 4px 18px rgba(0,0,0,0.45);
      animation: tin 0.22s ease;
      max-width: 310px;
    }

    .toast.ok  { border-left: 3px solid var(--green); }
    .toast.err { border-left: 3px solid var(--red); }
    .toast.inf { border-left: 3px solid var(--blue); }

    @keyframes tin { from { transform: translateX(16px); opacity: 0; } to { transform: none; opacity: 1; } }

    .empty-msg { text-align: center; padding: 2rem; color: var(--steel); font-size: 0.78rem; line-height: 1.6; }

    /* ── Production Kit ── */
    .kit-section {
      background: rgba(22,32,50,0.55);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .kit-header {
      padding: 0.75rem 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(31,46,69,0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .kit-header-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--steel);
    }

    .kit-free-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.12rem 0.5rem;
      border-radius: 999px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 0.75rem;
      padding: 0.85rem;
    }

    .kit-card {
      background: rgba(31,46,69,0.6);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.65rem;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      transition: border-color 0.2s;
    }

    .kit-card:hover { border-color: rgba(255,255,255,0.14); }
    .kit-card.highlight { border-color: rgba(247,162,27,0.3); background: rgba(247,162,27,0.05); }

    .kit-card-name {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--cloud);
    }

    .kit-card-desc {
      font-size: 0.7rem;
      color: var(--steel);
      line-height: 1.5;
      flex: 1;
    }

    .kit-card-free {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--green);
      padding: 0.12rem 0;
    }

    .kit-card-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.2rem;
    }

    .btn-kit {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.4rem;
      padding: 0.28rem 0.65rem;
      font-size: 0.66rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      color: var(--cloud);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-kit:hover  { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.22); }
    .btn-kit.orange { background: rgba(247,162,27,0.12); border-color: rgba(247,162,27,0.28); color: var(--orange); }
    .btn-kit.orange:hover { background: rgba(247,162,27,0.2); }
    .btn-kit.green  { background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.28);  color: var(--green); }
    .btn-kit.green:hover  { background: rgba(34,197,94,0.2); }
    .btn-kit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Voice player */
    .voice-player {
      background: rgba(22,32,50,0.6);
      border: 1px solid rgba(41,182,217,0.2);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      margin-top: 0.4rem;
    }

    .voice-player audio { width: 100%; height: 28px; }

    /* ── Auto-Produce hero card + progress ───────────────────────────── */
    .auto-produce {
      margin: 0.85rem 0.85rem 0;
      padding: 1rem 1.1rem;
      background: linear-gradient(135deg, rgba(247,162,27,0.10) 0%, rgba(41,182,217,0.08) 100%);
      border: 1px solid rgba(247,162,27,0.32);
      border-radius: 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .auto-produce-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .auto-produce-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--cloud);
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .auto-produce-sub {
      font-size: 0.68rem;
      color: var(--steel);
      line-height: 1.5;
    }
    .auto-produce-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .auto-produce-controls select {
      background: rgba(22,32,50,0.85);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 0.4rem;
      color: white;
      padding: 0.3rem 0.5rem;
      font-size: 0.7rem;
      font-family: 'Poppins', sans-serif;
    }
    .btn-autoproduce {
      background: linear-gradient(135deg, #F7A21B 0%, #D88A0E 100%);
      border: none;
      color: white;
      padding: 0.5rem 0.95rem;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 0.45rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(247,162,27,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-autoproduce:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(247,162,27,0.45);
    }
    .btn-autoproduce:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Progress strip */
    .ap-progress {
      display: flex;
      gap: 0.35rem;
      align-items: stretch;
    }
    .ap-step {
      flex: 1;
      background: rgba(22,32,50,0.55);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.45rem;
      padding: 0.45rem 0.5rem;
      font-size: 0.6rem;
      color: var(--steel);
      text-align: center;
      transition: all 0.25s;
      position: relative;
    }
    .ap-step .ap-icon { display: block; font-size: 0.85rem; margin-bottom: 0.15rem; }
    .ap-step .ap-name { display: block; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .ap-step.active {
      background: rgba(247,162,27,0.15);
      border-color: rgba(247,162,27,0.5);
      color: var(--orange);
      box-shadow: 0 0 0 2px rgba(247,162,27,0.15);
    }
    .ap-step.done {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.32);
      color: var(--green);
    }
    .ap-step.error {
      background: rgba(239,68,68,0.12);
      border-color: rgba(239,68,68,0.4);
      color: var(--red);
    }
    .ap-message {
      font-size: 0.7rem;
      color: var(--cloud);
      padding: 0.35rem 0;
      min-height: 1rem;
    }
    .ap-message.error { color: var(--red); }
    .ap-message.done  { color: var(--green); font-weight: 600; }

    @keyframes ap-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
    .ap-step.active .ap-icon { animation: ap-pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">WorkHive</span>
    <span class="hdr-title">Video Marketing</span>
  </div>
  <div class="hdr-divider"></div>
  <div class="hdr-stats">
    <span class="stat-pill s-idea"     id="sTotalIdeas">-- ideas</span>
    <span class="stat-pill s-scripted" id="sScripted">-- scripted</span>
    <span class="stat-pill s-live"     id="sPublished">-- published</span>
  </div>
  <div class="hdr-spacer"></div>
  <button class="btn-ghost" style="font-size:.72rem;flex-shrink:0" onclick="toggleCoverage()">Coverage Map</button>
  <div class="gen-bar">
    <span class="gen-label">Generate</span>
    <input class="gen-count" type="number" id="genCount" value="5" min="1" max="20">
    <span class="gen-label">ideas</span>
    <button class="btn-primary" id="genBtn" onclick="generateIdeas()">+ Generate</button>
  </div>
</header>

<!-- Main -->
<div class="main">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="filter-row" id="filterRow">
      <button class="ftab active" onclick="setFilter('all',this)">All</button>
      <button class="ftab" onclick="setFilter('idea',this)">Idea</button>
      <button class="ftab" onclick="setFilter('scripted',this)">Scripted</button>
      <button class="ftab" onclick="setFilter('filming',this)">Filming</button>
      <button class="ftab" onclick="setFilter('produced',this)">Produced</button>
      <button class="ftab" onclick="setFilter('published',this)">Published</button>
    </div>

    <div class="low-warn" id="lowWarn">
      <span>Backlog running low</span>
      <button class="btn-ghost" style="padding:.15rem .5rem;font-size:.65rem" onclick="generateIdeas()">Auto-fill</button>
    </div>

    <div class="ideas-list" id="ideaList">
      <div class="empty-msg">Loading ideas...</div>
    </div>
  </aside>

  <!-- Coverage Map Panel -->
  <div id="coveragePanel" style="display:none;width:320px;min-width:260px;border-left:1px solid rgba(255,255,255,0.07);overflow-y:auto;flex-shrink:0;">
    <div style="padding:.6rem .85rem .45rem;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--steel)">Feature Coverage</span>
      <button class="btn-ghost" style="font-size:.62rem;padding:.15rem .45rem" onclick="toggleCoverage()">Hide</button>
    </div>
    <div id="coverageGrid" style="padding:.6rem;display:flex;flex-direction:column;gap:.4rem"></div>
  </div>

  <!-- Detail panel -->
  <div class="detail" id="detailPanel">
    <div class="welcome" id="welcomeState">
      <div class="welcome-icon">🎬</div>
      <div class="welcome-title">Select an idea to get started</div>
      <div class="welcome-sub">Click any card on the left to view details and generate a production-ready script</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
  const STATUSES = ['idea','scripted','filming','produced','published'];

  let allIdeas     = [];
  let activeFilter = 'all';
  let selectedId   = null;

  // ── Utils ─────────────────────────────────────────────────────────────────

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toast(msg, type) {
    const w = document.getElementById('toastWrap');
    const d = document.createElement('div');
    d.className = 'toast ' + (type || 'inf');
    d.textContent = msg;
    w.appendChild(d);
    setTimeout(() => d.remove(), 3600);
  }

  // ── Data ─────────────────────────────────────────────────────────────────

  async function loadIdeas() {
    try {
      const r = await fetch('/api/ideas');
      allIdeas = await r.json();
      renderList();
      updateStats();
      checkHealth();
    } catch (e) {
      toast('Failed to load ideas', 'err');
    }
  }

  function updateStats() {
    document.getElementById('sTotalIdeas').textContent = allIdeas.length + ' ideas';
    document.getElementById('sScripted').textContent   = allIdeas.filter(i => i.status === 'scripted').length + ' scripted';
    document.getElementById('sPublished').textContent  = allIdeas.filter(i => i.status === 'published').length + ' published';
  }

  function checkHealth() {
    const remaining = allIdeas.filter(i => i.status === 'idea').length;
    document.getElementById('lowWarn').style.display = remaining <= 3 ? 'flex' : 'none';
  }

  // ── Filter ────────────────────────────────────────────────────────────────

  function setFilter(status, el) {
    activeFilter = status;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function filtered() {
    return activeFilter === 'all' ? allIdeas : allIdeas.filter(i => i.status === activeFilter);
  }

  // ── Render list ───────────────────────────────────────────────────────────

  function renderList() {
    const list  = document.getElementById('ideaList');
    const ideas = filtered();

    if (!ideas.length) {
      list.innerHTML = '<div class="empty-msg">No ideas in this stage.<br>Hit "+ Generate" to fill the backlog.</div>';
      return;
    }

    list.innerHTML = ideas.map(renderCard).join('');
  }

  function renderCard(idea) {
    const active    = idea.id === selectedId ? ' active' : '';
    const typeClass = 'b-' + (idea.video_type || 'storytelling');
    const statClass = 's-' + idea.status;
    const hasSc     = !!idea.script_file;
    const btnLabel  = hasSc ? 'View Script' : 'Script it &rarr;';
    const btnClass  = 'card-btn' + (hasSc ? ' has-script' : '');

    return (
      '<div class="idea-card' + active + '" id="card-' + idea.id + '" onclick="selectIdea(\'' + idea.id + '\')">' +
        '<div class="card-top">' +
          '<span class="card-id">' + esc(idea.id) + '</span>' +
          '<span class="badge ' + statClass + '">' + esc(idea.status) + '</span>' +
        '</div>' +
        '<div class="card-title">' + esc(idea.title) + '</div>' +
        '<div class="card-hook">' + esc(idea.hook) + '</div>' +
        '<div class="card-footer">' +
          '<div class="badges">' +
            '<span class="badge ' + typeClass + '">' + esc(idea.video_type || '') + '</span>' +
            '<span class="badge b-muted">' + esc(idea.audience || '') + '</span>' +
          '</div>' +
          '<div style="display:flex;gap:.3rem;align-items:center">' +
            '<button class="' + btnClass + '" onclick="event.stopPropagation();quickScript(\'' + idea.id + '\')">' + btnLabel + '</button>' +
            '<button onclick="event.stopPropagation();deleteIdea(\'' + idea.id + '\')" title="Delete" ' +
              'style="background:transparent;border:1px solid rgba(239,68,68,.25);color:rgba(239,68,68,.55);border-radius:.4rem;padding:.22rem .5rem;font-size:.7rem;cursor:pointer;line-height:1;flex-shrink:0" ' +
              'onmouseover="this.style.background=\'rgba(239,68,68,.12)\';this.style.borderColor=\'rgba(239,68,68,.5)\';this.style.color=\'#ef4444\'" ' +
              'onmouseout="this.style.background=\'transparent\';this.style.borderColor=\'rgba(239,68,68,.25)\';this.style.color=\'rgba(239,68,68,.55)\'">&times;</button>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  // ── Select idea ───────────────────────────────────────────────────────────

  function selectIdea(id) {
    selectedId = id;
    renderList();
    const idea = allIdeas.find(i => i.id === id);
    if (!idea) return;
    renderDetail(idea);
  }

  function renderDetail(idea) {
    const panel  = document.getElementById('detailPanel');
    const sIdx   = STATUSES.indexOf(idea.status);

    const stepperHtml = STATUSES.map((s, i) => {
      let cls = 'step-btn';
      if (i < sIdx)  cls += ' done';
      if (i === sIdx) cls += ' current';
      const arrow = i < STATUSES.length - 1 ? '<span class="step-arrow">&#8250;</span>' : '';
      return '<button class="' + cls + '" onclick="setStatus(\'' + idea.id + '\',\'' + s + '\')">' + s + '</button>' + arrow;
    }).join('');

    const scriptBtnHtml = idea.script_file
      ? '<button class="btn-blue" onclick="loadScriptContent(\'' + idea.id + '\')">Reload Script</button>'
      : '<button class="btn-primary" id="genScriptBtn" onclick="generateScript(\'' + idea.id + '\')">Generate Production Script</button>';

    panel.innerHTML =
      '<div class="detail-title">' + esc(idea.title) + '</div>' +
      '<div class="detail-meta">' +
        '<span class="badge b-' + (idea.video_type || 'storytelling') + '">' + esc(idea.video_type) + '</span>' +
        '<span class="badge b-muted">' + esc(idea.duration) + '</span>' +
        '<span class="badge b-muted">' + esc(idea.created_at) + '</span>' +
      '</div>' +

      '<div class="info-grid">' +
        '<div class="ibox span2 b-orange"><div class="ibox-label">Hook</div><div class="ibox-val">' + esc(idea.hook) + '</div></div>' +
        '<div class="ibox span2"><div class="ibox-label">Problem</div><div class="ibox-val">' + esc(idea.problem) + '</div></div>' +
        '<div class="ibox b-blue"><div class="ibox-label">WorkHive Feature</div><div class="ibox-val">' + esc(idea.solution_feature) + '</div></div>' +
        '<div class="ibox"><div class="ibox-label">Target Audience</div><div class="ibox-val">' + esc(idea.audience) + '</div></div>' +
        '<div class="ibox span2"><div class="ibox-label">Emotion Trigger</div><div class="ibox-val">' + esc(idea.emotion) + '</div></div>' +
      '</div>' +

      '<div>' +
        '<div class="ibox-label" style="margin-bottom:.45rem">Pipeline Stage</div>' +
        '<div class="stepper">' + stepperHtml + '</div>' +
      '</div>' +

      '<div class="action-bar">' + scriptBtnHtml + '</div>' +

      '<div id="kitZone"><div class="empty-msg" style="padding:1rem">Loading toolkit...</div></div>' +

      '<div id="scriptZone"></div>';

    // Always render the kit immediately (doesn't need script to show tool links)
    renderProductionKit(idea.id, '').then(kitHtml => {
      const kz = document.getElementById('kitZone');
      if (kz) {
        kz.innerHTML = kitHtml;
        loadAssets(idea.id);   // populate narration/recording status badges
      }
    });

    // Load script if it exists (will update kit with narration/prompts when done)
    if (idea.script_file) {
      loadScriptContent(idea.id);
    }
  }

  // ── Script ────────────────────────────────────────────────────────────────

  function quickScript(id) {
    selectIdea(id);
    const idea = allIdeas.find(i => i.id === id);
    if (idea && idea.script_file) {
      loadScriptContent(id);
    } else {
      generateScript(id);
    }
  }

  async function generateScript(id) {
    const btn = document.getElementById('genScriptBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Generating... (30-60s)'; }
    showScriptSkeleton();

    try {
      const r    = await fetch('/api/ideas/' + id + '/script', { method: 'POST' });
      const data = await r.json();
      if (!data.success) throw new Error(data.error || 'Generation failed');

      const idx = allIdeas.findIndex(i => i.id === id);
      if (idx !== -1) { allIdeas[idx].status = 'scripted'; allIdeas[idx].script_file = data.file; }

      renderList();
      updateStats();
      checkHealth();

      const idea = allIdeas.find(i => i.id === id);
      if (idea) renderDetail(idea);

      showScriptMarkdown(data.content);
      toast('Script generated and saved!', 'ok');

    } catch (err) {
      showScriptError(err.message);
      toast('Script generation failed: ' + err.message, 'err');
      if (btn) { btn.disabled = false; btn.textContent = 'Generate Production Script'; }
    }
  }

  async function loadScriptContent(id) {
    showScriptSkeleton();
    try {
      const r    = await fetch('/api/ideas/' + id + '/script/content');
      const data = await r.json();
      if (!data.success) throw new Error(data.error || 'Not found');
      showScriptMarkdown(data.content);
    } catch (err) {
      showScriptError(err.message);
    }
  }

  function showScriptSkeleton() {
    const z = document.getElementById('scriptZone');
    if (!z) return;
    z.innerHTML =
      '<div class="script-panel">' +
        '<div class="script-top"><span class="script-top-label">Production Script</span></div>' +
        '<div class="script-body">' +
          '<div class="skel tall w90"></div>' +
          '<div class="skel w70" style="margin-top:.9rem"></div>' +
          '<div class="skel w90"></div>' +
          '<div class="skel w55"></div>' +
          '<div class="skel w70" style="margin-top:.9rem"></div>' +
          '<div class="skel w90"></div>' +
          '<div class="skel w70"></div>' +
          '<div class="skel w55"></div>' +
        '</div>' +
      '</div>';
  }

  function showScriptMarkdown(content) {
    const z = document.getElementById('scriptZone');
    if (!z) return;

    // Extract key sections for quick-copy buttons
    const narMatch = content.match(/ElevenLabs Narration[\s\S]*?\n([\s\S]*?)(?=\n---|\n##|$)/i);
    const narText  = narMatch ? narMatch[1].trim() : '';

    const rwMatch  = content.match(/Hero Shot[\s\S]*?\n([^\n]+(?:\n[^\n]+)?)/i);
    const rwText   = rwMatch ? rwMatch[1].trim() : '';

    z.innerHTML =
      '<div class="script-panel">' +
        '<div class="script-top">' +
          '<span class="script-top-label">Production Script</span>' +
          '<div class="copy-bar">' +
            (narText ? '<button class="btn-ghost" style="font-size:.7rem;padding:.3rem .7rem" onclick="copyText(' + JSON.stringify(narText) + ',\'Narration copied!\')">Copy Narration</button>' : '') +
            (rwText  ? '<button class="btn-ghost" style="font-size:.7rem;padding:.3rem .7rem" onclick="copyText(' + JSON.stringify(rwText)  + ',\'Runway prompt copied!\')">Copy Runway Prompt</button>' : '') +
            '<button class="btn-ghost" style="font-size:.7rem;padding:.3rem .7rem" onclick="copyText(' + JSON.stringify(content) + ',\'Full script copied!\')">Copy All</button>' +
          '</div>' +
        '</div>' +
        '<div class="script-body" id="scriptBody"></div>' +
      '</div>';

    document.getElementById('scriptBody').innerHTML = marked.parse(content);

    // Update the kit with full narration/prompt data now that script is loaded
    renderProductionKit(selectedId, content).then(kitHtml => {
      const kz = document.getElementById('kitZone');
      if (kz) kz.innerHTML = kitHtml;
    });
  }

  function showScriptError(msg) {
    const z = document.getElementById('scriptZone');
    if (!z) return;
    z.innerHTML = '<div class="ibox" style="border-color:rgba(239,68,68,.3)"><div class="ibox-label">Error</div><div class="ibox-val" style="color:var(--red)">' + esc(msg) + '</div></div>';
  }

  // ── Delete idea ──────────────────────────────────────────────────────────

  async function deleteIdea(id) {
    const idea = allIdeas.find(i => i.id === id);
    if (!idea) return;
    if (!confirm('Delete "' + idea.title + '"?\n\nThis removes it from the backlog permanently.')) return;

    try {
      const r    = await fetch('/api/ideas/' + id, { method: 'DELETE' });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      allIdeas = allIdeas.filter(i => i.id !== id);
      if (selectedId === id) {
        selectedId = null;
        document.getElementById('detailPanel').innerHTML =
          '<div class="welcome" id="welcomeState"><div class="welcome-icon">🎬</div>' +
          '<div class="welcome-title">Select an idea to get started</div></div>';
      }
      renderList();
      updateStats();
      checkHealth();
      toast('Idea deleted.', 'ok');
    } catch (err) {
      toast('Delete failed: ' + err.message, 'err');
    }
  }

  // ── Status ────────────────────────────────────────────────────────────────

  async function setStatus(id, status) {
    try {
      const r = await fetch('/api/ideas/' + id + '/status', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error || 'Failed');

      const idx = allIdeas.findIndex(i => i.id === id);
      if (idx !== -1) allIdeas[idx].status = status;

      renderList();
      updateStats();
      checkHealth();

      const idea = allIdeas.find(i => i.id === id);
      if (idea) {
        renderDetail(idea);
        if (idea.script_file) loadScriptContent(id);
      }

      toast(id + ' marked as ' + status, 'ok');
    } catch (err) {
      toast('Status update failed: ' + err.message, 'err');
    }
  }

  // ── Generate ideas ────────────────────────────────────────────────────────

  async function generateIdeas() {
    const n   = parseInt(document.getElementById('genCount').value) || 5;
    const btn = document.getElementById('genBtn');
    btn.disabled    = true;
    btn.textContent = 'Generating...';
    toast('Calling AI to generate ' + n + ' ideas...', 'inf');

    try {
      const r    = await fetch('/api/ideas/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ n }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error || 'Generation failed');

      allIdeas.push(...data.added);
      renderList();
      updateStats();
      checkHealth();
      toast(data.added.length + ' new ideas added to backlog!', 'ok');

    } catch (err) {
      toast('Generation failed: ' + err.message, 'err');
    } finally {
      btn.disabled    = false;
      btn.textContent = '+ Generate';
    }
  }

  // ── Copy ──────────────────────────────────────────────────────────────────

  function copyText(text, successMsg) {
    navigator.clipboard.writeText(text)
      .then(() => toast(successMsg || 'Copied!', 'ok'))
      .catch(() => toast('Copy failed', 'err'));
  }

  // ── Coverage Map ──────────────────────────────────────────────────────────

  let coverageVisible = false;
  let coverageData    = null;

  function toggleCoverage() {
    coverageVisible = !coverageVisible;
    document.getElementById('coveragePanel').style.display = coverageVisible ? 'block' : 'none';
    if (coverageVisible) loadCoverage();
  }

  async function loadCoverage() {
    try {
      const r    = await fetch('/api/coverage');
      coverageData = await r.json();
      renderCoverageGrid(coverageData);
    } catch (e) {
      document.getElementById('coverageGrid').innerHTML =
        '<div class="empty-msg">Could not load coverage data.</div>';
    }
  }

  const STATUS_COLORS = {
    published: 'var(--green)',
    produced:  'var(--purple)',
    filming:   'var(--orange)',
    scripted:  'var(--blue)',
    idea:      'var(--steel)',
    uncovered: 'rgba(239,68,68,0.7)',
  };

  const STATUS_LABELS = {
    published: 'LIVE',
    produced:  'PRODUCED',
    filming:   'FILMING',
    scripted:  'SCRIPTED',
    idea:      'IDEA',
    uncovered: 'NO VIDEO',
  };

  function renderCoverageGrid(data) {
    const grid = document.getElementById('coverageGrid');
    const covered   = data.covered_count;
    const total     = data.total_features;
    const pct       = Math.round((covered / total) * 100);

    // Progress bar
    let html =
      '<div style="margin-bottom:.6rem">' +
        '<div style="font-size:.65rem;color:var(--steel);margin-bottom:.25rem">' + covered + ' of ' + total + ' features have video coverage (' + pct + '%)</div>' +
        '<div style="background:rgba(255,255,255,0.07);border-radius:999px;height:5px;overflow:hidden">' +
          '<div style="background:var(--orange);height:100%;width:' + pct + '%;transition:width .5s;border-radius:999px"></div>' +
        '</div>' +
      '</div>';

    // Feature rows
    const features = Object.entries(data.coverage);
    // Sort: uncovered first, then by status
    const ORDER = ['uncovered','idea','scripted','filming','produced','published'];
    features.sort((a,b) => ORDER.indexOf(a[1].status) - ORDER.indexOf(b[1].status));

    for (const [feat, info] of features) {
      const color = STATUS_COLORS[info.status] || 'var(--steel)';
      const label = STATUS_LABELS[info.status] || info.status;
      const isUncovered = info.status === 'uncovered';

      html +=
        '<div style="background:rgba(31,46,69,0.5);border:1px solid rgba(255,255,255,0.07);border-radius:.5rem;padding:.5rem .65rem;' +
              (isUncovered ? 'border-color:rgba(239,68,68,0.2);' : '') + '">' +

  // ── Auto-Produce orchestration ────────────────────────────────────────────
  const PIPELINE_STAGES = ['script','voice','recording','scene','music','assemble'];

  async function autoProduce(ideaId) {
    const btn       = document.getElementById('apBtn-' + ideaId);
    const voiceSel  = document.getElementById('apVoice-' + ideaId);
    const messageEl = document.getElementById('apMessage-' + ideaId);
    const voice     = voiceSel ? voiceSel.value : 'james';

    // Reset all step states
    PIPELINE_STAGES.forEach(s => {
      const el = document.getElementById('ap-' + ideaId + '-' + s);
      if (el) el.className = 'ap-step';
    });
    messageEl.className = 'ap-message';
    messageEl.textContent = 'Starting...';
    btn.disabled = true;
    btn.textContent = 'Producing...';

    try {
      const r = await fetch('/api/ideas/' + ideaId + '/produce-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ voice: voice }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error || 'Failed to start');
      pollPipelineJob(ideaId, data.job_id);
    } catch (err) {
      messageEl.className = 'ap-message error';
      messageEl.textContent = 'Failed to start: ' + err.message;
      btn.disabled = false;
      btn.textContent = 'Auto-Produce';
    }
  }

  async function pollPipelineJob(ideaId, jobId) {
    const btn       = document.getElementById('apBtn-' + ideaId);
    const messageEl = document.getElementById('apMessage-' + ideaId);

    const tick = async () => {
      try {
        const r    = await fetch('/api/produce-jobs/' + jobId);
        const data = await r.json();
        if (!data.success) throw new Error(data.error);

        const currentStage = data.stage;
        const stageIdx     = PIPELINE_STAGES.indexOf(currentStage);

        // Mark stages
        PIPELINE_STAGES.forEach((s, i) => {
          const el = document.getElementById('ap-' + ideaId + '-' + s);
          if (!el) return;
          if (data.status === 'error' && s === currentStage)        el.className = 'ap-step error';
          else if (data.status === 'complete')                       el.className = 'ap-step done';
          else if (i < stageIdx)                                     el.className = 'ap-step done';
          else if (i === stageIdx && data.status === 'running')      el.className = 'ap-step active';
          else                                                       el.className = 'ap-step';
        });

        messageEl.className   = 'ap-message';
        messageEl.textContent = data.message || '';

        if (data.status === 'complete') {
          messageEl.className   = 'ap-message done';
          messageEl.innerHTML   = '✓ ' + esc(data.message) +
            ' &middot; <a href="' + esc(data.download) + '" style="color:var(--green);text-decoration:underline">Download ' + data.size_mb + 'MB MP4</a>';
          btn.disabled = false;
          btn.textContent = 'Auto-Produce Again';
          loadAssets(ideaId);   // refresh per-stage cards
          return;
        }
        if (data.status === 'error') {
          messageEl.className   = 'ap-message error';
          messageEl.textContent = data.message || data.error || 'Pipeline failed';
          btn.disabled = false;
          btn.textContent = 'Retry Auto-Produce';
          return;
        }
        setTimeout(tick, 1500);
      } catch (err) {
        messageEl.className   = 'ap-message error';
        messageEl.textContent = 'Lost connection: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Retry Auto-Produce';
      }
    };
    tick();
  }

          const count = a.narration.voices.length;

          const isManual = a.recording.name.startsWith('manual_');
          const tag      = isManual ? ' (yours)' : ' (auto)';

            const opts = all.map((r, i) => {
              const type = r.name.startsWith('manual_') ? '(yours)' : '(auto)';
              return '<option value="' + esc(r.file) + '"' + (i === 0 ? ' selected' : '') + '>' +
                esc(r.name.replace(/^(manual_)?/, '').replace(/_\d{8}_\d{6}\.webm$/, '')) +
                ' ' + type + ' — ' + r.size_kb + 'KB' +

          {k:'james',    l:'James — PH English Male (en-PH)'},
          {k:'rosa',     l:'Rosa — PH English Female (en-PH)'},
          {k:'guy',      l:'Guy — US English Male'},
          {k:'jenny',    l:'Jenny — US English Female'},
          {k:'ryan',     l:'Ryan — UK English Male'},
          {k:'angelo',   l:'Angelo — Filipino Male (fil-PH)'},
          {k:'blessica', l:'Blessica — Filipino Female (fil-PH)'},
        ];
        sel.innerHTML = allVoices.map(v => {
          const ready   = generatedKeys.includes(v.k);
          const label   = v.l + (ready ? ' ✓' : '');
          const isDefault = v.k === a.narration.default;
          return '<option value="' + v.k + '"' + (isDefault ? ' selected' : '') + '>' + label + '</option>';
        }).join('');
      }
    } catch (e) { /* silent */ }
  }

  // Track manually chosen recording per idea
  const _chosenRecording = {};

  function updateRecordingChoice(ideaId) {
    const sel = document.getElementById('recPicker-' + ideaId);
    if (sel) _chosenRecording[ideaId] = sel.value;
  }

  async function assembleVideo(ideaId) {
    const btn      = document.getElementById('assembleBtn-' + ideaId);
    const result   = document.getElementById('assembleResult-' + ideaId);
    const sceneVal = (document.getElementById('scenePath-' + ideaId) || {}).value || '';
    const musicVal = (document.getElementById('musicPath-' + ideaId) || {}).value || '';
    const captions = (document.getElementById('captionsCheck-' + ideaId) || {}).checked !== false;
    const voiceSel = document.getElementById('assembleVoice-' + ideaId);
    const voiceKey = voiceSel ? voiceSel.value : 'james';

    if (!voiceKey) {
      toast('Select a voice then generate its narration first.', 'err');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Assembling... (1-2 min)';
    result.innerHTML = '<div style="font-size:.68rem;color:var(--steel);margin-top:.4rem">Running FFmpeg + Whisper captions...</div>';

    try {
      const r    = await fetch('/api/ideas/' + ideaId + '/assemble', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          voice:          voiceKey,
          scene_file:     sceneVal || null,
          music_file:     musicVal || null,
          recording_file: _chosenRecording[ideaId] || null,
          captions,
        }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      result.innerHTML =
        '<div style="font-size:.68rem;color:var(--green);margin-top:.35rem;margin-bottom:.3rem">Done! ' + data.size_mb + ' MB</div>' +
        '<div class="kit-card-actions">' +
          '<a class="btn-kit green" href="' + data.download + '" download>Download MP4</a>' +
          '<span style="font-size:.6rem;color:var(--steel)">Ready to post</span>' +
        '</div>';
      btn.textContent = 'Reassemble';
      btn.disabled    = false;
      toast('Video assembled! Download the MP4.', 'ok');
    } catch (err) {
      result.innerHTML = '<div style="font-size:.68rem;color:var(--red);margin-top:.4rem">' + esc(err.message) + '</div>';
      btn.textContent  = 'Assemble Video';
      btn.disabled     = false;
      toast('Assembly failed: ' + err.message, 'err');
    }
  }

  let _supportedFeatures = null;

  async function getSupportedFeatures() {
    if (_supportedFeatures) return _supportedFeatures;
    try {
      const r = await fetch('/api/demo-features');
      const d = await r.json();
      _supportedFeatures = d.features || [];
    } catch (e) {
      _supportedFeatures = [];
    }
    return _supportedFeatures;
  }

  function renderRecordCard(ideaId, feature) {
    const supported = _supportedFeatures || [];
    const isSupported = supported.includes(feature);
    return (
      '<div class="kit-card highlight" id="recordCard-' + ideaId + '">' +
        '<div class="kit-card-name">Auto-Record UI Demo</div>' +
        '<div class="kit-card-desc">Playwright records WorkHive in action automatically — problem scene then solution reveal.</div>' +
        '<div class="kit-card-free">' + (isSupported ? 'Sequence ready for: ' + esc(feature) : 'No sequence yet for: ' + esc(feature)) + '</div>' +
        '<div class="kit-card-actions">' +
          (isSupported
            ? '<button class="btn-kit orange" id="recordBtn-' + ideaId + '" onclick="recordDemo(\'' + ideaId + '\')">Record Demo Video</button>'
            : ''
          ) +
          '<button class="btn-kit" id="recordManualBtn-' + ideaId + '" onclick="recordManual(\'' + ideaId + '\')" title="Opens browser at the feature page. You control the demo. Auto-closes when time is up.">Record Myself</button>' +
        '</div>' +
        '<div id="recordResult-' + ideaId + '"></div>' +
      '</div>'
    );
  }

  function renderLinkCard(tool) {
    return (
      '<div class="kit-card">' +
        '<div class="kit-card-name">' + esc(tool.name) + '</div>' +
        '<div class="kit-card-desc">' + esc(tool.desc) + '</div>' +
        '<div class="kit-card-free">' + esc(tool.free) + '</div>' +
        '<div class="kit-card-actions">' +
          '<a class="btn-kit orange" href="' + esc(tool.url) + '" target="_blank">Open ' + esc(tool.name.split(' ')[0]) + '</a>' +
        '</div>' +
      '</div>'
    );
  }

  async function recordDemo(ideaId) {
    const btn    = document.getElementById('recordBtn-' + ideaId);
    const result = document.getElementById('recordResult-' + ideaId);
    btn.disabled    = true;
    btn.textContent = 'Recording... (opens browser)';

    result.innerHTML = '<div style="font-size:.68rem;color:var(--steel);margin-top:.4rem">Playwright is controlling the browser. Watch the automated demo run. This takes 60-90 seconds.</div>';

    try {
      const r    = await fetch('/api/ideas/' + ideaId + '/record', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ headless: false }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      result.innerHTML =
        '<div style="font-size:.68rem;color:var(--green);margin-top:.4rem;margin-bottom:.3rem">Recording complete — ' + data.size_kb + ' KB</div>' +
        '<div class="kit-card-actions">' +
          '<a class="btn-kit green" href="' + data.download + '" download>Download .webm</a>' +
          '<span style="font-size:.6rem;color:var(--steel)">Import into CapCut</span>' +
        '</div>';

      btn.textContent = 'Record Again';
      btn.disabled    = false;
      toast('UI demo recorded! Download the .webm for CapCut.', 'ok');

    } catch (err) {
      result.innerHTML = '<div style="font-size:.68rem;color:var(--red);margin-top:.4rem">' + esc(err.message) + '</div>';
      btn.textContent  = 'Record Demo Video';
      btn.disabled     = false;
      toast('Recording failed: ' + err.message, 'err');
    }
  }

  async function recordManual(ideaId) {
    const btn    = document.getElementById('recordManualBtn-' + ideaId);
    const result = document.getElementById('recordResult-' + ideaId);
    const idea   = allIdeas.find(i => i.id === ideaId);
    const dur    = idea ? parseInt((idea.duration || '60s').replace('s','')) : 60;

    btn.disabled    = true;
    btn.textContent = 'Opening browser...';
    if (result) result.innerHTML =
      '<div style="font-size:.68rem;color:var(--blue);margin-top:.4rem;line-height:1.6">' +
        'Browser opening at the ' + esc(idea ? idea.solution_feature : 'feature') + ' page.<br>' +
        'You have <strong>' + dur + ' seconds</strong> — the red timer shows in the corner.<br>' +
        'Demo the feature however you want. Browser auto-closes when done.' +
      '</div>';

    toast('Browser opening — you have ' + dur + 's to demo the feature', 'inf');

    try {
      const r    = await fetch('/api/ideas/' + ideaId + '/record-manual', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({}),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      if (result) result.innerHTML =
        '<div style="font-size:.68rem;color:var(--green);margin-top:.4rem;margin-bottom:.3rem">Recording complete — ' + data.size_kb + ' KB</div>' +
        '<div class="kit-card-actions">' +
          '<a class="btn-kit green" href="' + data.download + '" download>Download .webm</a>' +
          '<span style="font-size:.6rem;color:var(--steel)">Import into CapCut or use Assemble</span>' +
        '</div>';

      btn.textContent = 'Record Myself Again';
      btn.disabled    = false;

      // Also update the assets status
      loadAssets(ideaId);
      toast('Your demo recording saved!', 'ok');

    } catch (err) {
      if (result) result.innerHTML =
        '<div style="font-size:.68rem;color:var(--red);margin-top:.4rem">' + esc(err.message) + '</div>';
      btn.textContent = 'Record Myself';
      btn.disabled    = false;
      toast('Manual recording failed: ' + err.message, 'err');
    }
  }

  async function generateVoice(ideaId) {
    const btn      = document.getElementById('voiceGenBtn-' + ideaId);
    const voiceKey = document.getElementById('voiceSelect-' + ideaId).value;
    const result   = document.getElementById('voiceResult-' + ideaId);

    btn.disabled    = true;
    btn.textContent = 'Generating...';

    try {
      const r    = await fetch('/api/ideas/' + ideaId + '/voice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ voice: voiceKey }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      result.innerHTML =
        '<div class="voice-player">' +
          '<audio controls src="' + data.download.replace('download', 'stream') + '"></audio>' +
        '</div>' +
        '<div class="kit-card-actions" style="margin-top:.4rem">' +
          '<a class="btn-kit green" href="' + data.download + '" download>Download MP3</a>' +
          '<span style="font-size:.62rem;color:var(--steel)">' + data.char_count + ' chars</span>' +
        '</div>';

      btn.textContent = 'Regenerate Audio';
      btn.disabled    = false;
      toast('Narration audio generated!', 'ok');

    } catch (err) {
      const msg = err.message.toLowerCase().includes('script')
        ? 'Generate the Production Script first, then generate audio.'
        : err.message;
      result.innerHTML = '<div style="font-size:.68rem;color:var(--orange);margin-top:.3rem">' + esc(msg) + '</div>';
      btn.textContent  = 'Generate Audio';
      btn.disabled     = false;
      toast(msg, 'err');
    }
  }

  async function getSunoPrompt(ideaId) {
    const btn    = document.getElementById('sunoBtn-' + ideaId);
    const result = document.getElementById('sunoResult-' + ideaId);
    btn.disabled    = true;
    btn.textContent = 'Loading...';

    try {
      const r    = await fetch('/api/ideas/' + ideaId + '/suno-prompt');
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      result.innerHTML =
        '<div style="font-size:.65rem;color:var(--steel);margin-top:.4rem;line-height:1.5;background:rgba(22,32,50,.6);border-radius:.4rem;padding:.4rem .5rem">' +
          esc(data.prompt) +
        '</div>' +
        '<div class="kit-card-actions" style="margin-top:.35rem">' +
          '<button class="btn-kit green" onclick="copyText(' + JSON.stringify(data.prompt) + ',\'Suno prompt copied!\')">Copy Prompt</button>' +
        '</div>';

      btn.textContent = 'Refresh';
      btn.disabled    = false;
    } catch (err) {
      result.innerHTML = '<div style="font-size:.68rem;color:var(--red);margin-top:.3rem">' + esc(err.message) + '</div>';
      btn.textContent  = 'Get Music Prompt';
      btn.disabled     = false;
    }
  }

  // ── Stream voice audio (for browser playback) ─────────────────────────────

  // ── Init ──────────────────────────────────────────────────────────────────

  loadIdeas();
</script>
</body>
</html>
