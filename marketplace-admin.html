<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F7A21B" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="manifest.json" />
  <title>Marketplace Admin — WorkHive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f1923; color: #F4F6FA;
      min-height: 100vh; overflow-x: hidden;
    }

    /* Aurora */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.07; }
    .aurora-blob.a1 { width: 600px; height: 600px; background: #F7A21B; top: -200px; left: -200px; }
    .aurora-blob.a2 { width: 500px; height: 500px; background: #29B6D9; bottom: -150px; right: -150px; }

    /* Layout */
    .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 7rem; }

    /* Header */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.75rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 800; }
    .page-header p { font-size: 0.78rem; color: #7B8794; margin-top: 0.15rem; }
    .header-badge {
      padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700;
      background: rgba(247,162,27,0.12); border: 1px solid rgba(247,162,27,0.3); color: #F7A21B;
    }

    /* Gate */
    #supervisor-gate {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: #0f1923; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem; text-align: center; padding: 2rem;
    }
    #supervisor-gate h2 { font-size: 1.25rem; font-weight: 700; }
    #supervisor-gate p { font-size: 0.82rem; color: #7B8794; max-width: 320px; }
    #supervisor-gate a {
      margin-top: 0.5rem; display: inline-block; padding: 0.6rem 1.5rem;
      background: rgba(247,162,27,0.1); border: 1px solid rgba(247,162,27,0.3);
      border-radius: 0.625rem; color: #F7A21B; font-weight: 600; font-size: 0.82rem; text-decoration: none;
    }

    /* Tab switcher */
    .tab-bar {
      display: flex; gap: 0.375rem; margin-bottom: 1.25rem;
      background: rgba(22,32,50,0.6); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.75rem; padding: 0.35rem;
    }
    .tab-btn {
      flex: 1; padding: 0.55rem; border: none; border-radius: 0.5rem;
      background: transparent; color: #7B8794;
      font-family: 'Poppins', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.35rem;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(247,162,27,0.15), rgba(247,162,27,0.08));
      color: #F7A21B; border: 1px solid rgba(247,162,27,0.25);
    }
    .tab-count {
      background: rgba(247,162,27,0.2); color: #F7A21B;
      border-radius: 999px; font-size: 0.62rem; padding: 0.1rem 0.4rem; font-weight: 700;
    }
    .tab-count.red { background: rgba(248,113,113,0.2); color: #f87171; }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.25rem;
    }
    .stat-card {
      background: linear-gradient(145deg, rgba(42,61,88,0.5), rgba(31,46,69,0.7));
      border: 1px solid rgba(255,255,255,0.07); border-radius: 0.875rem; padding: 0.875rem;
      text-align: center;
    }
    .stat-num { font-size: 1.5rem; font-weight: 800; color: #F7A21B; }
    .stat-num.blue { color: #29B6D9; }
    .stat-num.green { color: #4ade80; }
    .stat-num.red { color: #f87171; }
    .stat-lbl { font-size: 0.68rem; color: #7B8794; margin-top: 0.2rem; }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 1rem; }
    .search-wrap svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #7B8794; pointer-events: none; }
    .search-input {
      width: 100%; padding: 0.625rem 0.875rem 0.625rem 2.25rem;
      background: rgba(22,32,50,0.6); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.625rem; color: #F4F6FA;
      font-family: 'Poppins', sans-serif; font-size: 1rem;
    }
    .search-input:focus { outline: none; border-color: rgba(247,162,27,0.4); }
    .search-input::placeholder { color: #7B8794; }

    /* Listing cards */
    .listing-list { display: flex; flex-direction: column; gap: 0.875rem; }

    .admin-card {
      background: linear-gradient(145deg, rgba(42,61,88,0.5), rgba(31,46,69,0.7));
      border: 1px solid rgba(255,255,255,0.07); border-radius: 1rem; overflow: hidden;
    }
    .admin-card.draft  { border-left: 3px solid #fbbf24; }
    .admin-card.published { border-left: 3px solid #4ade80; }
    .admin-card.removed { border-left: 3px solid #f87171; opacity: 0.7; }

    .card-top {
      display: flex; align-items: flex-start; gap: 0.875rem; padding: 0.875rem;
    }
    .card-thumb {
      width: 72px; height: 72px; border-radius: 0.625rem; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(42,61,88,0.8), rgba(22,32,50,0.9));
      display: flex; align-items: center; justify-content: center; color: #7B8794; overflow: hidden;
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.25rem; line-height: 1.3; }
    .card-meta { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.35rem; }
    .meta-chip {
      padding: 0.12rem 0.45rem; border-radius: 999px; font-size: 0.62rem; font-weight: 600;
      background: rgba(255,255,255,0.06); color: #7B8794; border: 1px solid rgba(255,255,255,0.08);
    }
    .meta-chip.gold   { background: rgba(247,162,27,0.1); color: #F7A21B; border-color: rgba(247,162,27,0.25); }
    .meta-chip.green  { background: rgba(74,222,128,0.1); color: #4ade80; border-color: rgba(74,222,128,0.2); }
    .meta-chip.red    { background: rgba(248,113,113,0.1); color: #f87171; border-color: rgba(248,113,113,0.2); }
    .meta-chip.yellow { background: rgba(251,191,36,0.1); color: #fbbf24; border-color: rgba(251,191,36,0.2); }
    .card-desc { font-size: 0.75rem; color: #7B8794; line-height: 1.5; margin-bottom: 0.35rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-seller { font-size: 0.72rem; color: #7B8794; }
    .card-seller strong { color: #F4F6FA; }

    /* Action row */
    .card-actions {
      display: flex; gap: 0.5rem; padding: 0.625rem 0.875rem;
      border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.15);
    }
    .btn-approve {
      flex: 1; padding: 0.55rem; border-radius: 0.5rem; cursor: pointer;
      background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3);
      color: #4ade80; font-family: 'Poppins', sans-serif; font-size: 0.78rem; font-weight: 700;
      transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.35rem;
    }
    .btn-approve:hover { background: rgba(74,222,128,0.2); }
    .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-reject {
      flex: 1; padding: 0.55rem; border-radius: 0.5rem; cursor: pointer;
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25);
      color: #f87171; font-family: 'Poppins', sans-serif; font-size: 0.78rem; font-weight: 700;
      transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.35rem;
    }
    .btn-reject:hover { background: rgba(248,113,113,0.18); }
    .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-unpublish {
      padding: 0.45rem 0.75rem; border-radius: 0.5rem; cursor: pointer;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #7B8794; font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600;
      transition: background 0.15s;
    }
    .btn-unpublish:hover { background: rgba(255,255,255,0.09); }

    /* Seller cards */
    .seller-card {
      background: linear-gradient(145deg, rgba(42,61,88,0.5), rgba(31,46,69,0.7));
      border: 1px solid rgba(255,255,255,0.07); border-radius: 1rem; padding: 0.875rem;
      display: flex; align-items: center; gap: 0.875rem;
    }
    .seller-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: rgba(247,162,27,0.15); border: 2px solid rgba(247,162,27,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: #F7A21B;
    }
    .seller-info { flex: 1; min-width: 0; }
    .seller-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.2rem; }
    .seller-meta { font-size: 0.72rem; color: #7B8794; }
    .btn-verify {
      padding: 0.45rem 0.875rem; border-radius: 0.5rem; cursor: pointer;
      background: rgba(41,182,217,0.1); border: 1px solid rgba(41,182,217,0.3);
      color: #29B6D9; font-family: 'Poppins', sans-serif; font-size: 0.75rem; font-weight: 700;
      white-space: nowrap; transition: background 0.15s;
    }
    .btn-verify:hover { background: rgba(41,182,217,0.2); }
    .btn-unverify {
      padding: 0.45rem 0.875rem; border-radius: 0.5rem; cursor: pointer;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #7B8794; font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600;
      white-space: nowrap;
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 3rem 1rem; color: #7B8794; }
    .empty-state svg { opacity: 0.25; margin-bottom: 0.875rem; }
    .empty-state h3 { font-size: 0.95rem; font-weight: 700; color: #F4F6FA; margin-bottom: 0.35rem; }
    .empty-state p { font-size: 0.78rem; }

    /* Skeleton */
    .skel { background: rgba(255,255,255,0.04); border-radius: 0.5rem; }
    .skel-pulse { animation: sk 1.5s ease-in-out infinite; }
    @keyframes sk { 0%,100%{opacity:0.4}50%{opacity:0.8} }
    @media (max-width: 767px) { .skel-pulse { animation: none; } }

    /* Toast */
    #toast {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: rgba(31,46,69,0.97); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.75rem; padding: 0.75rem 1.25rem; font-size: 0.82rem; font-weight: 600;
      z-index: 200; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap; max-width: 90vw;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(74,222,128,0.3); color: #4ade80; }
    #toast.error   { border-color: rgba(248,113,113,0.3); color: #f87171; }
    #toast.info    { border-color: rgba(41,182,217,0.3);  color: #29B6D9; }

    /* Responsive */
    @media (max-width: 540px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 360px) { .stats-row { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
</div>

<!-- Supervisor gate -->
<div id="supervisor-gate" role="alert">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <h2>Supervisors Only</h2>
  <p>This page is restricted to hive supervisors. Sign in as a supervisor to access the marketplace admin.</p>
  <a href="hive.html">Go to WorkHive</a>
</div>

<div id="toast" role="alert" aria-live="polite"></div>

<main class="page" id="main-content">
  <div class="page-header">
    <div>
      <h1>Marketplace Admin</h1>
      <p>Review listings, verify sellers, manage disputes</p>
    </div>
    <span class="header-badge" id="admin-role-badge">Supervisor</span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num yellow" id="stat-draft">—</div>
      <div class="stat-lbl">Pending Review</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="stat-published">—</div>
      <div class="stat-lbl">Published</div>
    </div>
    <div class="stat-card">
      <div class="stat-num blue" id="stat-sellers">—</div>
      <div class="stat-lbl">Sellers</div>
    </div>
    <div class="stat-card">
      <div class="stat-num red" id="stat-unverified">—</div>
      <div class="stat-lbl">Unverified KYB</div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="draft" role="tab" aria-selected="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Pending
      <span class="tab-count red" id="badge-draft">0</span>
    </button>
    <button class="tab-btn" data-tab="published" role="tab" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Published
      <span class="tab-count" id="badge-published">0</span>
    </button>
    <button class="tab-btn" data-tab="sellers" role="tab" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Sellers
      <span class="tab-count" id="badge-sellers">0</span>
    </button>
    <button class="tab-btn" data-tab="removed" role="tab" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Removed
      <span class="tab-count" id="badge-removed">0</span>
    </button>
    <button class="tab-btn" data-tab="disputes" role="tab" aria-selected="false" id="tab-disputes">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Disputes
      <span class="tab-count red" id="badge-disputes">0</span>
    </button>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="search-input" type="search" placeholder="Search listings or seller name…" autocomplete="off" />
  </div>

  <!-- Content area -->
  <div id="content-area" class="listing-list"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="utils.js"></script>
<script>
(function () {
  'use strict';

  /* ============================================================
     CONFIG
  ============================================================ */
  const SUPABASE_URL = 'https://hzyvnjtisfgbksicrouu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ePj-suLMwkMRVDH6eM6S8g_R0rZVbMZ';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* Set true to re-enable Disputes tab when payments are live.
     See MARKETPLACE_GO_LIVE_ROADMAP.md for the activation path. */
  const PAYMENTS_ENABLED = false;

  /* ============================================================
     IDENTITY + GATE
  ============================================================ */
  const WORKER_NAME = localStorage.getItem('wh_last_worker') || localStorage.getItem('wh_worker_name') || localStorage.getItem('workerName') || '';
  const HIVE_ID     = localStorage.getItem('wh_active_hive_id') || localStorage.getItem('wh_hive_id') || '';
  const HIVE_ROLE   = localStorage.getItem('wh_hive_role') || '';

  if (!WORKER_NAME || HIVE_ROLE !== 'supervisor') {
    document.getElementById('supervisor-gate').style.display = 'flex';
    document.getElementById('main-content').style.display   = 'none';
  }

  /* ============================================================
     UTILITIES
  ============================================================ */
  function escHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  let _toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.className = 'show ' + (type || 'info');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { el.className = ''; }, 3200);
  }

  function fmtPrice(price) {
    if (!price || Number(price) === 0) return 'Negotiable';
    return 'PHP ' + Number(price).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function initials(name) {
    return (name || '?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
  }

  /* ============================================================
     STATE
  ============================================================ */
  let _tab      = 'draft';
  let _listings = [];
  let _sellers  = [];
  let _query    = '';
  let _stats    = { draft: 0, published: 0, removed: 0, sellers: 0, unverified: 0 };

  /* ============================================================
     LOAD LISTINGS
  ============================================================ */
  async function loadListings(status) {
    showSkeletons();
    try {
      const { data, error } = await db
        .from('marketplace_listings')
        .select('id,title,description,section,category,condition,price,location,seller_name,seller_contact,image_url,status,created_at')
        .eq('status', status)
        .order('created_at', { ascending: true })
        .limit(100);
      if (error) throw error;
      _listings = data || [];
    } catch (_err) { _listings = []; }
    renderListings();
  }

  /* ============================================================
     LOAD SELLERS
  ============================================================ */
  async function loadSellers() {
    showSkeletons();
    try {
      const { data, error } = await db
        .from('marketplace_sellers')
        .select('id,worker_name,tier,kyb_verified,kyb_verified_at,cert_verified,cert_verified_at,certifications,total_sales,rating_avg,stripe_account_id,created_at')
        .order('created_at', { ascending: false })
        .limit(100);
      if (error) throw error;
      _sellers = data || [];
    } catch (_err) { _sellers = []; }
    renderSellers();
  }

  /* ============================================================
     LOAD STATS
  ============================================================ */
  async function loadStats() {
    try {
      const [draftRes, pubRes, remRes, sellersRes] = await Promise.all([
        db.from('marketplace_listings').select('id', { count: 'exact', head: true }).eq('status', 'draft'),
        db.from('marketplace_listings').select('id', { count: 'exact', head: true }).eq('status', 'published'),
        db.from('marketplace_listings').select('id', { count: 'exact', head: true }).eq('status', 'removed'),
        db.from('marketplace_sellers').select('kyb_verified', { count: 'exact' }),
      ]);
      _stats.draft      = draftRes.count  || 0;
      _stats.published  = pubRes.count    || 0;
      _stats.removed    = remRes.count    || 0;
      _stats.sellers    = sellersRes.data?.length || 0;
      _stats.unverified = (sellersRes.data || []).filter(s => !s.kyb_verified).length;
      updateStats();
    } catch (_) {}
  }

  function updateStats() {
    const s = _stats;
    const sd = document.getElementById('stat-draft');
    const sp = document.getElementById('stat-published');
    const ss = document.getElementById('stat-sellers');
    const su = document.getElementById('stat-unverified');
    const bd = document.getElementById('badge-draft');
    const bp = document.getElementById('badge-published');
    const bs = document.getElementById('badge-sellers');
    if (sd) sd.textContent = s.draft;
    if (sp) sp.textContent = s.published;
    if (ss) ss.textContent = s.sellers;
    if (su) su.textContent = s.unverified;
    if (bd) bd.textContent = s.draft;
    if (bp) bp.textContent = s.published;
    if (bs) bs.textContent = s.sellers;
  }

  /* ============================================================
     RENDER LISTINGS
  ============================================================ */
  function renderListings() {
    const e = escHtml;
    const area = document.getElementById('content-area');
    if (!area) return;

    const filtered = _listings.filter(item => {
      if (!_query) return true;
      const q = _query.toLowerCase();
      return ((item.title || '') + ' ' + (item.seller_name || '') + ' ' + (item.description || '')).toLowerCase().includes(q);
    });

    if (!filtered.length) {
      area.innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>${_tab === 'draft' ? 'No pending listings' : 'Nothing here'}</h3>
        <p>${_tab === 'draft' ? 'All listings have been reviewed.' : 'No listings with this status.'}</p>
      </div>`;
      return;
    }

    area.innerHTML = filtered.map(item => {
      const isDraft    = item.status === 'draft';
      const isPublished = item.status === 'published';
      const hasImg     = !!item.image_url;

      return `
        <div class="admin-card ${e(item.status)}" data-id="${e(item.id)}">
          <div class="card-top">
            <div class="card-thumb">
              ${hasImg
                ? `<img src="${e(item.image_url)}" alt="${e(item.title)}" loading="lazy" />`
                : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}
            </div>
            <div class="card-info">
              <div class="card-title">${e(item.title)}</div>
              <div class="card-meta">
                <span class="meta-chip gold">${e(fmtPrice(item.price))}</span>
                <span class="meta-chip">${e(item.section)}</span>
                <span class="meta-chip">${e(item.category || 'Other')}</span>
                ${item.condition ? `<span class="meta-chip">${e(item.condition)}</span>` : ''}
                ${item.location ? `<span class="meta-chip">${e(item.location)}</span>` : ''}
                <span class="meta-chip">${e(timeAgo(item.created_at))}</span>
              </div>
              <div class="card-desc">${e(item.description || 'No description.')}</div>
              <div class="card-seller">
                Seller: <strong>${e(item.seller_name)}</strong>
                ${item.seller_contact ? ` &nbsp;·&nbsp; ${e(item.seller_contact)}` : ''}
              </div>
            </div>
          </div>
          <div class="card-actions">
            ${isDraft ? `
              <button class="btn-approve" data-action="approve" data-id="${e(item.id)}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Approve
              </button>
              <button class="btn-reject" data-action="reject" data-id="${e(item.id)}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Reject
              </button>` : ''}
            ${isPublished ? `
              <button class="btn-unpublish" data-action="unpublish" data-id="${e(item.id)}">Unpublish</button>
            ` : ''}
            ${item.status === 'removed' ? `
              <button class="btn-approve" data-action="approve" data-id="${e(item.id)}">Restore</button>
            ` : ''}
          </div>
        </div>`;
    }).join('');

    area.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleListingAction(btn.dataset.action, btn.dataset.id));
    });
  }

  /* ============================================================
     RENDER SELLERS
  ============================================================ */
  function renderSellers() {
    const e = escHtml;
    const area = document.getElementById('content-area');
    if (!area) return;

    const filtered = _sellers.filter(s => {
      if (!_query) return true;
      return (s.worker_name || '').toLowerCase().includes(_query.toLowerCase());
    });

    if (!filtered.length) {
      area.innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <h3>No seller profiles yet</h3>
        <p>Sellers appear here after their first listing or Connect onboarding.</p>
      </div>`;
      return;
    }

    area.innerHTML = filtered.map(s => {
      const certs = (s.certifications || '').split('\n').map(c => c.trim()).filter(c => c);
      return `
      <div class="seller-card" data-worker="${e(s.worker_name)}" style="flex-direction:column;align-items:stretch;gap:0.625rem;">
        <div style="display:flex;align-items:center;gap:0.875rem;">
          <div class="seller-avatar">${e(initials(s.worker_name))}</div>
          <div class="seller-info">
            <div class="seller-name">${e(s.worker_name)}</div>
            <div class="seller-meta">
              Tier: <strong>${e(s.tier || 'bronze')}</strong>
              &nbsp;·&nbsp; Sales: <strong>${e(String(s.total_sales || 0))}</strong>
              ${s.kyb_verified ? ` &nbsp;·&nbsp; <span style="color:#29B6D9;">ID Verified</span>` : ''}
              ${s.cert_verified ? ` &nbsp;·&nbsp; <span style="color:#a78bfa;">Cert Verified</span>` : ''}
            </div>
          </div>
        </div>
        ${certs.length ? `
          <div style="background:rgba(0,0,0,0.2);border-radius:0.5rem;padding:0.625rem;">
            <div style="font-size:0.65rem;font-weight:700;color:${s.cert_verified ? '#a78bfa' : '#fbbf24'};text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;">
              ${s.cert_verified ? '✓ Certifications Verified' : 'Certifications Pending Review'}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:0.3rem;">
              ${certs.map(c => `<span style="padding:0.2rem 0.5rem;border-radius:999px;font-size:0.65rem;background:rgba(255,255,255,0.06);color:#F4F6FA;border:1px solid rgba(255,255,255,0.1);">${e(c)}</span>`).join('')}
            </div>
          </div>` : ''}
        <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
          ${s.kyb_verified
            ? `<button class="btn-unverify" data-action="unverify"     data-worker="${e(s.worker_name)}">Remove ID</button>`
            : `<button class="btn-verify"   data-action="verify"       data-worker="${e(s.worker_name)}">Verify ID</button>`}
          ${certs.length ? (s.cert_verified
            ? `<button class="btn-unverify" data-action="cert-unverify" data-worker="${e(s.worker_name)}">Remove Cert</button>`
            : `<button class="btn-verify"   data-action="cert-verify"   data-worker="${e(s.worker_name)}" style="background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.3);color:#a78bfa;">Verify Cert</button>`) : ''}
        </div>
      </div>`;
    }).join('');

    area.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleSellerAction(btn.dataset.action, btn.dataset.worker));
    });
  }

  /* ============================================================
     LISTING ACTIONS
  ============================================================ */
  async function handleListingAction(action, id) {
    const card = document.querySelector(`.admin-card[data-id="${id}"]`);
    const btns = card?.querySelectorAll('button');
    btns?.forEach(b => { b.disabled = true; });

    const newStatus = action === 'approve' ? 'published' : action === 'reject' ? 'removed' : 'draft';

    try {
      const { error } = await db
        .from('marketplace_listings')
        .update({ status: newStatus, updated_at: new Date().toISOString() })
        .eq('id', id);
      if (error) throw error;

      const label = action === 'approve' ? 'Approved' : action === 'reject' ? 'Rejected' : 'Unpublished';
      showToast(label + ' successfully.', action === 'approve' ? 'success' : 'info');

      /* Remove card from current list */
      _listings = _listings.filter(l => l.id !== id);
      renderListings();
      await loadStats();
    } catch (_err) {
      showToast('Action failed. Try again.', 'error');
      btns?.forEach(b => { b.disabled = false; });
    }
  }

  /* ============================================================
     SELLER VERIFICATION ACTIONS (Identity + Certifications)
  ============================================================ */
  async function handleSellerAction(action, workerName) {
    const isCert    = action === 'cert-verify' || action === 'cert-unverify';
    const verified  = action === 'verify' || action === 'cert-verify';
    const nowIso    = new Date().toISOString();

    const update = { updated_at: nowIso };
    if (isCert) {
      update.cert_verified    = verified;
      update.cert_verified_at = verified ? nowIso : null;
    } else {
      update.kyb_verified    = verified;
      update.kyb_verified_at = verified ? nowIso : null;
    }

    try {
      const { error } = await db
        .from('marketplace_sellers')
        .update(update)
        .eq('worker_name', workerName);
      if (error) throw error;

      const labelMap = {
        'verify':         workerName + ' identity verified.',
        'unverify':       'Identity removed for ' + workerName + '.',
        'cert-verify':    workerName + ' certifications verified.',
        'cert-unverify':  'Certification badge removed for ' + workerName + '.',
      };
      showToast(labelMap[action] || 'Updated.', verified ? 'success' : 'info');
      await Promise.all([loadSellers(), loadStats()]);
    } catch (_err) {
      showToast('Update failed. Try again.', 'error');
    }
  }

  /* ============================================================
     SKELETONS
  ============================================================ */
  function showSkeletons() {
    const area = document.getElementById('content-area');
    if (!area) return;
    area.innerHTML = Array(4).fill(0).map(() => `
      <div class="admin-card draft skel-pulse">
        <div class="card-top">
          <div class="skel" style="width:72px;height:72px;border-radius:0.625rem;flex-shrink:0;"></div>
          <div style="flex:1;padding-left:0.5rem;">
            <div class="skel" style="height:14px;width:65%;margin-bottom:8px;"></div>
            <div class="skel" style="height:11px;width:80%;margin-bottom:8px;"></div>
            <div class="skel" style="height:10px;width:40%;"></div>
          </div>
        </div>
        <div class="card-actions">
          <div class="skel" style="flex:1;height:34px;border-radius:0.5rem;"></div>
          <div class="skel" style="flex:1;height:34px;border-radius:0.5rem;"></div>
        </div>
      </div>`).join('');
  }

  /* ============================================================
     DISPUTES
  ============================================================ */
  let _disputes = [];

  async function loadDisputes() {
    showSkeletons();
    try {
      const { data, error } = await db
        .from('marketplace_disputes')
        .select('id,order_id,listing_id,opened_by,seller_name,reason,status,seller_reply,seller_replied_at,admin_decision,resolved_at,created_at')
        .order('created_at', { ascending: true })
        .limit(100);
      if (error) throw error;
      _disputes = data || [];
    } catch (_) { _disputes = []; }

    const bd = document.getElementById('badge-disputes');
    if (bd) bd.textContent = _disputes.filter(d => d.status === 'open' || d.status === 'seller_responded').length;
    renderDisputes();
  }

  function renderDisputes() {
    const e = escHtml;
    const area = document.getElementById('content-area');
    if (!area) return;

    const DISP_STATUS = {
      open:              { label: 'Open — Awaiting Seller', color: '#f87171' },
      seller_responded:  { label: 'Seller Responded', color: '#fbbf24' },
      admin_review:      { label: 'Admin Review', color: '#c084fc' },
      resolved_refund:   { label: 'Resolved — Refunded', color: '#4ade80' },
      resolved_release:  { label: 'Resolved — Released', color: '#29B6D9' },
    };

    const filtered = _disputes.filter(d => {
      if (!_query) return true;
      return ((d.opened_by || '') + ' ' + (d.seller_name || '') + ' ' + (d.reason || '')).toLowerCase().includes(_query.toLowerCase());
    });

    if (!filtered.length) {
      area.innerHTML = `<div class="empty-state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        <h3>No disputes</h3>
        <p>All clear — no open disputes at this time.</p>
      </div>`;
      return;
    }

    area.innerHTML = filtered.map(d => {
      const st = DISP_STATUS[d.status] || { label: d.status, color: '#7B8794' };
      const isOpen = d.status === 'open' || d.status === 'seller_responded' || d.status === 'admin_review';
      return `
        <div class="admin-card ${isOpen ? 'draft' : 'published'}" data-id="${e(d.id)}">
          <div class="card-top" style="flex-direction:column;gap:0.5rem;">
            <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
              <span style="font-size:0.85rem;font-weight:700;">${e(d.reason)}</span>
              <span class="meta-chip" style="color:${e(st.color)};border-color:${e(st.color)}40;">${e(st.label)}</span>
            </div>
            <div style="font-size:0.72rem;color:#7B8794;">
              Buyer: <strong>${e(d.opened_by)}</strong> &nbsp;·&nbsp; Seller: <strong>${e(d.seller_name)}</strong> &nbsp;·&nbsp; ${e(timeAgo(d.created_at))}
            </div>
            ${d.seller_reply ? `
              <div style="background:rgba(0,0,0,0.2);border-radius:0.5rem;padding:0.625rem;font-size:0.75rem;">
                <span style="color:#7B8794;font-size:0.68rem;font-weight:600;">SELLER REPLY</span>
                <p style="margin-top:0.25rem;color:#b0b8c4;line-height:1.5;">${e(d.seller_reply)}</p>
              </div>` : ''}
            ${d.resolved_at ? `<div style="font-size:0.72rem;color:#4ade80;">Resolved ${e(timeAgo(d.resolved_at))}</div>` : ''}
          </div>
          ${isOpen ? `
          <div class="card-actions" style="gap:0.4rem;">
            <button class="btn-approve" data-action="release" data-id="${e(d.id)}" data-order="${e(d.order_id || '')}">
              Release to Seller
            </button>
            <button class="btn-reject" data-action="refund" data-id="${e(d.id)}" data-order="${e(d.order_id || '')}">
              Refund Buyer
            </button>
            ${d.status !== 'admin_review' ? `
            <button class="btn-unpublish" data-action="escalate" data-id="${e(d.id)}">Escalate</button>` : ''}
          </div>` : ''}
        </div>`;
    }).join('');

    area.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleDisputeAction(btn.dataset.action, btn.dataset.id, btn.dataset.order || ''));
    });
  }

  async function handleDisputeAction(action, disputeId, orderId) {
    const card = document.querySelector(`.admin-card[data-id="${disputeId}"]`);
    card?.querySelectorAll('button').forEach(b => { b.disabled = true; });

    const statusMap = { release: 'resolved_release', refund: 'resolved_refund', escalate: 'admin_review' };
    const newStatus = statusMap[action];
    const isResolved = action === 'release' || action === 'refund';

    try {
      const disputeUpdate = {
        status: newStatus,
        admin_decision: action === 'release' ? 'Funds released to seller by admin' : action === 'refund' ? 'Refund issued to buyer by admin' : null,
      };
      if (isResolved) disputeUpdate.resolved_at = new Date().toISOString();

      const { error } = await db.from('marketplace_disputes').update(disputeUpdate).eq('id', disputeId);
      if (error) throw error;

      /* Update order status */
      if (isResolved && orderId) {
        await db.from('marketplace_orders')
          .update({ status: action === 'release' ? 'released' : 'refunded', updated_at: new Date().toISOString() })
          .eq('id', orderId);
      }

      const label = action === 'release' ? 'Released to seller.' : action === 'refund' ? 'Refund marked.' : 'Escalated to admin review.';
      showToast(label, 'success');
      await loadDisputes();
      await loadStats();
    } catch (_err) {
      showToast('Action failed. Try again.', 'error');
      card?.querySelectorAll('button').forEach(b => { b.disabled = false; });
    }
  }

  /* ============================================================
     TAB SWITCH
  ============================================================ */
  function switchTab(tab) {
    _tab   = tab;
    _query = '';
    const srch = document.getElementById('search-input');
    if (srch) srch.value = '';

    document.querySelectorAll('.tab-btn').forEach(btn => {
      const active = btn.dataset.tab === tab;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
    });

    if (tab === 'sellers')   loadSellers();
    else if (tab === 'disputes') loadDisputes();
    else loadListings(tab === 'removed' ? 'removed' : tab === 'published' ? 'published' : 'draft');
  }

  /* ============================================================
     INIT
  ============================================================ */
  document.addEventListener('DOMContentLoaded', async () => {
    if (HIVE_ROLE !== 'supervisor') return;

    /* Hide Disputes tab when payments disabled (no orders → no escrow disputes) */
    if (!PAYMENTS_ENABLED) {
      const disputesTab = document.getElementById('tab-disputes');
      if (disputesTab) disputesTab.style.display = 'none';
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    let _searchTimer;
    document.getElementById('search-input')?.addEventListener('input', ev => {
      _query = ev.target.value.trim();
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(() => {
        if (_tab === 'sellers')   renderSellers();
        else if (_tab === 'disputes') renderDisputes();
        else renderListings();
      }, 250);
    });

    await Promise.all([loadListings('draft'), loadStats()]);
  });

})();
</script>
<script src="nav-hub.js"></script>
</body>
</html>
