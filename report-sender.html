<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Report Sender | WorkHive</title>
  <link rel="manifest" href="report-sender-manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f1923;
      color: #F4F6FA;
      min-height: 100vh;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    /* ── Aurora (desktop only — gated in JS) ── */
    .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .aurora-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.055; }
    .aurora-blob-1 { width: 480px; height: 480px; background: #F7A21B; top: -120px; left: -80px; }
    .aurora-blob-2 { width: 380px; height: 380px; background: #29B6D9; bottom: -60px; right: -80px; }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 1rem; left: 50%;
      transform: translateX(-50%) translateY(-72px);
      background: rgba(31,46,69,0.96); color: #F4F6FA;
      padding: 0.6rem 1.25rem; border-radius: 0.625rem;
      font-size: 0.8rem; font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 200; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(14px);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Page layout ── */
    .page { position: relative; z-index: 1; max-width: 440px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* ── Header ── */
    .page-header { margin-bottom: 1.5rem; }
    .header-badge {
      display: inline-block;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 999px;
      background: rgba(247,162,27,0.14); color: #F7A21B;
      border: 1px solid rgba(247,162,27,0.28);
      margin-bottom: 0.5rem;
    }
    .page-header h1 { font-size: 1.55rem; font-weight: 800; color: #fff; line-height: 1.2; }
    .page-header p { font-size: 0.75rem; color: #7B8794; margin-top: 0.25rem; }

    /* ── Card ── */
    .card {
      background: linear-gradient(145deg, rgba(42,61,88,0.5), rgba(31,46,69,0.7));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 1rem;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.68rem; font-weight: 700;
      color: #7B8794; text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 0.75rem;
    }
    .mt-lg { margin-top: 1.5rem; }

    /* ── Chips ── */
    .chips-grid { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .chip {
      flex: 1 1 auto;
      min-width: calc(50% - 0.625rem);
      min-height: 52px;
      display: flex; align-items: center; gap: 0.625rem;
      padding: 0.75rem 0.875rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(22,32,50,0.55);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      font-family: 'Poppins', sans-serif;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem; font-weight: 500;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }
    .chip:active { transform: scale(0.96); }
    .chip.selected {
      border-color: #F7A21B;
      background: rgba(247,162,27,0.1);
      color: rgba(255,255,255,0.9);
    }
    .chip.ph3 { opacity: 0.38; }
    .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; opacity: 0.7; }
    .chip.selected .chip-dot { opacity: 1; }
    .chip-label { flex: 1; line-height: 1.25; }
    .chip-check { opacity: 0; flex-shrink: 0; transition: opacity 0.15s; }
    .chip.selected .chip-check { opacity: 1; }
    .phase-badge {
      display: inline-block;
      font-size: 0.58rem; font-weight: 700;
      padding: 0.1rem 0.4rem; border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.28);
      margin-left: auto; flex-shrink: 0;
    }
    .chips-count {
      font-size: 0.72rem; font-weight: 600;
      color: rgba(247,162,27,0.75);
      margin-top: 0.625rem; min-height: 1.1em;
    }

    /* ── Email input ── */
    .wh-input {
      background: rgba(22,32,50,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      color: #fff; padding: 0.75rem 1rem;
      width: 100%; font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .wh-input:focus { border-color: rgba(247,162,27,0.5); }
    .wh-input::placeholder { color: rgba(255,255,255,0.22); }
    .email-error { font-size: 0.7rem; color: #ef4444; margin-top: 0.375rem; min-height: 1em; }

    /* ── Contacts ── */
    .section-label-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 1.5rem; margin-bottom: 0.75rem;
    }
    .section-label-row .section-label { margin-bottom: 0; }
    .add-contact-btn {
      font-family: 'Poppins', sans-serif; font-size: 0.7rem; font-weight: 600;
      padding: 0.3rem 0.625rem; border-radius: 999px;
      background: rgba(247,162,27,0.1); border: 1px solid rgba(247,162,27,0.25);
      color: #F7A21B; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: all 0.15s;
    }
    .add-contact-btn:active { background: rgba(247,162,27,0.2); transform: scale(0.96); }

    .contacts-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.5rem; }
    .contacts-empty { font-size: 0.75rem; color: rgba(255,255,255,0.28); text-align: center; padding: 0.625rem 0; }

    .contact-chip {
      display: flex; align-items: center; gap: 0.75rem;
      background: rgba(22,32,50,0.55); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.75rem; padding: 0.625rem 0.875rem;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent; min-height: 52px;
    }
    .contact-chip:active { transform: scale(0.98); }
    .contact-chip.selected { border-color: #F7A21B; background: rgba(247,162,27,0.08); }
    .contact-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: #162032; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { display: block; font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-tag  { font-size: 0.62rem; color: rgba(255,255,255,0.35); }
    .contact-check { opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .contact-chip.selected .contact-check { opacity: 1; }
    .contact-delete {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.2); font-size: 1rem; padding: 0;
      min-width: 28px; min-height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
    }
    .contact-delete:active { background: rgba(239,68,68,0.15); color: #ef4444; }

    .one-time-label { font-size: 0.68rem; color: rgba(255,255,255,0.3); margin-bottom: 0.375rem; }

    /* ── Bottom sheet ── */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
    }
    .bottom-sheet {
      background: linear-gradient(160deg, #1f2e45, #162032);
      border: 1px solid rgba(255,255,255,0.09); border-bottom: none;
      border-radius: 1.25rem 1.25rem 0 0;
      width: 100%; max-width: 440px; margin: 0 auto;
      max-height: 80vh; display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet-handle { width: 36px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.15); margin: 0.875rem auto 0; flex-shrink: 0; }
    .sheet-header { padding: 0.875rem 1.25rem 0; flex-shrink: 0; }
    .sheet-title  { font-size: 1rem; font-weight: 700; color: #fff; }
    .sheet-body   { padding: 1rem 1.25rem; overflow-y: auto; flex: 1; }
    .sheet-field  { margin-bottom: 1rem; }
    .field-label  { display: block; font-size: 0.68rem; font-weight: 700; color: #7B8794; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.5rem; }
    .sheet-error  { font-size: 0.7rem; color: #ef4444; min-height: 1em; }
    .sheet-footer { padding: 0.75rem 1.25rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }

    .label-pills { display: flex; flex-wrap: wrap; gap: 0.375rem; }
    .label-pill {
      font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600;
      padding: 0.35rem 0.75rem; border-radius: 999px; min-height: 36px;
      background: rgba(22,32,50,0.6); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .label-pill.active { background: rgba(247,162,27,0.15); border-color: #F7A21B; color: #F7A21B; }
    .label-pill:active { transform: scale(0.95); }

    /* ── Report history ── */
    .history-section { margin-top: 1rem; }
    .history-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .history-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: rgba(22,32,50,0.35);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.75rem; padding: 0.75rem 1rem;
    }
    .history-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .history-body { flex: 1; min-width: 0; }
    .history-type    { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.8); }
    .history-meta    { font-size: 0.65rem; color: rgba(255,255,255,0.3); margin-top: 0.1rem; }
    .history-summary { font-size: 0.68rem; color: #7B8794; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .resend-btn {
      font-family: 'Poppins', sans-serif; font-size: 0.68rem; font-weight: 600;
      padding: 0.35rem 0.625rem; border-radius: 0.5rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45); cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0; min-height: 32px;
    }
    .resend-btn:hover   { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    .resend-btn:active  { transform: scale(0.95); }
    .resend-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Mic circle ── */
    .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin: 1.625rem 0 1rem; }
    .mic-circle {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.13);
      background: rgba(22,32,50,0.4);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: border-color 0.2s, opacity 0.2s, color 0.2s;
      color: rgba(255,255,255,0.28); opacity: 0.55;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .mic-circle:active { transform: scale(0.93); }

    /* ── Mic active states ── */
    .mic-circle.ready {
      opacity: 0.82; border-style: solid;
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.55);
    }
    .mic-circle.listening {
      opacity: 1; border-style: solid;
      border-color: #F7A21B; color: #F7A21B;
    }
    .mic-circle.listening::before {
      content: ''; position: absolute; inset: -8px;
      border-radius: 50%; border: 2px solid rgba(247,162,27,0.35);
      animation: mic-ripple 1.4s ease-out infinite;
      pointer-events: none;
    }
    @keyframes mic-ripple {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(1.65); opacity: 0;  }
    }
    .mic-circle.processing {
      opacity: 0.9; border-style: solid;
      border-color: rgba(247,162,27,0.4);
      color: rgba(247,162,27,0.6);
      animation: spin 1s linear infinite;
    }
    .mic-circle.set {
      opacity: 1; border-style: solid;
      border-color: #22c55e; color: #22c55e;
    }

    .mic-label { font-size: 0.7rem; color: rgba(255,255,255,0.28); text-align: center; font-weight: 500; }

    /* ── Voice context card ── */
    .voice-ctx {
      background: rgba(22,32,50,0.6);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 0.625rem;
      padding: 0.5rem 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.72rem; color: rgba(255,255,255,0.65);
      width: 100%; margin-bottom: 0.5rem;
    }
    .voice-ctx-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .voice-ctx-text { flex: 1; line-height: 1.35; font-style: italic; }
    .voice-ctx-clear {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.3); font-size: 1rem;
      padding: 0; line-height: 1; min-width: 28px; min-height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; -webkit-tap-highlight-color: transparent;
    }
    .voice-ctx-clear:active { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

    /* ── Send button ── */
    .send-btn {
      width: 100%; min-height: 48px;
      background: linear-gradient(135deg, #F7A21B, #FDB94A);
      color: #162032; font-weight: 700; border-radius: 0.75rem;
      padding: 0.875rem 1.5rem; font-size: 0.9rem;
      font-family: 'Poppins', sans-serif; border: none; cursor: pointer;
      transition: all 0.2s;
    }
    .send-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(247,162,27,0.35); }
    .send-btn:active:not(:disabled) { opacity: 0.75; transform: scale(0.98); box-shadow: none; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── State overlay base ── */
    #processing-overlay,
    #results-overlay {
      display: none; flex-direction: column; align-items: center;
      gap: 0.875rem; padding: 1.25rem 0; min-height: 320px;
    }
    .card[data-state="processing"] .main-content { display: none; }
    .card[data-state="processing"] #processing-overlay { display: flex; }
    .card[data-state="results"] .main-content { display: none; }
    .card[data-state="results"] #results-overlay { display: flex; }

    /* ── Processing state ── */
    .proc-header { display: flex; align-items: center; gap: 0.75rem; align-self: flex-start; width: 100%; }
    .spinner {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid rgba(247,162,27,0.2);
      border-top-color: #F7A21B; border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .proc-title { font-size: 0.9rem; font-weight: 700; color: #fff; }

    .proc-list { width: 100%; display: flex; flex-direction: column; gap: 0.4rem; }
    .proc-row {
      display: flex; align-items: center; gap: 0.625rem;
      background: rgba(22,32,50,0.45); border-radius: 0.625rem;
      padding: 0.625rem 0.875rem;
    }
    .proc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .proc-dot.pending { background: rgba(255,255,255,0.18); }
    .proc-dot.done { background: #22c55e; }
    .proc-dot.err { background: #ef4444; }
    .proc-dot.spin-sm {
      width: 10px; height: 10px;
      border: 1.5px solid rgba(247,162,27,0.25);
      border-top-color: #F7A21B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      background: transparent;
    }
    .proc-label { flex: 1; font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.75); }
    .proc-status { font-size: 0.7rem; }
    .proc-status.pending { color: rgba(255,255,255,0.3); }
    .proc-status.running { color: #F7A21B; }
    .proc-status.done { color: #22c55e; }
    .proc-status.err { color: #ef4444; }

    /* ── Results state ── */
    .results-header { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; text-align: center; }
    .check-circle {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(34,197,94,0.1); border: 2px solid rgba(34,197,94,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .state-title { font-size: 1rem; font-weight: 700; color: #fff; }
    .state-sub { font-size: 0.78rem; color: #7B8794; }
    /* Email status row inside results */
    .email-status {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.72rem; font-weight: 600;
      color: rgba(255,255,255,0.45);
    }
    .email-status.sent  { color: #22c55e; }
    .email-status.error { color: #ef4444; }
    .email-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(247,162,27,0.25);
      border-top-color: #F7A21B;
      animation: spin 0.8s linear infinite;
    }
    .email-dot.done { animation: none; background: #22c55e; border-color: #22c55e; }
    .email-dot.err  { animation: none; background: #ef4444; border-color: #ef4444; }
    .results-fail-note { font-size: 0.7rem; color: #ef4444; min-height: 1em; }

    .results-list {
      width: 100%; display: flex; flex-direction: column; gap: 0.4rem;
      max-height: 200px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .result-card {
      display: flex; align-items: flex-start; gap: 0.625rem;
      background: rgba(22,32,50,0.5);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.625rem; padding: 0.75rem;
      text-align: left;
    }
    .result-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 0.3rem; }
    .result-body { flex: 1; min-width: 0; }
    .result-type { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.85); margin-bottom: 0.2rem; }
    .result-summary { font-size: 0.7rem; color: #7B8794; line-height: 1.4; }

    .btn-ghost {
      font-family: 'Poppins', sans-serif; font-size: 0.8rem; font-weight: 600;
      padding: 0.625rem 1.5rem; border-radius: 0.625rem;
      border: 1px solid rgba(255,255,255,0.15); background: transparent;
      color: rgba(255,255,255,0.6); cursor: pointer;
      transition: all 0.15s; min-height: 40px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
    .btn-ghost:active { transform: scale(0.97); }

    /* ── Install icon button in header ── */
    .install-icon-btn {
      display: flex; align-items: center; gap: 0.35rem;
      font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600;
      padding: 0.45rem 0.75rem; border-radius: 0.625rem;
      background: rgba(247,162,27,0.12); border: 1px solid rgba(247,162,27,0.28);
      color: #F7A21B; cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; transition: all 0.15s;
      flex-shrink: 0; margin-top: 0.2rem;
    }
    .install-icon-btn:active { background: rgba(247,162,27,0.22); transform: scale(0.96); }
    .install-icon-btn.installed { display: none; }

    /* ── Install guide ── */
    .install-guide {
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      display: flex; align-items: flex-start; gap: 0.625rem;
      margin-bottom: 1rem;
      font-size: 0.74rem;
    }
    .install-guide.android { background: rgba(34,197,94,0.07);  border: 1px solid rgba(34,197,94,0.2);  color: rgba(255,255,255,0.65); }
    .install-guide.desktop { background: rgba(247,162,27,0.07); border: 1px solid rgba(247,162,27,0.2); color: rgba(255,255,255,0.65); }
    .install-guide.ios-sf  { background: rgba(41,182,217,0.07); border: 1px solid rgba(41,182,217,0.2); color: rgba(255,255,255,0.65); }
    .install-guide.ios-cr  { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.2);  color: rgba(255,255,255,0.65); }
    .install-guide-icon { flex-shrink: 0; margin-top: 0.1rem; }
    .install-guide-text { flex: 1; line-height: 1.55; }
    .install-guide-text strong { color: rgba(255,255,255,0.9); display: block; margin-bottom: 0.2rem; font-size: 0.78rem; }
    .install-guide-text ol { margin: 0.25rem 0 0 1rem; padding: 0; }
    .install-guide-text ol li { margin-bottom: 0.15rem; }
    .ios-hint-close {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.3); font-size: 1rem;
      padding: 0; min-width: 28px; min-height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .ios-hint-close:active { background: rgba(255,255,255,0.08); }

    /* ── Mobile overrides ── */
    @media (max-width: 480px) {
      .page { padding: 1rem 0.875rem; }
      .card { padding: 1.25rem; }
      .chip { min-height: 52px; }
      .send-btn { min-height: 52px; font-size: 0.875rem; }
      .mic-wrap { margin-bottom: max(1rem, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

  <div class="aurora" id="aurora" aria-hidden="true">
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
  </div>

  <div id="toast" role="alert" aria-live="polite"></div>

  <div class="page">
    <header class="page-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem">
        <div>
          <div class="header-badge">WorkHive</div>
          <h1>Report Sender</h1>
          <p>Select reports. Add email. Send.</p>
        </div>
        <button class="install-icon-btn" id="install-icon-btn" aria-label="Install app">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v13M8 11l4 4 4-4"/><rect x="3" y="18" width="18" height="3" rx="1"/>
          </svg>
          <span>Install</span>
        </button>
      </div>
    </header>

    <!-- Install instructions — always visible, platform-specific -->
    <div class="install-guide" id="install-guide">
      <div class="install-guide-icon" id="install-guide-icon"></div>
      <div class="install-guide-text" id="install-guide-text"></div>
    </div>

    <div class="card" id="main-card" data-state="idle">

      <!-- ── Main content ── -->
      <div class="main-content" id="main-content">

        <div class="section-label">Select Reports</div>
        <div class="chips-grid" id="chips-grid"></div>
        <div class="chips-count" id="chips-count"></div>

        <!-- Contacts -->
        <div class="section-label-row">
          <span class="section-label">Send to</span>
          <button class="add-contact-btn" id="add-contact-btn">+ Add contact</button>
        </div>
        <div class="contacts-list" id="contacts-list"></div>

        <!-- One-time email (fallback / extra recipient) -->
        <div class="one-time-label">Or type an email:</div>
        <input
          type="email" class="wh-input" id="email-input"
          placeholder="someone@company.com" autocomplete="email"
        />
        <div class="email-error" id="email-error"></div>

        <!-- Mic circle -->
        <div class="mic-wrap" id="mic-wrap">
          <button class="mic-circle" id="mic-btn" aria-label="Tap to add voice context">
            <!-- Mic icon -->
            <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.75"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <!-- Check icon (shown when context is set) -->
            <svg id="mic-check-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
          </button>
          <div class="mic-label" id="mic-label">Tap to speak context</div>
        </div>
        <!-- Voice context card — visible when context is captured -->
        <div class="voice-ctx" id="voice-ctx" style="display:none">
          <div class="voice-ctx-dot"></div>
          <span class="voice-ctx-text" id="voice-ctx-text"></span>
          <button class="voice-ctx-clear" id="voice-ctx-clear" aria-label="Clear voice context">&#x2715;</button>
        </div>

        <button class="send-btn" id="send-btn" disabled>Send Reports</button>

      </div><!-- /main-content -->

      <!-- ── Processing state ── -->
      <div id="processing-overlay">
        <div class="proc-header">
          <div class="spinner"></div>
          <div class="proc-title" id="proc-title">Generating reports...</div>
        </div>
        <div class="proc-list" id="proc-list"></div>
      </div>

      <!-- ── Results state ── -->
      <div id="results-overlay">
        <div class="results-header">
          <div class="check-circle">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                 stroke="#22c55e" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
          </div>
          <div class="state-title">Reports generated</div>
          <div class="state-sub" id="results-sub"></div>
          <!-- Email delivery status -->
          <div class="email-status" id="email-status">
            <div class="email-dot" id="email-dot"></div>
            <span id="email-status-text">Sending email...</span>
          </div>
          <div class="results-fail-note" id="results-fail-note"></div>
        </div>

        <div class="results-list" id="results-list"></div>

        <div class="state-reset" id="results-countdown"></div>
        <button class="btn-ghost" id="reset-btn">Reset now</button>
      </div>

    </div><!-- /card -->

    <!-- Report history -->
    <div class="history-section" id="history-section" style="display:none">
      <div class="section-label" style="margin-bottom:0.75rem">Recent Reports</div>
      <div class="history-list" id="history-list"></div>
    </div>

  </div><!-- /page -->

  <!-- Add Contact bottom sheet — must be in DOM before the <script> block runs -->
  <div class="sheet-overlay" id="sheet-overlay" style="display:none">
    <div class="bottom-sheet" id="contact-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h3 class="sheet-title" id="sheet-title">Add Contact</h3>
      </div>
      <div class="sheet-body">
        <div class="sheet-field">
          <label class="field-label">Name</label>
          <input type="text" class="wh-input" id="contact-name" placeholder="Juan dela Cruz" autocomplete="off"/>
        </div>
        <div class="sheet-field">
          <label class="field-label">Email</label>
          <input type="email" class="wh-input" id="contact-email" placeholder="juan@company.com"/>
        </div>
        <div class="sheet-field">
          <label class="field-label">Role</label>
          <div class="label-pills" id="label-pills">
            <button class="label-pill active" data-label="Team">Team</button>
            <button class="label-pill" data-label="Supervisor">Supervisor</button>
            <button class="label-pill" data-label="Engineer">Engineer</button>
            <button class="label-pill" data-label="Manager">Manager</button>
          </div>
        </div>
        <div class="sheet-error" id="sheet-error"></div>
      </div>
      <div class="sheet-footer">
        <button class="btn-primary" id="save-contact-btn" style="width:100%;min-height:48px;font-size:0.9rem">Save Contact</button>
        <button class="btn-ghost"   id="cancel-contact-btn" style="width:100%">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ── PWA: service worker + install prompt ──────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    let _deferredInstall = null;
    const _installBtn    = document.getElementById('install-icon-btn');
    const _installGuide  = document.getElementById('install-guide');

    // ── Platform detection ────────────────────────────────────────────────────────
    const ua           = navigator.userAgent;
    const _isStandalone = window.navigator.standalone === true ||
                          window.matchMedia('(display-mode: standalone)').matches;
    const _isIosCr      = /CriOS/.test(ua);
    const _isIos        = /iPad|iPhone|iPod/.test(ua) && !_isIosCr;
    const _isAndroid    = /Android/.test(ua);

    // Determine which guide to show
    function _getGuide() {
      if (_isIosCr) return {
        cls: 'ios-cr', color: '#ef4444',
        icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        html: `<strong>Chrome on iPhone cannot install apps</strong>Open this page in <strong>Safari</strong> instead, then tap Install.`
      };
      if (_isIos) return {
        cls: 'ios-sf', color: '#29B6D9',
        icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#29B6D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>`,
        html: `<strong>Install on iPhone (Safari)</strong><ol><li>Tap the <strong>Share</strong> icon at the bottom of Safari</li><li>Scroll down and tap <strong>Add to Home Screen</strong></li><li>Tap <strong>Add</strong></li></ol>`
      };
      if (_isAndroid) return {
        cls: 'android', color: '#22c55e',
        icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13M8 11l4 4 4-4"/><rect x="3" y="18" width="18" height="3" rx="1"/></svg>`,
        html: `<strong>Install on Android</strong><ol><li>Tap the <strong>Install</strong> button above</li><li>Tap <strong>Install</strong> in the dialog that appears</li></ol>`
      };
      return {
        cls: 'desktop', color: '#F7A21B',
        icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F7A21B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
        html: `<strong>Install on Desktop (Chrome / Edge)</strong><ol><li>Look for the <strong>install icon</strong> (&#8853; or &#x1F4BB;) in the right side of your address bar</li><li>Click it and select <strong>Install</strong></li></ol>`
      };
    }

    // Show guide immediately on load (or hide if already installed)
    if (_isStandalone) {
      _installBtn.style.display   = 'none';
      _installGuide.style.display = 'none';
    } else {
      const guide = _getGuide();
      _installGuide.className = 'install-guide ' + guide.cls;
      document.getElementById('install-guide-icon').innerHTML = guide.icon;
      document.getElementById('install-guide-text').innerHTML = guide.html;
      _installGuide.style.display = 'flex';
    }

    // Capture Android/Chrome install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _deferredInstall = e;
    });

    window.addEventListener('appinstalled', () => {
      _installBtn.style.display   = 'none';
      _installGuide.style.display = 'none';
    });

    // Install button tap — trigger native prompt on Android/desktop
    _installBtn.addEventListener('click', async () => {
      if (_deferredInstall) {
        _deferredInstall.prompt();
        const { outcome } = await _deferredInstall.userChoice;
        if (outcome === 'accepted') {
          _installBtn.style.display   = 'none';
          _installGuide.style.display = 'none';
        }
        _deferredInstall = null;
      }
    });

    // ── Config ───────────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://hzyvnjtisfgbksicrouu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ePj-suLMwkMRVDH6eM6S8g_R0rZVbMZ';

    // ── Auth gate ────────────────────────────────────────────────────────────────
    const WORKER_NAME = localStorage.getItem('wh_last_worker')
      || localStorage.getItem('wh_worker_name')
      || localStorage.getItem('workerName') || '';
    if (!WORKER_NAME) { window.location.href = 'index.html?signin=1'; }

    const HIVE_ID = localStorage.getItem('wh_active_hive_id')
      || localStorage.getItem('wh_hive_id') || null;

    // Gate aurora on mobile — WebKit animation limit
    if (window.innerWidth < 768) {
      document.getElementById('aurora').style.display = 'none';
    }

    // ── Report definitions ────────────────────────────────────────────────────────
    // phase3: true = wired when analytics-orchestrator integration ships in Phase 3
    const REPORTS = [
      { id: 'pm_overdue',      label: 'PM Overdue',       color: '#F7A21B' },
      { id: 'failure_digest',  label: 'Failure Digest',   color: '#ef4444' },
      { id: 'shift_handover',  label: 'Shift Handover',   color: '#29B6D9' },
      { id: 'predictive',      label: 'Predictive',        color: '#a78bfa' },
      { id: 'oee',             label: 'OEE Summary',       color: '#22c55e', phase3: true },
      { id: 'descriptive',     label: 'Weekly Analytics',  color: '#6366f1', phase3: true },
    ];

    // ── Supabase client ───────────────────────────────────────────────────────────
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── State ────────────────────────────────────────────────────────────────────
    const _selected         = new Set();
    let   _cardState        = 'idle';
    let   _micState         = 'hidden';
    let   _voiceContext     = null;
    let   _recognition      = null;    // Web Speech API (Android / Desktop)
    let   _mediaRecorder    = null;    // MediaRecorder API (iOS / Firefox)
    let   _audioChunks      = [];
    let   _recordingTimer   = null;
    let   _useMediaRecorder = false;
    let   _contacts         = [];
    const _selectedContacts = new Set();
    let   _selectedLabel    = 'Team';

    // ── Utils ────────────────────────────────────────────────────────────────────
    const escHtml = s => String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function isValidEmail(e) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim());
    }

    // ── Chips ────────────────────────────────────────────────────────────────────
    function renderChips() {
      const grid = document.getElementById('chips-grid');
      grid.innerHTML = REPORTS.map(r => `
        <button class="chip${_selected.has(r.id) ? ' selected' : ''}${r.phase3 ? ' ph3' : ''}"
                data-id="${escHtml(r.id)}"
                aria-pressed="${_selected.has(r.id)}"
                ${r.phase3 ? 'aria-disabled="true"' : ''}>
          <span class="chip-dot" style="background:${r.color}"></span>
          <span class="chip-label">${escHtml(r.label)}</span>
          ${r.phase3
            ? `<span class="phase-badge">Phase 3</span>`
            : `<svg class="chip-check" width="14" height="14" viewBox="0 0 24 24"
                    fill="none" stroke="${r.color}" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                 <path d="M20 6L9 17l-5-5"/>
               </svg>`
          }
        </button>
      `).join('');

      grid.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          if (_cardState !== 'idle') return;
          const id   = chip.dataset.id;
          const rpt  = REPORTS.find(x => x.id === id);
          if (rpt.phase3) {
            showToast(`${rpt.label} will be wired in Phase 3`);
            return;
          }
          if (_selected.has(id)) _selected.delete(id);
          else _selected.add(id);
          renderChips();
          updateCount();
          updateSendBtn();
        });
      });
    }

    function updateCount() {
      const n  = _selected.size;
      const el = document.getElementById('chips-count');
      el.textContent = n === 0 ? '' : `${n} report${n > 1 ? 's' : ''} selected`;
    }

    function updateSendBtn() {
      const hasReports  = _selected.size > 0;
      const hasContacts = _selectedContacts.size > 0;
      const oneTime     = document.getElementById('email-input').value.trim();
      document.getElementById('send-btn').disabled =
        !(hasReports && (hasContacts || isValidEmail(oneTime)));
    }

    // ── Report helpers ───────────────────────────────────────────────────────────
    function reportLabel(type) { return REPORTS.find(r => r.id === type)?.label || type; }
    function reportColor(type) { return REPORTS.find(r => r.id === type)?.color || '#F7A21B'; }

    function relativeTime(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)  return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days === 1) return 'Yesterday';
      return `${days}d ago`;
    }

    // ── Report history ────────────────────────────────────────────────────────────
    async function loadHistory() {
      if (!HIVE_ID) return;
      const { data, error } = await db
        .from('ai_reports')
        .select('id, report_type, summary, created_at')
        .eq('hive_id', HIVE_ID)
        .order('created_at', { ascending: false })
        .limit(5);
      if (error || !data?.length) return;
      renderHistory(data);
    }

    function renderHistory(items) {
      const section = document.getElementById('history-section');
      const list    = document.getElementById('history-list');
      if (!items?.length) { section.style.display = 'none'; return; }

      list.innerHTML = items.map(item => {
        const color   = reportColor(item.report_type);
        const label   = reportLabel(item.report_type);
        const time    = relativeTime(item.created_at);
        const summary = escHtml((item.summary || '').slice(0, 90));
        return `
          <div class="history-item">
            <div class="history-dot" style="background:${color}"></div>
            <div class="history-body">
              <div class="history-type">${escHtml(label)}</div>
              <div class="history-meta">${escHtml(time)}</div>
              ${item.summary ? `<div class="history-summary">${summary}</div>` : ''}
            </div>
            <button class="resend-btn"
                    data-type="${escHtml(item.report_type)}"
                    data-summary="${escHtml(item.summary || '')}">
              Resend
            </button>
          </div>`;
      }).join('');

      list.querySelectorAll('.resend-btn').forEach(btn => {
        btn.addEventListener('click', () =>
          resendReport(btn.dataset.type, btn.dataset.summary, btn)
        );
      });

      section.style.display = 'block';
    }

    async function resendReport(reportType, summary, btn) {
      const recipients = [];
      for (const id of _selectedContacts) {
        const c = _contacts.find(x => x.id === id);
        if (c?.email) recipients.push(c.email);
      }
      const oneTime = document.getElementById('email-input').value.trim();
      if (oneTime && isValidEmail(oneTime)) recipients.push(oneTime);

      if (!recipients.length) {
        showToast('Select a recipient first');
        return;
      }

      btn.textContent = 'Sending...';
      btn.disabled    = true;

      try {
        await Promise.allSettled(recipients.map(email =>
          fetch(`${SUPABASE_URL}/functions/v1/send-report-email`, {
            method: 'POST',
            headers: {
              'Content-Type':  'application/json',
              'apikey':        SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
            },
            body: JSON.stringify({
              hive_id:         HIVE_ID,
              recipient_email: email,
              reports:         [{ type: reportType, summary }],
              sent_at:         new Date().toISOString(),
            }),
          })
        ));
        showToast(`${reportLabel(reportType)} resent`);
      } catch {
        showToast('Resend failed');
      }

      btn.textContent = 'Resend';
      btn.disabled    = false;
    }

    // ── Contacts ─────────────────────────────────────────────────────────────────
    const AVATAR_COLORS = ['#F7A21B','#29B6D9','#a78bfa','#22c55e','#ef4444','#6366f1','#f59e0b'];

    function avatarColor(name) {
      let h = 0;
      for (const c of name) h = (h << 5) - h + c.charCodeAt(0);
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }

    function initials(name) {
      return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    async function loadContacts() {
      if (!HIVE_ID) { renderContacts(); return; }
      const { data, error } = await db
        .from('report_contacts')
        .select('id, name, email, label')
        .eq('hive_id', HIVE_ID)
        .order('created_at', { ascending: true });
      if (!error) _contacts = data || [];
      renderContacts();
    }

    function renderContacts() {
      const list = document.getElementById('contacts-list');
      if (!_contacts.length) {
        list.innerHTML = `<div class="contacts-empty">No contacts yet — tap Add contact</div>`;
        return;
      }
      list.innerHTML = _contacts.map(c => {
        const color = avatarColor(c.name);
        const sel   = _selectedContacts.has(c.id);
        return `
          <div class="contact-chip${sel ? ' selected' : ''}" data-id="${escHtml(c.id)}">
            <div class="contact-avatar" style="background:${color}">${escHtml(initials(c.name))}</div>
            <div class="contact-info">
              <span class="contact-name">${escHtml(c.name)}</span>
              <span class="contact-tag">${escHtml(c.label || 'Team')} &middot; ${escHtml(c.email || '')}</span>
            </div>
            <svg class="contact-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F7A21B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
            <button class="contact-delete" data-del="${escHtml(c.id)}" aria-label="Remove">&#x2715;</button>
          </div>`;
      }).join('');

      list.querySelectorAll('.contact-chip').forEach(chip => {
        chip.addEventListener('click', (e) => {
          if (e.target.closest('.contact-delete')) return;
          if (_cardState !== 'idle') return;
          const id = chip.dataset.id;
          if (_selectedContacts.has(id)) _selectedContacts.delete(id);
          else _selectedContacts.add(id);
          renderContacts();
          updateSendBtn();
        });
      });

      list.querySelectorAll('.contact-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteContact(btn.dataset.del);
        });
      });
    }

    async function deleteContact(id) {
      _contacts = _contacts.filter(c => c.id !== id);
      _selectedContacts.delete(id);
      renderContacts();
      updateSendBtn();
      if (HIVE_ID) {
        const { error } = await db.from('report_contacts').delete()
          .eq('id', id).eq('hive_id', HIVE_ID);
        if (error) showToast('Could not delete contact');
      }
    }

    // ── Bottom sheet ──────────────────────────────────────────────────────────────
    function openAddSheet() {
      _selectedLabel = 'Team';
      document.getElementById('contact-name').value      = '';
      document.getElementById('contact-email').value     = '';
      document.getElementById('sheet-error').textContent = '';
      document.querySelectorAll('.label-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.label === 'Team')
      );

      const overlay = document.getElementById('sheet-overlay');
      const nameInput = document.getElementById('contact-name');
      overlay.style.display = 'flex';
      // Delay focus until sheet animation completes (~300ms)
      setTimeout(() => nameInput.focus(), 300);
    }

    function closeSheet() {
      document.getElementById('sheet-overlay').style.display = 'none';
    }

    async function saveContact() {
      const name  = document.getElementById('contact-name').value.trim();
      const email = document.getElementById('contact-email').value.trim();
      const errEl = document.getElementById('sheet-error');

      if (!name)                     { errEl.textContent = 'Name is required.';        return; }
      if (!email || !isValidEmail(email)) { errEl.textContent = 'Enter a valid email.'; return; }
      errEl.textContent = '';

      const payload = { name, email, label: _selectedLabel };

      if (HIVE_ID) {
        const { data, error } = await db.from('report_contacts')
          .insert({ ...payload, hive_id: HIVE_ID })
          .select('id, name, email, label').single();
        if (error) { errEl.textContent = 'Could not save. Try again.'; return; }
        _contacts.push(data);
      } else {
        _contacts.push({ id: crypto.randomUUID(), ...payload });
      }

      closeSheet();
      renderContacts();
      updateSendBtn();
      showToast(`${name} added`);
    }

    // ── Card state machine ────────────────────────────────────────────────────────
    function setCardState(state) {
      _cardState = state;
      document.getElementById('main-card').dataset.state = state;
    }

    // ── Voice pipeline ────────────────────────────────────────────────────────────
    // Path A: Web Speech API  → Android Chrome, Desktop Chrome/Edge (instant, no upload)
    // Path B: MediaRecorder   → iOS Safari, Firefox (records audio → Groq Whisper)
    // Both paths converge at parseVoiceIntent(transcript).
    (function initSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (SR) {
        // ── Path A: Web Speech API ──────────────────────────────────────────────
        _recognition = new SR();
        _recognition.lang             = 'en-US';
        _recognition.interimResults   = false;
        _recognition.maxAlternatives  = 1;
        _recognition.continuous       = false;

        _recognition.onresult = (e) => {
          const transcript = e.results[0][0].transcript;
          setMicState('processing');
          parseVoiceIntent(transcript);
        };
        _recognition.onerror = (e) => {
          setMicState('ready');
          if (e.error !== 'no-speech') showToast('Mic error: ' + e.error);
        };
        _recognition.onend = () => {
          if (_micState === 'listening') setMicState('ready');
        };

        setMicState('ready');

      } else if (window.MediaRecorder && navigator.mediaDevices?.getUserMedia) {
        // ── Path B: MediaRecorder + Groq Whisper (iOS Safari, Firefox) ──────────
        _useMediaRecorder = true;
        setMicState('ready');

      } else {
        // No audio capability — hide mic circle silently
        document.getElementById('mic-wrap').style.display = 'none';
      }
    })();

    function setMicState(state) {
      _micState = state;
      const btn       = document.getElementById('mic-btn');
      const label     = document.getElementById('mic-label');
      const micIcon   = document.getElementById('mic-icon');
      const checkIcon = document.getElementById('mic-check-icon');
      if (!btn) return;

      btn.className = 'mic-circle' + (state !== 'hidden' ? ' ' + state : '');

      switch (state) {
        case 'ready':
          label.textContent = 'Tap to speak context';
          micIcon.style.display   = '';
          checkIcon.style.display = 'none';
          document.getElementById('voice-ctx').style.display = 'none';
          break;
        case 'listening':
          label.textContent = 'Listening...';
          micIcon.style.display   = '';
          checkIcon.style.display = 'none';
          break;
        case 'processing':
          label.textContent = 'Processing...';
          micIcon.style.display   = '';
          checkIcon.style.display = 'none';
          break;
        case 'set':
          label.textContent = 'Tap to clear';
          micIcon.style.display   = 'none';
          checkIcon.style.display = '';
          break;
      }
    }

    function startListening() {
      if (_recognition) {
        try { _recognition.start(); setMicState('listening'); }
        catch (e) { showToast('Could not start microphone'); }
      } else if (_useMediaRecorder) {
        startMediaRecorder();
      }
    }

    function stopListening() {
      if (_recognition) {
        _recognition.stop();
      } else if (_mediaRecorder?.state === 'recording') {
        clearTimeout(_recordingTimer);
        _mediaRecorder.stop();
      }
    }

    // ── MediaRecorder path (iOS Safari / Firefox) ─────────────────────────────
    async function startMediaRecorder() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = MediaRecorder.isTypeSupported('audio/mp4')
          ? 'audio/mp4'
          : MediaRecorder.isTypeSupported('audio/webm')
            ? 'audio/webm'
            : '';

        _audioChunks   = [];
        _mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);

        _mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) _audioChunks.push(e.data);
        };

        _mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const ext  = (_mediaRecorder.mimeType || 'audio/mp4').includes('webm') ? 'webm' : 'mp4';
          const blob = new Blob(_audioChunks, { type: _mediaRecorder.mimeType || 'audio/mp4' });
          setMicState('processing');
          await transcribeAndParse(blob, `voice.${ext}`);
        };

        _mediaRecorder.start();
        setMicState('listening');

        // Auto-stop after 15 seconds — enough for any voice context
        _recordingTimer = setTimeout(() => {
          if (_mediaRecorder?.state === 'recording') _mediaRecorder.stop();
        }, 15000);

      } catch (err) {
        showToast('Microphone access denied');
        setMicState('ready');
      }
    }

    async function transcribeAndParse(audioBlob, filename) {
      try {
        const form = new FormData();
        form.append('audio', audioBlob, filename);

        const resp = await fetch(`${SUPABASE_URL}/functions/v1/voice-transcribe`, {
          method:  'POST',
          headers: {
            'apikey':        SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
          },
          body: form,
        });

        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.error || `HTTP ${resp.status}`);
        }

        const { text } = await resp.json();
        if (text?.trim()) {
          await parseVoiceIntent(text.trim()); // same function as Path A
        } else {
          showToast('Could not hear you — try again');
          setMicState('ready');
        }
      } catch (err) {
        showToast('Transcription failed: ' + escHtml(String(err).slice(0, 50)));
        setMicState('ready');
      }
    }

    async function parseVoiceIntent(transcript) {
      try {
        const resp = await fetch(`${SUPABASE_URL}/functions/v1/voice-report-intent`, {
          method: 'POST',
          headers: {
            'Content-Type':  'application/json',
            'apikey':        SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
          },
          body: JSON.stringify({ transcript, hive_id: HIVE_ID }),
        });
        const data = resp.ok ? await resp.json() : null;
        _voiceContext = data ?? { notes: transcript, period_days: null, machine_filter: null, urgency: 'normal' };
      } catch {
        _voiceContext = { notes: transcript, period_days: null, machine_filter: null, urgency: 'normal' };
      }
      document.getElementById('voice-ctx-text').textContent = _voiceContext.notes || transcript;
      document.getElementById('voice-ctx').style.display = 'flex';
      setMicState('set');
    }

    function clearVoiceContext() {
      _voiceContext = null;
      document.getElementById('voice-ctx').style.display = 'none';
      setMicState('ready');
    }

    // ── Edge function call ────────────────────────────────────────────────────────
    async function generateReport(reportType) {
      const body = { report_type: reportType, hive_id: HIVE_ID };
      if (_voiceContext?.notes) body.voice_context = _voiceContext.notes;

      const resp = await fetch(`${SUPABASE_URL}/functions/v1/scheduled-agents`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify(body),
      });

      if (!resp.ok) {
        const body = await resp.text().catch(() => '');
        throw new Error(`HTTP ${resp.status}${body ? ': ' + body.slice(0, 80) : ''}`);
      }

      const data = await resp.json();
      // results[0] because we passed hive_id — exactly one hive processed
      const result = data.results?.[0];
      if (!result || result.status === 'failed') {
        throw new Error(result?.detail || 'Generation failed');
      }
      return result.summary || 'Report generated successfully.';
    }

    // ── Processing UI helpers ─────────────────────────────────────────────────────
    function renderProcList(reports) {
      document.getElementById('proc-list').innerHTML = reports.map(r => `
        <div class="proc-row" data-id="${escHtml(r.id)}">
          <div class="proc-dot spin-sm" id="pdot-${escHtml(r.id)}"></div>
          <span class="proc-label">${escHtml(r.label)}</span>
          <span class="proc-status running" id="pstatus-${escHtml(r.id)}">Generating...</span>
        </div>
      `).join('');
    }

    function updateProcRow(id, status) {
      const dot    = document.getElementById(`pdot-${id}`);
      const status_ = document.getElementById(`pstatus-${id}`);
      if (!dot || !status_) return;
      if (status === 'done') {
        dot.className     = 'proc-dot done';
        status_.className = 'proc-status done';
        status_.textContent = 'Done';
      } else {
        dot.className     = 'proc-dot err';
        status_.className = 'proc-status err';
        status_.textContent = 'Failed';
      }
    }

    // ── Results UI helpers ────────────────────────────────────────────────────────
    function renderResults(results) {
      const successes    = Object.entries(results).filter(([, v]) => v.status === 'done');
      const failedCount  = Object.values(results).filter(v => v.status === 'error').length;

      document.getElementById('results-sub').textContent =
        `${successes.length} report${successes.length !== 1 ? 's' : ''} saved to WorkHive`;
      document.getElementById('results-fail-note').textContent =
        failedCount > 0 ? `${failedCount} report${failedCount > 1 ? 's' : ''} failed to generate.` : '';
      // Reset email status to "sending" default so it's ready before sendReportEmail() runs
      setEmailStatus('sending');

      document.getElementById('results-list').innerHTML = successes.map(([id, val]) => {
        const r = REPORTS.find(x => x.id === id);
        return `
          <div class="result-card">
            <div class="result-dot" style="background:${r.color}"></div>
            <div class="result-body">
              <div class="result-type">${escHtml(r.label)}</div>
              <div class="result-summary">${escHtml(val.summary)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Send flow ─────────────────────────────────────────────────────────────────
    async function doSend() {
      if (_cardState !== 'idle') return;

      // Gather recipients — selected contacts + optional one-time email
      const recipients = [];
      for (const id of _selectedContacts) {
        const c = _contacts.find(x => x.id === id);
        if (c?.email) recipients.push(c.email);
      }
      const oneTime = document.getElementById('email-input').value.trim();
      if (oneTime && isValidEmail(oneTime)) recipients.push(oneTime);

      if (!recipients.length) {
        document.getElementById('email-error').textContent = 'Select a contact or enter an email.';
        return;
      }
      document.getElementById('email-error').textContent = '';
      localStorage.setItem('wh_last_report_email', recipients[0]);

      const reports = [..._selected]
        .map(id => REPORTS.find(r => r.id === id))
        .filter(Boolean);

      document.getElementById('proc-title').textContent =
        `Generating ${reports.length} report${reports.length > 1 ? 's' : ''}...`;
      renderProcList(reports);
      setCardState('processing');

      // Run all reports in parallel — Promise.allSettled so one failure never blocks others
      const results = {};
      await Promise.allSettled(reports.map(async (r) => {
        try {
          const summary  = await generateReport(r.id);
          results[r.id]  = { status: 'done', summary };
          updateProcRow(r.id, 'done');
        } catch (err) {
          results[r.id]  = { status: 'error', message: err.message };
          updateProcRow(r.id, 'error');
        }
      }));

      const successCount = Object.values(results).filter(v => v.status === 'done').length;

      if (successCount > 0) {
        renderResults(results);
        setCardState('results');
        loadHistory(); // refresh history with newly generated reports
        if (window.innerWidth < 768) {
          setTimeout(() => {
            document.getElementById('main-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 150);
        }
        // Send email — runs after the results panel is visible
        await sendReportEmail(results, recipients);
      } else {
        showToast('All reports failed — check connection and try again');
        setCardState('idle');
      }
    }

    // ── Email delivery ────────────────────────────────────────────────────────────
    async function sendReportEmail(results, recipients) {
      const successReports = Object.entries(results)
        .filter(([, v]) => v.status === 'done')
        .map(([id, v]) => ({ type: id, summary: v.summary }));

      if (!successReports.length) return;

      setEmailStatus('sending');

      // Send to each recipient in parallel
      try {
        await Promise.allSettled(recipients.map(email =>
          fetch(`${SUPABASE_URL}/functions/v1/send-report-email`, {
            method: 'POST',
            headers: {
              'Content-Type':  'application/json',
              'apikey':        SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
            },
            body: JSON.stringify({
              hive_id:         HIVE_ID,
              recipient_email: email,
              reports:         successReports,
              sent_at:         new Date().toISOString(),
            }),
          })
        ));

        // All sends fired via Promise.allSettled — treat as success

        const label = recipients.length === 1
          ? recipients[0]
          : `${recipients.length} recipients`;
        setEmailStatus('sent', label);
        startAutoReset(4);
      } catch (err) {
        setEmailStatus('error', err.message);
        // No auto-reset on email failure — let user read the error
      }
    }

    function setEmailStatus(status, detail) {
      const wrap   = document.getElementById('email-status');
      const dot    = document.getElementById('email-dot');
      const text   = document.getElementById('email-status-text');
      if (!wrap || !dot || !text) return;

      if (status === 'sending') {
        wrap.className = 'email-status';
        dot.className  = 'email-dot';
        text.textContent = 'Sending email...';
      } else if (status === 'sent') {
        wrap.className = 'email-status sent';
        dot.className  = 'email-dot done';
        text.textContent = `Sent to ${escHtml(detail)}`;
      } else {
        wrap.className = 'email-status error';
        dot.className  = 'email-dot err';
        text.textContent = `Email failed: ${escHtml(String(detail).slice(0, 60))}`;
      }
    }

    function startAutoReset(seconds) {
      let count    = seconds;
      const el     = document.getElementById('results-countdown');
      el.textContent = `Resetting in ${count}s`;
      const timer  = setInterval(() => {
        count--;
        if (count <= 0) { clearInterval(timer); resetPage(); }
        else { el.textContent = `Resetting in ${count}s`; }
      }, 1000);
    }

    // ── Reset ─────────────────────────────────────────────────────────────────────
    function resetPage() {
      _selected.clear();
      _selectedContacts.clear();
      renderChips();
      renderContacts();
      updateCount();
      updateSendBtn();
      document.getElementById('results-countdown').textContent = '';
      if (_micState !== 'hidden') clearVoiceContext();
      setCardState('idle');
    }

    // ── Event listeners ───────────────────────────────────────────────────────────
    document.getElementById('email-input').addEventListener('input', () => {
      document.getElementById('email-error').textContent = '';
      updateSendBtn();
    });

    document.getElementById('send-btn').addEventListener('click', doSend);

    document.getElementById('reset-btn').addEventListener('click', resetPage);

    document.getElementById('mic-btn').addEventListener('click', () => {
      if (_cardState !== 'idle') return;
      switch (_micState) {
        case 'ready':      startListening();     break;
        case 'listening':  stopListening();      break;
        case 'set':        clearVoiceContext();  break;
        case 'processing': break;
      }
    });

    document.getElementById('voice-ctx-clear').addEventListener('click', (e) => {
      e.stopPropagation();
      clearVoiceContext();
    });

    // ── Pre-fill last used email ──────────────────────────────────────────────────
    const lastEmail = localStorage.getItem('wh_last_report_email') || '';
    if (lastEmail) {
      document.getElementById('email-input').value = lastEmail;
      updateSendBtn();
    }

    // ── Contact sheet listeners ───────────────────────────────────────────────────
    document.getElementById('add-contact-btn').addEventListener('click', openAddSheet);
    document.getElementById('cancel-contact-btn').addEventListener('click', closeSheet);
    document.getElementById('save-contact-btn').addEventListener('click', saveContact);

    // Close sheet on overlay tap
    document.getElementById('sheet-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('sheet-overlay')) closeSheet();
    });

    // Label pill selection
    document.querySelectorAll('.label-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        _selectedLabel = pill.dataset.label;
        document.querySelectorAll('.label-pill').forEach(p =>
          p.classList.toggle('active', p.dataset.label === _selectedLabel)
        );
      });
    });

    // ── Init ─────────────────────────────────────────────────────────────────────
    renderChips();
    updateCount();
    loadContacts();
    loadHistory();
  </script>

  <script src="nav-hub.js"></script>
</body>
