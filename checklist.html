<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Maintenance Checklist Tool — WorkHive</title>
  <meta name="description" content="Digital PM and inspection checklist for maintenance technicians. Log work orders, track completion, and sign off faster with WorkHive." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://workhiveph.com/checklist.html" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://hzyvnjtisfgbksicrouu.supabase.co" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'orange-wh': '#F7A21B',
            'blue-wh':   '#29B6D9',
            'navy-wh':   '#162032',
          },
          fontFamily: { poppins: ['Poppins', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body {
      background-color: #162032;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(247,162,27,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(41,182,217,0.05) 0%, transparent 60%);
    }

    /* Screen management */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Card base */
    .wh-card {
      background: linear-gradient(145deg, rgba(42,61,88,0.5) 0%, rgba(31,46,69,0.7) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 1rem;
    }

    /* Selection buttons */
    .sel-btn {
      background: linear-gradient(145deg, rgba(42,61,88,0.4) 0%, rgba(31,46,69,0.6) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
      padding: 0.875rem 1rem;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      font-size: 0.875rem;
    }
    .sel-btn:hover { border-color: rgba(247,162,27,0.3); color: white; background: rgba(247,162,27,0.06); }
    .sel-btn:active { background: rgba(247,162,27,0.12); transform: scale(0.98); }
    .sel-btn.selected { border-color: rgba(247,162,27,0.5); background: rgba(247,162,27,0.1); color: white; }
    .sel-btn.selected .sel-dot { background: #F7A21B; }

    .sel-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    /* Checklist items */
    .check-item {
      background: linear-gradient(145deg, rgba(42,61,88,0.4) 0%, rgba(31,46,69,0.5) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      transition: all 0.2s;
      cursor: pointer;
      user-select: none;
    }
    .check-item:hover { border-color: rgba(255,255,255,0.12); }
    .check-item.checked { border-color: rgba(247,162,27,0.35); background: rgba(247,162,27,0.06); }
    .check-item.checked .item-label { color: rgba(255,255,255,0.45); text-decoration: line-through; }
    .check-item.required-item { border-left: 3px solid rgba(247,162,27,0.5); }
    .check-item.required-item.checked { border-left-color: #F7A21B; }

    .check-box {
      width: 36px; height: 36px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .check-item.checked .check-box {
      background: #F7A21B;
      border-color: #F7A21B;
    }

    .item-label { font-size: 0.8125rem; color: rgba(255,255,255,0.8); line-height: 1.4; }
    .item-note { font-size: 0.6875rem; color: rgba(255,255,255,0.35); margin-top: 0.25rem; }

    /* Note input inside item */
    .note-input {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.5rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.75rem;
      padding: 0.5rem 0.75rem;
      width: 100%;
      margin-top: 0.5rem;
      outline: none;
      font-family: 'Poppins', sans-serif;
    }
    .note-input:focus { border-color: rgba(247,162,27,0.3); }
    .note-input::placeholder { color: rgba(255,255,255,0.2); }

    /* Progress bar */
    .progress-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #F7A21B, #FDB94A); border-radius: 999px; transition: width 0.4s ease; }

    /* Btn styles */
    .btn-primary {
      background: linear-gradient(135deg, #F7A21B, #FDB94A);
      color: #162032;
      font-weight: 700;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      width: 100%;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(247,162,27,0.35); }
    .btn-primary:active { opacity: 0.75; transform: scale(0.98); box-shadow: none; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.2); color: white; }
    .btn-secondary:active { background: rgba(255,255,255,0.06); transform: scale(0.98); }

    /* History entries */
    .history-card {
      background: linear-gradient(145deg, rgba(42,61,88,0.4) 0%, rgba(31,46,69,0.6) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.875rem;
      padding: 1rem;
    }

    /* Badge */
    .badge-req { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(247,162,27,0.12); border: 1px solid rgba(247,162,27,0.25); color: #F7A21B; border-radius: 999px; padding: 1px 7px; flex-shrink: 0; }

    /* Input base */
    .wh-input {
      background: rgba(22,32,50,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      color: white;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      width: 100%;
      outline: none;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.2s;
    }
    .wh-input:focus { border-color: rgba(247,162,27,0.4); }
    .wh-input::placeholder { color: rgba(255,255,255,0.2); }

    /* Success check animation */
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    .pop-in { animation: popIn 0.4s ease forwards; }

    /* Fade in */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.35s ease forwards; }
  </style>
</head>
<body class="min-h-screen">

  <div class="max-w-lg mx-auto px-4 py-6">

    <!-- Top nav -->
    <div class="flex items-center justify-between mb-8">
      <button id="back-btn" onclick="handleBack()" class="flex items-center gap-2 text-white/40 hover:text-white/70 transition-colors text-sm font-medium">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        <span id="back-label">Basic Worker</span>
      </button>
      <button onclick="showScreen('history-screen')" class="text-xs text-white/35 hover:text-white/60 transition-colors font-medium flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        History
      </button>
    </div>

    <!-- Logo / title -->
    <div class="mb-8">
      <div class="flex items-center gap-2 mb-1">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background: rgba(247,162,27,0.15); border: 1px solid rgba(247,162,27,0.25);">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="#F7A21B" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        </div>
        <span class="text-xs font-bold uppercase tracking-widest text-orange-wh">WorkHive</span>
      </div>
      <h1 class="text-2xl font-black text-white">Work Checklist</h1>
      <p class="text-white/40 text-sm mt-1">Structured task execution for every job type.</p>
    </div>

    <!-- ═══ SCREEN 1: Setup ═══ -->
    <div id="setup-screen" class="screen active fade-up">

      <!-- Machine Name -->
      <div class="mb-6">
        <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Machine / Equipment Tag</label>
        <input id="machine-name" type="text" class="wh-input" placeholder="e.g. Pump-01, Conveyor B" maxlength="60" />
      </div>

      <!-- Job Type -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Job Type</label>
        <div class="flex flex-col gap-2">
          <button class="sel-btn" onclick="selectJobType(this, 'Breakdown / Corrective')">
            <div class="flex items-center gap-3">
              <span class="sel-dot"></span>
              <div>
                <p class="font-bold text-sm">Breakdown / Corrective</p>
                <p class="text-xs text-white/35 font-normal mt-0.5">Unplanned failure response and repair</p>
              </div>
            </div>
          </button>
          <button class="sel-btn" onclick="selectJobType(this, 'Preventive Maintenance')">
            <div class="flex items-center gap-3">
              <span class="sel-dot"></span>
              <div>
                <p class="font-bold text-sm">Preventive Maintenance</p>
                <p class="text-xs text-white/35 font-normal mt-0.5">Scheduled upkeep to prevent failures</p>
              </div>
            </div>
          </button>
          <button class="sel-btn" onclick="selectJobType(this, 'Project Work')">
            <div class="flex items-center gap-3">
              <span class="sel-dot"></span>
              <div>
                <p class="font-bold text-sm">Project Work</p>
                <p class="text-xs text-white/35 font-normal mt-0.5">Installation, modification, or improvement</p>
              </div>
            </div>
          </button>
        </div>
      </div>

      <!-- Category -->
      <div class="mb-6">
        <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Category</label>
        <div class="grid grid-cols-2 gap-2">
          <button class="sel-btn" onclick="selectCategory(this, 'Mechanical')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Mechanical</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'Electrical')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Electrical</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'Instrumentation')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Instrumentation</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'Civil / Structural')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Civil / Structural</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'Utilities')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Utilities</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'Automation / PLC')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Automation / PLC</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'Piping / Welding')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Piping / Welding</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'Lubrication')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>Lubrication</span></div>
          </button>
          <button class="sel-btn" onclick="selectCategory(this, 'HVAC')">
            <div class="flex items-center gap-2"><span class="sel-dot"></span><span>HVAC</span></div>
          </button>
        </div>
      </div>

      <div id="setup-error" class="text-xs text-red-400 font-medium mb-3 hidden">Please fill in machine name, job type, and category.</div>
      <button class="btn-primary" onclick="startChecklist()">Start Checklist</button>
    </div>

    <!-- ═══ SCREEN 2: Checklist ═══ -->
    <div id="checklist-screen" class="screen">

      <!-- Header -->
      <div class="wh-card p-4 mb-5 fade-up">
        <div class="flex items-start justify-between gap-3 mb-3">
          <div>
            <p id="cl-job-label" class="text-[10px] font-bold uppercase tracking-widest text-orange-wh mb-0.5"></p>
            <p id="cl-worker-label" class="text-xs text-white/40"></p>
          </div>
          <p id="cl-time-label" class="text-[10px] text-white/30 font-medium flex-shrink-0 mt-0.5"></p>
        </div>
        <div class="progress-bar">
          <div id="cl-progress" class="progress-fill" style="width:0%"></div>
        </div>
        <div class="flex justify-between mt-1.5">
          <p id="cl-progress-text" class="text-[11px] text-white/35">0 of 0 items done</p>
          <p id="cl-required-text" class="text-[11px] text-orange-wh/60"></p>
        </div>
      </div>

      <!-- Items list -->
      <div id="checklist-items" class="flex flex-col gap-2 mb-5"></div>

      <!-- Add custom item -->
      <div class="wh-card p-4 mb-5">
        <p class="text-xs font-semibold text-white/40 uppercase tracking-wider mb-3">Add Custom Item</p>
        <div class="flex gap-2">
          <input id="custom-item-input" type="text" class="wh-input text-sm" placeholder="e.g. Check coupling alignment" maxlength="120" />
          <button onclick="addCustomItem()" class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center transition-all" style="background: rgba(247,162,27,0.15); border: 1px solid rgba(247,162,27,0.25);" onmouseover="this.style.background='rgba(247,162,27,0.25)'" onmouseout="this.style.background='rgba(247,162,27,0.15)'">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="#F7A21B" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          </button>
        </div>
      </div>

      <div id="checklist-error" class="text-xs text-red-400 font-medium mb-3 hidden"></div>
      <button class="btn-primary mb-3" onclick="completeChecklist()">Complete Checklist</button>
      <button class="btn-secondary" onclick="confirmAbort()">Cancel</button>
    </div>

    <!-- ═══ SCREEN 3: Summary ═══ -->
    <div id="summary-screen" class="screen">
      <div class="text-center mb-8 fade-up">
        <div class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center pop-in" style="background: rgba(247,162,27,0.15); border: 2px solid rgba(247,162,27,0.4);">
          <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="#F7A21B" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2xl font-black text-white mb-1">Checklist Complete</h2>
        <p class="text-white/40 text-sm">Record saved to your history.</p>
      </div>

      <div id="summary-card" class="wh-card p-5 mb-5 fade-up"></div>

      <div id="summary-items" class="flex flex-col gap-2 mb-6 fade-up"></div>

      <button class="btn-primary mb-3" onclick="startNew()">Start New Checklist</button>
      <button class="btn-secondary" onclick="showScreen('history-screen')">View History</button>
    </div>

    <!-- ═══ SCREEN 4: History ═══ -->
    <div id="history-screen" class="screen">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-black text-white">History</h2>
        <button onclick="showScreen('setup-screen')" class="text-xs text-white/40 hover:text-white/70 transition-colors font-medium flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Checklist
        </button>
      </div>
      <div id="history-list" class="flex flex-col gap-3"></div>
    </div>

  </div><!-- end max-w container -->

  <!-- Abort confirm modal -->
  <div id="abort-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(10,18,28,0.8); backdrop-filter:blur(6px); display:none;">
    <div class="wh-card p-6 w-full max-w-sm text-center">
      <p class="text-white font-bold text-base mb-2">Cancel this checklist?</p>
      <p class="text-white/40 text-sm mb-5">Progress will not be saved.</p>
      <div class="flex gap-3">
        <button class="btn-secondary" onclick="closeAbort()">Keep Going</button>
        <button class="btn-primary" onclick="abortChecklist()">Yes, Cancel</button>
      </div>
    </div>
  </div>

<script>
// ─── State ───────────────────────────────────────────────
let state = {
  workerName: '',
  machineName: '',
  jobType: '',
  category: '',
  startTime: null,
  items: []  // { id, label, required, checked, note, custom }
};

// ─── Templates ───────────────────────────────────────────
const templates = {
  'Breakdown / Corrective': {
    'Mechanical': [
      { label: 'Obtain work order / verbal instruction from supervisor', required: true },
      { label: 'Isolate equipment and apply lockout/tagout (LOTO)', required: true },
      { label: 'Verify zero energy state before starting work', required: true },
      { label: 'Gather required tools and spare parts', required: false },
      { label: 'Identify root cause of failure', required: true },
      { label: 'Perform repair or replacement', required: true },
      { label: 'Inspect repaired components before reassembly', required: false },
      { label: 'Reassemble and torque bolts to spec', required: false },
      { label: 'Remove LOTO and restore equipment', required: true },
      { label: 'Run functional test and verify normal operation', required: true },
      { label: 'Clean up work area', required: false },
      { label: 'Update logbook with job details and root cause', required: true },
    ],
    'Electrical': [
      { label: 'Obtain work order / verbal instruction from supervisor', required: true },
      { label: 'De-energize circuit and apply LOTO', required: true },
      { label: 'Test for absence of voltage with meter', required: true },
      { label: 'Identify fault: open circuit, short, ground fault', required: true },
      { label: 'Replace defective component (fuse, relay, contactor, etc.)', required: true },
      { label: 'Verify correct wire connections and terminal tightness', required: true },
      { label: 'Check insulation resistance if applicable', required: false },
      { label: 'Remove LOTO and restore power', required: true },
      { label: 'Test equipment operation under load', required: true },
      { label: 'Clean panel and secure all covers', required: false },
      { label: 'Update logbook with fault description and corrective action', required: true },
    ],
    'Instrumentation': [
      { label: 'Obtain work order and P&ID reference', required: true },
      { label: 'Isolate instrument loop and apply LOTO', required: true },
      { label: 'Identify instrument fault (sensor, transmitter, loop, wiring)', required: true },
      { label: 'Replace or repair faulty instrument', required: true },
      { label: 'Perform loop calibration and zero/span check', required: true },
      { label: 'Verify signal at DCS/PLC matches field reading', required: true },
      { label: 'Restore loop to service', required: true },
      { label: 'Document calibration results in logbook', required: true },
    ],
    'Civil / Structural': [
      { label: 'Obtain work order and area safety clearance', required: true },
      { label: 'Inspect damage extent before starting repair', required: true },
      { label: 'Set up barricade or safety barriers around work area', required: true },
      { label: 'Prepare materials: concrete, grout, steel, etc.', required: false },
      { label: 'Perform repair work per specification', required: true },
      { label: 'Allow curing time if concrete/grout applied', required: false },
      { label: 'Inspect repaired area for quality', required: true },
      { label: 'Remove barricades and clean area', required: false },
      { label: 'Document repair in logbook', required: true },
    ],
    'Utilities': [
      { label: 'Identify utility system affected (air, water, steam, gas)', required: true },
      { label: 'Isolate supply and depressurize line', required: true },
      { label: 'Apply LOTO on isolation valves', required: true },
      { label: 'Repair or replace defective component', required: true },
      { label: 'Check joints for leaks after repair', required: true },
      { label: 'Restore utility and verify pressure/flow', required: true },
      { label: 'Update logbook', required: true },
    ],
    'Automation / PLC': [
      { label: 'Obtain work order and backup current PLC program', required: true },
      { label: 'Identify fault: hardware, software, or communication', required: true },
      { label: 'Apply LOTO if hardware work is required', required: true },
      { label: 'Replace faulty module or correct program fault', required: true },
      { label: 'Restore backup program and verify logic', required: true },
      { label: 'Test I/O points and interlocks', required: true },
      { label: 'Run equipment in manual then auto mode', required: true },
      { label: 'Document changes in logbook', required: true },
    ],
    'Piping / Welding': [
      { label: 'Obtain work order and hot work permit if welding', required: true },
      { label: 'Isolate and drain pipe section', required: true },
      { label: 'Apply LOTO and verify zero pressure', required: true },
      { label: 'Inspect and measure pipe for defects', required: false },
      { label: 'Perform repair: patch, coupling, or spool replacement', required: true },
      { label: 'Pressure test repaired section', required: true },
      { label: 'Inspect welds visually and for leaks', required: true },
      { label: 'Restore line to service', required: true },
      { label: 'Update logbook', required: true },
    ],
    'Lubrication': [
      { label: 'Identify equipment and lubrication point', required: true },
      { label: 'Check current lubricant condition (color, viscosity, contamination)', required: true },

// ─── UI Helpers ───────────────────────────────────────────
let selectedJobType = '';
let selectedCategory = '';

function selectJobType(btn, value) {
  document.querySelectorAll('#setup-screen .sel-btn').forEach(b => {
    if (['Breakdown / Corrective','Preventive Maintenance','Project Work'].includes(b.dataset.val)) {
      b.classList.remove('selected');
    }
  });
  // Mark all job type buttons
  document.querySelectorAll('#setup-screen .sel-btn').forEach(b => {
    if (b.onclick && b.onclick.toString().includes('selectJobType')) b.classList.remove('selected');
  });
  btn.classList.add('selected');
  selectedJobType = value;
}

function selectCategory(btn, value) {
  document.querySelectorAll('#setup-screen .sel-btn').forEach(b => {
    if (b.onclick && b.onclick.toString().includes('selectCategory')) b.classList.remove('selected');
  });
  btn.classList.add('selected');
  selectedCategory = value;
}

let currentScreen = 'setup-screen';

const backConfig = {
  'setup-screen':     { label: 'Basic Worker', action: 'home' },
  'checklist-screen': { label: 'Setup',        action: 'abort' },
  'summary-screen':   { label: 'Setup',        action: 'new-checklist' },
  'history-screen':   { label: 'Basic Worker', action: 'home' },
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  currentScreen = id;
  const cfg = backConfig[id];
  if (cfg) document.getElementById('back-label').textContent = cfg.label;
  if (id === 'history-screen') renderHistory().catch(console.error);
}

function handleBack() {
  const cfg = backConfig[currentScreen];
  if (!cfg) return;
  if (cfg.action === 'home')               { window.location.href = 'index.html'; }
  else if (cfg.action === 'abort')         { confirmAbort(); }
  else if (cfg.action === 'new-checklist') { startNew(); }
}

// ─── Start Checklist ──────────────────────────────────────
function startChecklist() {
  const machineName = document.getElementById('machine-name').value.trim();
  const err = document.getElementById('setup-error');

  if (!machineName || !selectedJobType || !selectedCategory) {
    err.classList.remove('hidden');
    return;
  }
  err.classList.add('hidden');

  state.workerName = localStorage.getItem('wh_last_worker') || 'Unknown';
  state.machineName = machineName;
  state.jobType = selectedJobType;
  state.category = selectedCategory;
  state.startTime = new Date();

  const template = (templates[selectedJobType] && templates[selectedJobType][selectedCategory]) || [];
  state.items = template.map((t, i) => ({
    id: 'tpl-' + i,
    label: t.label,
    required: t.required,
    checked: false,
    note: '',
    custom: false
  }));

  renderChecklist();
  showScreen('checklist-screen');
}

// ─── Render Checklist ─────────────────────────────────────
function renderChecklist() {
  document.getElementById('cl-job-label').textContent = state.jobType + ' · ' + state.category;
  document.getElementById('cl-worker-label').textContent = state.machineName + ' · ' + state.workerName;
  document.getElementById('cl-time-label').textContent = formatDate(state.startTime);
  renderItems();
}

function renderItems() {
  const container = document.getElementById('checklist-items');
  container.innerHTML = state.items.map((item, idx) => `
    <div class="check-item ${item.checked ? 'checked' : ''} ${item.required ? 'required-item' : ''}" id="item-${idx}">
      <div class="flex items-start gap-3" onclick="toggleItem(${idx})">
        <div class="check-box mt-0.5">
          ${item.checked ? `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="#162032" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>` : ''}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start gap-2 flex-wrap">
            <p class="item-label flex-1">${escHtml(item.label)}</p>
            ${item.required ? '<span class="badge-req mt-0.5">Required</span>' : ''}
            ${item.custom ? '<span style="font-size:0.6rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; background:rgba(41,182,217,0.1); border:1px solid rgba(41,182,217,0.25); color:#29B6D9; border-radius:999px; padding:1px 7px; flex-shrink:0;" class="mt-0.5">Custom</span>' : ''}
          </div>
        </div>
      </div>
      <div class="ml-9 mt-2" onclick="event.stopPropagation()">
        <input type="text" class="note-input" placeholder="Add a note (optional)" value="${escHtml(item.note)}"
          oninput="updateNote(${idx}, this.value)" />
      </div>
    </div>
  `).join('');
  updateProgress();
}

function toggleItem(idx) {
  state.items[idx].checked = !state.items[idx].checked;
  renderItems();
}

function updateNote(idx, val) {
  state.items[idx].note = val;
}

function updateProgress() {
  const total = state.items.length;
  const done = state.items.filter(i => i.checked).length;
  const requiredLeft = state.items.filter(i => i.required && !i.checked).length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('cl-progress').style.width = pct + '%';
  document.getElementById('cl-progress-text').textContent = `${done} of ${total} items done`;
  document.getElementById('cl-required-text').textContent = requiredLeft > 0 ? `${requiredLeft} required left` : (total > 0 ? 'All required done' : '');
}

// ─── Add Custom Item ──────────────────────────────────────
function addCustomItem() {
  const input = document.getElementById('custom-item-input');
  const val = input.value.trim();
  if (!val) return;
  state.items.push({
    id: 'custom-' + Date.now(),
    label: val,
    required: false,
    checked: false,
    note: '',
    custom: true
  });
  input.value = '';
  renderItems();
}

// Handle Enter key on custom input
document.getElementById('custom-item-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addCustomItem();
});

// ─── Complete Checklist ───────────────────────────────────
async function completeChecklist() {
  const uncheckedRequired = state.items.filter(i => i.required && !i.checked);
  const errEl = document.getElementById('checklist-error');

  if (uncheckedRequired.length > 0) {
    errEl.textContent = `${uncheckedRequired.length} required item${uncheckedRequired.length > 1 ? 's' : ''} must be completed before finishing.`;
    errEl.classList.remove('hidden');
    // Scroll to first unchecked required
    const firstIdx = state.items.findIndex(i => i.required && !i.checked);
    document.getElementById('item-' + firstIdx)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  errEl.classList.add('hidden');

  const record = {
    id: Date.now(),
    workerName: state.workerName,
    machineName: state.machineName,
    jobType: state.jobType,
    category: state.category,
    startTime: state.startTime.toISOString(),
    endTime: new Date().toISOString(),
    items: state.items.map(i => ({ label: i.label, required: i.required, checked: i.checked, note: i.note, custom: i.custom }))
  };

  await saveRecord(record);
  renderSummary(record);
  showScreen('summary-screen');
}

// ─── Supabase ─────────────────────────────────────────────
// db initialized after supabase-js CDN loads (see script block below)

async function saveRecord(record) {
  const { error } = await db.from('checklist_records').insert({
    id: record.id,
    worker_name: record.workerName,
    machine_name: record.machineName,
    job_type: record.jobType,
    category: record.category,
    start_time: record.startTime,
    end_time: record.endTime,
    items: record.items,
    hive_id: HIVE_ID
  });
  if (error) { console.error('Save error:', error.message); showToast('Checklist save failed: ' + error.message); }
}

async function getRecords() {
  const workerName = localStorage.getItem('wh_last_worker') || '';
  if (!workerName) return [];
  const { data, error } = await db
    .from('checklist_records')
    .select('*')
    .eq('worker_name', workerName)
    .order('end_time', { ascending: false });
  if (error) { console.error(error); return []; }
  return data.map(r => ({
    id: r.id, workerName: r.worker_name, machineName: r.machine_name || '—',
    jobType: r.job_type, category: r.category,
    startTime: r.start_time, endTime: r.end_time,
    items: r.items
  }));
}

              <div class="w-4 h-4 rounded flex items-center justify-center flex-shrink-0 mt-0.5" style="background:${item.checked ? 'rgba(247,162,27,0.15)' : 'rgba(255,255,255,0.04)'}; border:1px solid ${item.checked ? 'rgba(247,162,27,0.3)' : 'rgba(255,255,255,0.06)'};">
                ${item.checked ? `<svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="#F7A21B" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>` : ''}
              </div>
              <p class="text-[11px] text-white/50 leading-snug ${item.checked ? '' : 'line-through opacity-40'}">${escHtml(item.label)}${item.note ? ` <span style="color:rgba(255,255,255,0.25); font-style:italic;">: "${escHtml(item.note)}"</span>` : ''}</p>
            </div>
          `).join('')}
        </div>
      </div>`;
  }).join('');
}

function toggleHistoryDetail(idx) {
  const el = document.getElementById('hdetail-' + idx);
  el.classList.toggle('hidden');
}

// ─── Utils ────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatDate(d) {
  if (!(d instanceof Date)) d = new Date(d);
  return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' +
         d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
}
