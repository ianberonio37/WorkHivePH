<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Analytics Engine | WorkHive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.plot.ly/plotly-basic-2.26.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f1923;
      color: #F4F6FA;
      min-height: 100vh;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    /* ── Aurora ── */
    .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.06; }
    .aurora-blob-1 { width: 500px; height: 500px; background: #a78bfa; top: -100px; left: -100px; }
    .aurora-blob-2 { width: 400px; height: 400px; background: #29B6D9; bottom: 0; right: -100px; }

    /* ── Layout ── */
    .page { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* ── Header ── */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; }
    .page-header h1 { font-size: 1.4rem; font-weight: 800; color: #fff; line-height: 1.2; }
    .page-header p { font-size: 0.75rem; color: #7B8794; margin-top: 0.2rem; }
    .header-badge { font-size: 0.6rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 999px; background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); white-space: nowrap; margin-top: 0.25rem; }

    /* ── Period selector ── */
    .period-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .period-btn {
      font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600;
      padding: 0.4rem 0.875rem; border-radius: 999px; cursor: pointer; transition: all 0.15s;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
      min-height: 36px;
    }
    .period-btn.active { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.4); color: #a78bfa; }
    .refresh-btn {
      font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600;
      padding: 0.4rem 0.875rem; border-radius: 999px; cursor: pointer; transition: all 0.2s;
      background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.25); color: #a78bfa;
      min-height: 36px; margin-left: auto; display: flex; align-items: center; gap: 0.35rem;
    }
    .refresh-btn:hover { background: rgba(167,139,250,0.18); }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .refresh-btn.spinning #refresh-icon { display: inline-block; animation: spin 0.8s linear infinite; }

    /* ── Phase tabs ── */
    .phase-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0.25rem; }

    /* ── Global filter chips (Criticality + Discipline) ──────────────── */
    .global-filters {
      display: flex; flex-direction: column; gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      margin-bottom: 1rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.625rem;
    }
    .filter-group { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .filter-label {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      margin-right: 0.5rem; flex-shrink: 0;
      min-width: 80px;
    }
    .filter-chip {
      min-height: 32px;             /* visual; full row remains tappable */
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      font-size: 0.7rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .filter-chip:hover {
      background: rgba(255,255,255,0.07);
      color: #fff;
    }
    .filter-chip.active {
      background: rgba(167,139,250,0.18);
      border-color: rgba(167,139,250,0.5);
      color: #fff;
    }
    .filter-chip:active { transform: scale(0.97); }
    .filter-active-banner {
      font-size: 0.68rem;
      color: rgba(167,139,250,0.85);
      padding: 0.25rem 0.5rem;
      background: rgba(167,139,250,0.06);
      border-radius: 0.4rem;
      margin-top: 0.25rem;
    }
    /* Mobile: chips wrap; ensure horizontal scroll for long discipline list */
    @media (max-width: 600px) {
      .filter-group { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 0.25rem; }
      .filter-label { min-width: 70px; }
    }
    .phase-tab {
      font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600;
      padding: 0.5rem 0.875rem; border-radius: 0.625rem; cursor: pointer; white-space: nowrap;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4);
      transition: all 0.15s; min-height: 36px;
    }
    .phase-tab.active { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.35); color: #a78bfa; }
    .phase-tab.soon { opacity: 0.4; cursor: not-allowed; }

    /* ── Cards ── */
    .card {
      background: linear-gradient(145deg, rgba(42,61,88,0.5), rgba(31,46,69,0.7));
      border: 1px solid rgba(255,255,255,0.07); border-radius: 1rem; padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card-title { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .card-standard { font-size: 0.6rem; color: rgba(255,255,255,0.2); font-weight: 500; }

    /* ── Tables ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    .data-table th { text-align: left; color: rgba(255,255,255,0.3); font-weight: 600; padding: 0.4rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.68rem; }
    .data-table td { padding: 0.5rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.75); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table .machine-name { font-weight: 600; color: #fff; }
    .data-table .num { text-align: right; font-weight: 700; }
    .data-table .alert { color: #f87171; }
    .data-table .warn  { color: #F7A21B; }
    .data-table .good  { color: #4ade80; }

    /* ── Top-N + Show All toggle ─────────────────────────────────────────
       Long lists default to top N rows visible; the button below reveals
       the rest without re-rendering. */
    .list-with-showall { display: block; }
    .list-with-showall .cards-stack { display: flex; flex-direction: column; }
    .list-with-showall .showall-toggle {
      display: block;
      width: 100%;
      margin-top: 0.6rem;
      padding: 0.7rem 1rem;
      min-height: 44px;                    /* mobile tap target */
      background: rgba(167,139,250,0.06);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 0.625rem;
      color: rgba(167,139,250,0.85);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }
    .list-with-showall .showall-toggle:hover {
      background: rgba(167,139,250,0.12);
      border-color: rgba(167,139,250,0.35);
      color: #fff;
    }
    .list-with-showall .showall-toggle:active { transform: scale(0.99); }

    .list-with-showall .list-search {
      display: block;
      width: 100%;
      margin-bottom: 0.6rem;
      padding: 0.55rem 0.85rem;
      min-height: 38px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.5rem;
      color: #fff;
      font-size: 16px;        /* exact 16px so iOS Safari does not auto-zoom on focus */
      font-family: inherit;
      transition: border-color 0.12s, background 0.12s;
      outline: none;
      -webkit-appearance: none;
    }
    .list-with-showall .list-search::placeholder { color: rgba(255,255,255,0.3); }
    .list-with-showall .list-search:focus {
      background: rgba(255,255,255,0.06);
      border-color: rgba(167,139,250,0.5);
    }
    /* iOS Safari adds a clear button by default; keep it. */
    .list-with-showall .list-search::-webkit-search-cancel-button { cursor: pointer; }

    /* ── Stat tiles ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .stat-tile { background: rgba(255,255,255,0.04); border-radius: 0.75rem; padding: 0.875rem; border: 1px solid rgba(255,255,255,0.06); }
    .stat-tile .val { font-size: 1.5rem; font-weight: 800; color: #a78bfa; line-height: 1; }
    .stat-tile .label { font-size: 0.65rem; color: rgba(255,255,255,0.35); margin-top: 0.25rem; font-weight: 600; }

    /* ── Bar chart (CSS) ── */
    .bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .bar-label { font-size: 0.7rem; color: rgba(255,255,255,0.6); width: 120px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #a78bfa, #7c3aed); transition: width 0.6s ease; }
    .bar-val { font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.5); width: 40px; text-align: right; flex-shrink: 0; }

    /* ── Empty / loading states ── */
    .empty { text-align: center; padding: 2rem; color: rgba(255,255,255,0.25); font-size: 0.78rem; }
    .loading-card { display: flex; align-items: center; justify-content: center; gap: 0.75rem; padding: 2rem; color: rgba(255,255,255,0.35); font-size: 0.8rem; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(167,139,250,0.2); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── Collapsible card detail ── */
    .kpi-detail {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease, padding-top 0.25s ease;
      opacity: 0;
      padding-top: 0;
    }
    .kpi-detail.open {
      max-height: 800px;
      opacity: 1;
      padding-top: 0.75rem;
    }
    .kpi-toggle {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; width: 100%;
      background: none; border: none; padding: 0; text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .kpi-chevron {
      font-size: 0.65rem; color: rgba(255,255,255,0.25);
      transition: transform 0.25s ease; flex-shrink: 0; margin-left: 0.5rem;
    }
    .kpi-chevron.open { transform: rotate(180deg); }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Role selector ── */
    .role-bar { display:flex; gap:0.375rem; margin-bottom:1rem; }
    .role-btn {
      font-family:inherit; font-size:0.72rem; font-weight:600;
      padding:0.35rem 0.875rem; border-radius:999px; cursor:pointer;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.4); transition:all 0.15s; min-height:34px;
    }
    .role-btn.active { background:rgba(41,182,217,0.12); border-color:rgba(41,182,217,0.3); color:#29B6D9; }
    .role-btn .role-icon { margin-right:0.25rem; }

    /* ── Role Quick View card ── */
    .role-card {
      border-radius:1rem; padding:1rem 1.25rem; margin-bottom:1rem;
      background:linear-gradient(145deg,rgba(41,182,217,0.08),rgba(31,46,69,0.7));
      border:1px solid rgba(41,182,217,0.2);
    }
    .role-card-title { font-size:0.68rem; font-weight:700; color:#29B6D9; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.625rem; }
    .role-row { display:flex; justify-content:space-between; align-items:center; padding:0.4rem 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.75rem; }
    .role-row:last-child { border-bottom:none; }
    .role-row .label { color:rgba(255,255,255,0.45); }
    .role-row .val { font-weight:700; }

    /* In-card AI recommendation block (replaces the separate banner below) */
    .role-ai-rec {
      margin-top: 0.7rem;
      padding: 0.65rem 0.8rem;
      background: rgba(167,139,250,0.06);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 0.5rem;
    }
    .role-ai-rec-label {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: #a78bfa; margin-bottom: 0.25rem;
    }
    .role-ai-rec-text {
      font-size: 0.74rem; color: rgba(255,255,255,0.75); line-height: 1.45;
    }
    .pm-asset-select {
      font-family:'Poppins',sans-serif; font-size:0.72rem; font-weight:500;
      background:rgba(22,32,50,0.7); border:1px solid rgba(247,162,27,0.25);
      border-radius:0.5rem; color:#F7A21B; padding:0.3rem 0.6rem;
      cursor:pointer; outline:none; width:100%; margin:0.25rem 0;
    }
    .pm-asset-select option { background:#1a2e44; color:#F4F6FA; }

    /* ── Info banner ── */
    .info-banner { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.875rem 1rem; border-radius: 0.75rem; background: rgba(167,139,250,0.07); border: 1px solid rgba(167,139,250,0.15); margin-bottom: 1rem; font-size: 0.75rem; color: rgba(255,255,255,0.55); }

    /* ── Repeat failure badge ── */
    .repeat-badge { font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.4rem; border-radius: 999px; background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }

    /* ── Compliance bar ── */
    .compliance-track { height: 10px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; margin: 0.4rem 0; }
    .compliance-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: rgba(31,46,69,0.97); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem; padding: 0.75rem 1.25rem; font-size: 0.8rem;
      color: #fff; z-index: 9999; transition: transform 0.25s ease-out;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob aurora-blob-1"></div>
  <div class="aurora-blob aurora-blob-2"></div>
</div>

<div class="page">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>Analytics Engine</h1>
      <p>ISO 14224 · SMRP Metrics · Stage 3 Cyborg Worker</p>
    </div>
    <span class="header-badge">Stage 3</span>
  </div>

  <!-- Page-level controls: period selector + refresh.
       These are not role-specific so they live with the header, not inside
       each role view. -->
  <div class="period-row">
    <button class="period-btn" data-days="30" onclick="setPeriod(30, true)">30 days</button>
    <button class="period-btn active" data-days="90" onclick="setPeriod(90, true)">90 days</button>
    <button class="period-btn" data-days="180" onclick="setPeriod(180, true)">180 days</button>
    <button class="period-btn" data-days="365" onclick="setPeriod(365, true)">1 year</button>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()" title="Refresh all phases">
      <span id="refresh-icon">🔄</span>
      <span id="refresh-label">Refresh</span>
    </button>
  </div>

  <!-- Role selector — only Worker / Supervisor exist as actual hive_members.role values
       (per multitenant-engineer skill). The "Manager" tier was UI-only and showed
       reframed supervisor data — removed to reduce clutter. -->
  <div class="role-bar" id="role-bar">
    <button class="role-btn" id="role-worker"     onclick="setRole('worker')"    ><span class="role-icon">🔧</span>Field Tech</button>
    <button class="role-btn" id="role-supervisor" onclick="setRole('supervisor')"><span class="role-icon">👷</span>Supervisor</button>
  </div>

  <!-- Role Quick View (injected by JS) -->
  <div id="role-quick-view"></div>

  <!-- Status bar: last updated + loading indicator -->
  <div id="status-bar" style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;min-height:20px;">
    <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0;display:none;"></span>
    <span id="status-text" style="font-size:0.68rem;color:rgba(255,255,255,0.3);"></span>
    <div id="status-spinner" class="spinner" style="width:14px;height:14px;border-width:2px;border-color:rgba(167,139,250,0.2);border-top-color:#a78bfa;display:none;"></div>
  </div>

  <!-- Phase tabs -->
  <div class="phase-tabs">
    <button class="phase-tab active" onclick="setPhase('descriptive')">Descriptive</button>
    <button class="phase-tab" onclick="setPhase('diagnostic')">Diagnostic</button>
    <button class="phase-tab" onclick="setPhase('predictive')">Predictive</button>
    <button class="phase-tab" onclick="setPhase('prescriptive')">Prescriptive</button>
  </div>

  <!-- Global filters: narrow every panel by criticality + discipline.
       Empty / all = no filter. State persists in localStorage. -->
  <div class="global-filters" id="global-filters">
    <div class="filter-group">
      <span class="filter-label">Criticality</span>
      <button class="filter-chip active" data-dim="criticality" data-value="all"     onclick="setFilter(this)">All</button>
      <button class="filter-chip"        data-dim="criticality" data-value="Critical" onclick="setFilter(this)">🔴 Critical</button>
      <button class="filter-chip"        data-dim="criticality" data-value="High"     onclick="setFilter(this)">🟠 High</button>
      <button class="filter-chip"        data-dim="criticality" data-value="Medium"   onclick="setFilter(this)">🟡 Medium</button>
      <button class="filter-chip"        data-dim="criticality" data-value="Low"      onclick="setFilter(this)">🟢 Low</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Discipline</span>
      <button class="filter-chip active" data-dim="discipline" data-value="all"           onclick="setFilter(this)">All</button>
      <button class="filter-chip"        data-dim="discipline" data-value="Mechanical"     onclick="setFilter(this)">Mechanical</button>
      <button class="filter-chip"        data-dim="discipline" data-value="Electrical"     onclick="setFilter(this)">Electrical</button>
      <button class="filter-chip"        data-dim="discipline" data-value="Instrumentation" onclick="setFilter(this)">Instrumentation</button>
      <button class="filter-chip"        data-dim="discipline" data-value="Hydraulic"      onclick="setFilter(this)">Hydraulic</button>
      <button class="filter-chip"        data-dim="discipline" data-value="Pneumatic"      onclick="setFilter(this)">Pneumatic</button>
      <button class="filter-chip"        data-dim="discipline" data-value="Lubrication"    onclick="setFilter(this)">Lubrication</button>
    </div>
    <div id="filter-active-banner" class="filter-active-banner" style="display:none;"></div>
  </div>

  <!-- Info banner -->
  <div id="phase-banner" class="info-banner">
    <span>📊</span>
    <span>Phase 1 — Descriptive Analytics. What happened? Standards: ISO 14224:2016, SMRP Metrics.</span>
  </div>

  <!-- Results panel -->
  <div id="results-panel">
    <div class="card" style="padding:2rem;text-align:center;">
      <div class="spinner" style="width:32px;height:32px;border-width:3px;border-color:rgba(167,139,250,0.15);border-top-color:#a78bfa;margin:0 auto 1rem;"></div>
      <p style="font-size:0.8rem;color:rgba(255,255,255,0.3);">Loading analytics...</p>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="utils.js"></script>
<script>
  // ── Rotating loading messages (matches Engineering AI pattern) ────────────
  const LOADING_MESSAGES = [
    'Connecting to WorkHive Analytics AI...',
    'Fetching maintenance records from your hive...',
    'Running ISO 14224 standards-grade analysis...',
    'Computing MTBF, MTTR and Availability...',
    'Warming up analytics engine — first run may take up to 60 seconds...',
    'Cross-referencing logbook, PM, and inventory data...',
    'Applying Spearman correlation and statistical models...',
    'Building your maintenance intelligence report...',
    'Almost there...',
  ];

  let _loadingInterval = null;

  function startLoadingMessages() {
    const el = document.getElementById('loading-status-msg');
    if (!el) return;
    let idx = 0;
    el.textContent = LOADING_MESSAGES[0];
    el.style.opacity = '1';
    _loadingInterval = setInterval(() => {
      el.style.opacity = '0';
      setTimeout(() => {
        idx = (idx + 1) % LOADING_MESSAGES.length;
        el.textContent = LOADING_MESSAGES[idx];
        el.style.opacity = '1';
      }, 400);
    }, 2800);
  }

  function stopLoadingMessages() {
    if (_loadingInterval) { clearInterval(_loadingInterval); _loadingInterval = null; }
  }

  // ── Config ─────────────────────────────────────────────────────────────────

  // ── Core fetch for a single phase ─────────────────────────────────────────
  async function fetchPhase(phase) {
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/analytics-orchestrator`, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify({
          phase,
          hive_id:     HIVE_ID,
          worker_name: WORKER_NAME,
          period_days: _period,
          criticality: _filters.criticality,
          discipline:  _filters.discipline,
        }),
      });
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody.error || errBody.message || `Server error ${res.status}`);
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      _cache[phase]     = data;
      _cacheTime[phase] = Date.now();
      if (_phase === phase) {
        renderPhase(phase, data);
        updateStatusBar(phase);
      }
      renderRoleQuickView(); // update role view as data arrives
    } catch (err) {
      console.warn(`[analytics] ${phase} failed:`, err.message);
      showToast('Analysis failed — check console');
      if (_phase === phase) {
        document.getElementById('results-panel').innerHTML = `
          <div class="card"><div class="empty" style="color:#f87171;">
            ${escHtml(err.message.includes('not yet available') ? 'Analytics engine warming up — try Refresh in a moment.' : err.message)}
          </div></div>`;
      }
    }
  }

  // ── Refresh all 4 phases in parallel ──────────────────────────────────────
  async function refreshAll() {
    if (_loading) return;
    _loading = true;
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.classList.add('spinning');
    document.getElementById('refresh-label').textContent = 'Refreshing...';
    document.getElementById('status-spinner').style.display = 'block';
    document.getElementById('status-text').textContent = 'Fetching all phases in parallel...';

    showSkeleton();
    startLoadingMessages();

    // All 4 phases run simultaneously — no more 4× wait
    await Promise.allSettled(PHASES.map(p => fetchPhase(p)));

    stopLoadingMessages();
    _loading = false;
    btn.disabled = false;
    btn.classList.remove('spinning');
    document.getElementById('refresh-label').textContent = 'Refresh';
    document.getElementById('status-spinner').style.display = 'none';
    updateStatusBar(_phase);
  }

    Promise.allSettled(['diagnostic','predictive','prescriptive'].map(p => fetchPhase(p)));

  // ── Traffic Light Card Helper ─────────────────────────────────────────────

  function kpiCard({ title, standard, value, unit, sublabel, color, detail, legend }) {
    const COLORS = {
      green:  { bg: 'rgba(74,222,128,0.08)',   border: 'rgba(74,222,128,0.3)',   text: '#4ade80',  label: '✓ Healthy'  },

    };
    const c   = COLORS[color] || COLORS.grey;

          <div style="display:flex;align-items:baseline;gap:0.4rem;margin-bottom:0.15rem;">
            <span style="font-size:1.9rem;font-weight:800;line-height:1;color:${c.text};">${escHtml(String(value))}</span>
            <span style="font-size:0.78rem;color:rgba(255,255,255,0.45);">${escHtml(unit)}</span>
          </div>
          ${sublabel ? `<div style="font-size:0.67rem;color:rgba(255,255,255,0.38);">${escHtml(sublabel)}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;flex-shrink:0;margin-left:0.75rem;">
          <span style="font-size:0.63rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:999px;background:${c.bg};border:1px solid ${c.border};color:${c.text};white-space:nowrap;">${c.label}</span>
          ${detail ? `<span class="kpi-chevron${autoOpen ? ' open' : ''}" id="${id}-chevron">▼</span>` : ''}
        </div>
      </button>
      ${detail ? `
        <div class="kpi-detail${autoOpen ? ' open' : ''}" id="${id}" style="border-top:1px solid rgba(255,255,255,0.06);">
          ${detail}
          ${legend ? `<p style="font-size:0.62rem;color:rgba(255,255,255,0.2);margin-top:0.5rem;">${escHtml(legend)}</p>` : ''}
        </div>` : ''}
    </div>`;
  }

  function toggleKPI(id) {
    const detail  = document.getElementById(id);
    const chevron = document.getElementById(id + '-chevron');
    if (!detail) return;
    const isOpen = detail.classList.toggle('open');
    if (chevron) chevron.classList.toggle('open', isOpen);
    // Plotly charts inside collapsed cards render at 0px — resize on open
    if (isOpen) {
      requestAnimationFrame(() => {
        const charts = detail.querySelectorAll('[id^="chart-"]');
        charts.forEach(el => {
          try { Plotly.Plots.resize(el); } catch(e) {}
        });
      });
    }
  }

    </div>`;

  function renderMTBF(d) {
    if (!d || !d.mtbf_by_asset?.length) return cardEmpty('MTBF — Mean Time Between Failures', 'ISO 14224:2016 §9.3', 'No corrective failures found in the selected period.');
    const withData = d.mtbf_by_asset.filter(r => r.mtbf_days !== null);
    const worst    = withData[0]; // sorted lowest first
    const heroVal  = worst ? worst.mtbf_days + 'd' : '—';
    const heroColor= !worst ? 'grey' : worst.mtbf_days < 14 ? 'red' : worst.mtbf_days < 30 ? 'yellow' : 'green';

    const detail = renderListWithShowAll({

      tableHeader: '<thead><tr><th>Machine</th><th class="num">Failures</th><th class="num">MTBF</th></tr></thead>',

      itemNoun: 'asset',
      searchable: true,

        return `<tr>
          <td class="machine-name">${escHtml(r.machine)}</td>

      detail,
      legend: '🔴 <14d critical · 🟡 <30d watch · 🟢 ≥30d healthy',

    const heroColor = overall < 70 ? 'red' : overall < 85 ? 'yellow' : 'green';
    const failing = d.compliance_by_asset.filter(r => r.compliance_pct < 85);
    const rows = d.compliance_by_asset.map(r => {
      const cls = r.compliance_pct < 70 ? 'alert' : r.compliance_pct < 85 ? 'warn' : 'good';
      return `<tr>
        <td class="machine-name">${escHtml(r.asset_name)}</td>
        <td class="num">${r.completed}/${r.scheduled}</td>
        <td class="num ${cls}">${r.compliance_pct}%</td>
      </tr>`;
    }).join('');
    return kpiCard({
      title: 'PM Compliance Rate', standard: 'SMRP Metric 2.1.1',
      value: overall + '%', unit: 'overall hive',
      sublabel: failing.length ? `${failing.length} asset(s) below 85% target` : 'All assets on track',
      color: heroColor,
      detail: `<table class="data-table"><thead><tr><th>Asset</th><th class="num">Done/Sched</th><th class="num">Rate</th></tr></thead><tbody>${rows}</tbody></table>`,
      legend: '🔴 <70% · 🟡 <85% · 🟢 ≥85%',
    });
  }

  function renderFailureFrequency(d) {
    if (!d || !d.failure_frequency?.length) return cardEmpty('Failure Frequency', 'ISO 14224:2016', d?.note || 'No corrective failures in the selected period.');
    const total = d.total_failures;
    const top   = d.failure_frequency[0];
    const heroColor = total > 10 ? 'red' : total > 4 ? 'yellow' : 'green';
    const max = top?.failure_count || 1;
    const detail = renderListWithShowAll({
      items: d.failure_frequency,
      wrap: 'cards',
      defaultN: 8,
      itemNoun: 'machine',
      renderRow: (r) => {
        const pct = Math.round((r.failure_count / max) * 100);
        return `<div class="bar-row">
          <span class="bar-label" title="${escHtml(r.machine)}">${escHtml(r.machine)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span class="bar-val">${r.failure_count}</span>
        </div>`;
      },
    });
    return kpiCard({
      title: 'Failure Frequency', standard: `ISO 14224:2016 · last ${d.period_days} days`,
      value: total, unit: 'total failures',
      sublabel: top ? `${top.machine} — most failures (${top.failure_count})` : '',
      color: heroColor,
      detail,
      legend: '🔴 >10 failures · 🟡 >4 · 🟢 ≤4 in period',
    });
  }

  // ── 6. Downtime Pareto ─────────────────────────────────────────────────────
  // ── Plotly shared config ───────────────────────────────────────────────────
  const PLOTLY_BASE_LAYOUT = {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor:  'rgba(0,0,0,0)',
    font: { color: 'rgba(255,255,255,0.55)', family: 'Poppins, sans-serif', size: 11 },
    margin: { l: 10, r: 10, t: 10, b: 30 },
    xaxis: { gridcolor: 'rgba(255,255,255,0.06)', color: 'rgba(255,255,255,0.3)', zeroline: false },
    yaxis: { gridcolor: 'rgba(255,255,255,0.06)', color: 'rgba(255,255,255,0.3)', zeroline: false },
    showlegend: false,
  };
  const PLOTLY_CONFIG = { displayModeBar: false, responsive: true };

  // Deferred chart draws — called after innerHTML is set
  const _pendingCharts = [];

  function queueChart(fn) { _pendingCharts.push(fn); }

  function flushCharts() {
    // Small delay so collapsible cards that auto-open have time to expand
    setTimeout(() => {
      requestAnimationFrame(() => {
        while (_pendingCharts.length) _pendingCharts.shift()();
      });
    }, 350); // matches the CSS transition duration
  }

  function renderDowntimePareto(d) {
    if (!d || !d.pareto?.length) return cardEmpty('Downtime Pareto', '80/20 Rule', d?.note || 'No downtime_hours logged in corrective entries.');
    const top = d.pareto[0];
    const color = top.pct_of_total > 50 ? 'red' : top.pct_of_total > 30 ? 'yellow' : 'green';
    const chartId = `chart-pareto-${_kpiCardId}`;

    queueChart(() => {
      const items = d.pareto.slice(0, 8);
      const barColors = items.map((_, i) => i === 0 ? '#f87171' : i < 3 ? '#F7A21B' : '#a78bfa');
      const traces = [
        {
          type: 'bar', orientation: 'h',
          x: items.map(r => r.downtime_hours),
          y: items.map(r => r.machine),
          marker: { color: barColors },
          hovertemplate: '%{y}: %{x}h<extra></extra>',
        },
        {
          type: 'scatter', mode: 'lines+markers',
          x: items.map(r => r.cumulative_pct),
          y: items.map(r => r.machine),
          xaxis: 'x2',
          line: { color: '#4ade80', width: 2 },
          marker: { color: '#4ade80', size: 5 },
          hovertemplate: '%{y}: %{x}% cumul.<extra></extra>',
        },
      ];
      const layout = {
        ...PLOTLY_BASE_LAYOUT,
        margin: { l: 130, r: 50, t: 10, b: 30 },
        xaxis:  { ...PLOTLY_BASE_LAYOUT.xaxis, title: { text: 'Downtime (h)', font: { size: 10 } } },
        xaxis2: { overlaying: 'x', side: 'top', range: [0, 110], title: { text: 'Cumulative %', font: { size: 10 } }, color: '#4ade80', gridcolor: 'rgba(0,0,0,0)' },
        height: Math.max(180, items.length * 36),
        shapes: [{ type: 'line', x0: 80, x1: 80, y0: -0.5, y1: items.length - 0.5, xref: 'x2', line: { color: 'rgba(74,222,128,0.4)', width: 1, dash: 'dot' } }],
        annotations: [{ x: 80, y: items.length - 0.5, xref: 'x2', text: '80%', font: { color: '#4ade80', size: 9 }, showarrow: false, yshift: 8 }],
      };
      if (document.getElementById(chartId)) {
        Plotly.newPlot(chartId, traces, layout, PLOTLY_CONFIG);
      }
    });

    return kpiCard({
      title: 'Downtime Pareto', standard: '80/20 Rule',
      value: d.total_downtime_hours + 'h', unit: 'total downtime',
      sublabel: `${escHtml(d.top_machine || '—')} = ${d.top_machine_pct || 0}% of all downtime`,
      color,
      detail: `<div id="${chartId}" style="width:100%;"></div>`,
      legend: 'Green line = cumulative %. Dotted line = 80% threshold.',
    });
  }

  // ── 7. Parts Consumption ───────────────────────────────────────────────────
  function renderPartsConsumption(d) {
    if (!d || !d.consumption?.length) return cardEmpty('Parts Consumption Rate', 'SMRP', d?.note || 'No parts usage transactions found in period.');
    const list = renderListWithShowAll({
      items: d.consumption,
      tableHeader: '<thead><tr><th>Part</th><th class="num">Used</th><th class="num">Per Week</th><th class="num">Per Month</th></tr></thead>',
      defaultN: 10,
      itemNoun: 'part',
      searchable: true,
      renderRow: (r) => `<tr>
        <td class="machine-name">${escHtml(r.part_name)}</td>
        <td class="num">${r.total_used}</td>
        <td class="num">${r.per_week}/wk</td>
        <td class="num">${r.per_month}/mo</td>
      </tr>`,
    });
    return `<div class="card">
      <div class="card-title">Parts Consumption Rate <span class="card-standard">SMRP · last ${d.period_days} days</span></div>
      ${list}
    </div>`;
  }

  // ── 8. Repeat Failures ─────────────────────────────────────────────────────
  function renderRepeatFailures(d) {
    if (!d || !d.repeats?.length) {
      return `<div class="card">
        <div class="card-title">Repeat Failure Count <span class="card-standard">ISO 14224:2016</span></div>
        <div class="empty" style="padding:1rem 0;">
          <span style="color:#4ade80;">✓ No repeat failures detected.</span><br>
          <span style="font-size:0.68rem;color:rgba(255,255,255,0.2);margin-top:0.25rem;display:block;">Same root cause on same machine ≥ 2 times indicates ineffective repair.</span>
        </div>
      </div>`;
    }
    const list = renderListWithShowAll({
      items: d.repeats,
      tableHeader: '<thead><tr><th>Machine</th><th>Root Cause</th><th class="num">Count</th></tr></thead>',
      defaultN: 8,
      itemNoun: 'pair',
      renderRow: (r) => `<tr>
        <td class="machine-name">${escHtml(r.machine)}</td>
        <td style="font-size:0.72rem;color:rgba(255,255,255,0.6);">${escHtml(r.root_cause)}</td>
        <td class="num"><span class="repeat-badge">${r.occurrences}×</span></td>
      </tr>`,
    });
    return `<div class="card">
      <div class="card-title">Repeat Failure Count <span class="card-standard">ISO 14224:2016 · ${d.repeat_pair_count} repeat pair(s) found</span></div>
      ${list}
      <p style="font-size:0.65rem;color:rgba(255,255,255,0.2);margin-top:0.75rem;">${escHtml(d.note || '')}</p>
    </div>`;
  }

  // ── Render Phase 2 — Diagnostic ──────────────────────────────────────────
  function renderDiagnostic(data) {
    _kpiCardId = 0;
    const panel = document.getElementById('results-panel');
    const gen = data.generated_at ? new Date(data.generated_at).toLocaleString('en-PH') : '';
    let html = `<p style="font-size:0.68rem;color:rgba(255,255,255,0.2);margin-bottom:1rem;">Generated: ${escHtml(gen)} · Period: last ${data.period_days} days</p>`;
    // Order: root causes → recurrence → correlations (strategic→tactical) → taxonomy → QA
    html += renderFailureModeDistribution(data.failure_mode_distribution);  // top "why" signal
    html += renderRepeatFailureClustering(data.repeat_failure_clustering);  // root cause × machine = clearest action
    html += renderPMFailureCorrelation(data.pm_failure_correlation);        // strategic — does PM work?
    html += renderSkillMTTRCorrelation(data.skill_mttr_correlation);        // workforce — does skill speed up repairs?
    html += renderPartsAvailabilityImpact(data.parts_availability_impact);  // supply chain × MTTR
    html += renderRCMConsequence(data.rcm_consequence);                     // taxonomy — useful but least actionable
    html += renderEngineeringValidation(data.engineering_validation);       // sanity / data quality — last
    panel.innerHTML = html;
    flushCharts();
  }

  function renderRCMConsequence(d) {
    if (!d?.distribution?.length || d.distribution.every(x => x.count === 0)) {
      return `<div class="card">
        <div class="card-title">RCM Consequence Classification <span class="card-standard">SAE JA1011 §5.4</span></div>
        <div class="empty" style="padding:1rem 0;">${escHtml(d?.note || 'No consequence data yet. Select impact level in Breakdown entries.')}</div>
      </div>`;
    }
    const COLORS = { 'Stopped production':'#f87171','Safety risk':'#f87171','Running reduced':'#F7A21B','Hidden':'#a78bfa' };
    const total = d.recorded_count || 1;
    const bars = d.distribution.filter(r => r.count > 0).map(r => {
      const pct = Math.round(r.count / total * 100);
      const color = COLORS[r.consequence] || '#a78bfa';
      return `<div class="bar-row">
        <span class="bar-label" style="width:140px;">${escHtml(r.consequence)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
        <span class="bar-val">${r.count} (${r.pct_of_recorded}%)</span>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="card-title">RCM Consequence Classification <span class="card-standard">SAE JA1011 §5.4 · ${d.coverage_pct}% coverage</span></div>
      ${bars}
      <p style="font-size:0.65rem;color:rgba(255,255,255,0.2);margin-top:0.5rem;">${d.recorded_count} of ${d.total_failures} failures have consequence recorded. Coverage improves as team fills impact level on Breakdown entries.</p>
    </div>`;
  }

  function renderFailureModeDistribution(d) {
    if (!d?.distribution?.length) return cardEmpty('Failure Mode Distribution', 'ISO 14224:2016', d?.note || 'No root_cause data found.');
    const max = d.distribution[0]?.count || 1;
    const bars = d.distribution.slice(0, 8).map(r => {
      const pct = Math.round((r.count / max) * 100);
      return `<div class="bar-row">
        <span class="bar-label" title="${escHtml(r.root_cause)}">${escHtml(r.root_cause)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="bar-val">${r.count} (${r.pct_of_total}%)</span>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="card-title">Failure Mode Distribution <span class="card-standard">ISO 14224:2016 · ${d.total_failures} total failures</span></div>
      ${bars}
      <p style="font-size:0.65rem;color:rgba(255,255,255,0.2);margin-top:0.5rem;">Top mode: <strong style="color:#a78bfa">${escHtml(d.top_root_cause || '—')}</strong> accounts for ${d.top_root_cause_pct || 0}% of all failures.</p>
    </div>`;
  }

  function renderPMFailureCorrelation(d) {
    if (!d) return cardEmpty('PM-Failure Correlation', 'Spearman rank', 'No data.');
    const sig = d.significant;
    const corr = d.correlation;
    const cls = sig ? (corr > 0.3 ? 'alert' : 'warn') : 'good';
    return `<div class="card">
      <div class="card-title">PM-Failure Correlation <span class="card-standard">Spearman rank (SciPy)</span></div>
      ${corr !== null ? `
        <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:0.75rem;">
          <div class="stat-tile"><div class="val ${cls}">${corr}</div><div class="label">Correlation r</div></div>
          <div class="stat-tile"><div class="val" style="color:rgba(255,255,255,0.6)">${d.p_value}</div><div class="label">P-value</div></div>
          <div class="stat-tile"><div class="val" style="color:${sig ? '#f87171' : '#4ade80'}">${sig ? 'YES' : 'NO'}</div><div class="label">Significant?</div></div>
        </div>` : ''}
      <p style="font-size:0.75rem;color:rgba(255,255,255,0.6);line-height:1.5;">${escHtml(d.interpretation || d.note || '')}</p>
      ${d.data_points ? `<p style="font-size:0.65rem;color:rgba(255,255,255,0.2);margin-top:0.5rem;">${d.data_points} machines analysed</p>` : ''}
    </div>`;
  }

  function renderSkillMTTRCorrelation(d) {
    if (!d?.by_discipline?.length) return cardEmpty('Skill-MTTR Correlation', 'Spearman rank (SciPy)', d?.note || 'Insufficient data — need workers with both skill badges and repair history.');
    const cards = d.by_discipline.map(disc => {
      const sig = disc.significant;
      const cls = sig && disc.correlation < -0.3 ? 'good' : sig ? 'warn' : '';
      return `<div style="margin-bottom:0.875rem;padding-bottom:0.875rem;border-bottom:1px solid rgba(255,255,255,0.05);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem;">
          <span style="font-size:0.8rem;font-weight:700;color:#fff;">${escHtml(disc.discipline)}</span>
          <span class="${cls}" style="font-size:0.72rem;font-weight:700;">r = ${disc.correlation} ${sig ? '✓' : ''}</span>
        </div>
        <p style="font-size:0.7rem;color:rgba(255,255,255,0.5);">${escHtml(disc.interpretation)}</p>
        ${disc.by_level.map(l => `<span style="font-size:0.65rem;color:rgba(255,255,255,0.35);margin-right:0.75rem;">L${l.level}: ${l.avg_mttr}h avg</span>`).join('')}
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="card-title">Skill-MTTR Correlation <span class="card-standard">Spearman rank by discipline</span></div>
      ${cards}
    </div>`;
  }

  function renderPartsAvailabilityImpact(d) {
    if (!d) return cardEmpty('Parts Availability Impact', 'Cross-reference', 'No data.');
    const rows = (d.high_downtime_jobs || []).map(j => `<tr>
      <td class="machine-name">${escHtml(j.machine)}</td>
      <td class="num alert">${j.downtime_hours}h</td>
      <td class="num">${j.above_avg_by_h > 0 ? '+' : ''}${j.above_avg_by_h}h</td>
      <td style="font-size:0.68rem;color:rgba(255,255,255,0.4);">${escHtml(j.date)}</td>
    </tr>`).join('');
    return `<div class="card">
      <div class="card-title">Parts Availability Impact <span class="card-standard">logbook × inventory cross-reference</span></div>
      <div class="stat-grid" style="margin-bottom:0.75rem;">
        <div class="stat-tile"><div class="val">${d.overall_avg_mttr_h}h</div><div class="label">Avg MTTR</div></div>
        <div class="stat-tile"><div class="val">${d.median_mttr_h}h</div><div class="label">Median MTTR</div></div>
      </div>
      ${rows ? `<table class="data-table"><thead><tr><th>Machine</th><th class="num">Downtime</th><th class="num">Above avg</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table>` : ''}
      <p style="font-size:0.65rem;color:rgba(255,255,255,0.2);margin-top:0.75rem;">${escHtml(d.note || '')}</p>
    </div>`;
  }

  function renderRepeatFailureClustering(d) {
    if (!d?.clusters?.length) return cardEmpty('Repeat Failure Clustering', 'ISO 14224:2016', 'No root_cause data to cluster.');
    const systemic = (d.systemic_issues || []).map(s => `
      <div style="margin-bottom:0.5rem;padding:0.5rem;background:rgba(248,113,113,0.06);border-radius:0.5rem;border:1px solid rgba(248,113,113,0.15);">
        <div style="font-size:0.75rem;font-weight:600;color:#f87171;">${escHtml(s.root_cause)}</div>
        <div style="font-size:0.65rem;color:rgba(255,255,255,0.4);margin-top:0.2rem;">Affects ${s.machine_count} machines: ${s.machines.map(m => escHtml(m)).join(', ')} · ${s.total_occurrences} occurrences</div>
      </div>`).join('');
    return `<div class="card">
      <div class="card-title">Repeat Failure Clustering <span class="card-standard">ISO 14224:2016 · ${d.systemic_count} systemic issue(s)</span></div>
      ${systemic || '<p style="font-size:0.75rem;color:#4ade80;">✓ No systemic failures detected across machines.</p>'}
      <p style="font-size:0.65rem;color:rgba(255,255,255,0.2);margin-top:0.75rem;">${escHtml(d.insight || '')}</p>
    </div>`;
  }

  function renderEngineeringValidation(d) {
    if (!d?.flagged?.length) return `<div class="card">
      <div class="card-title">Engineering Validation <span class="card-standard">WAT pattern — engineering_calcs × logbook</span></div>
      <div class="empty" style="padding:1rem 0;color:#4ade80;">✓ ${escHtml(d?.note || 'No matches found between failure history and engineering calc records.')}</div>
    </div>`;
    const rows = d.flagged.map(f => `
      <div style="margin-bottom:0.75rem;padding:0.75rem;background:rgba(247,162,27,0.06);border-radius:0.75rem;border:1px solid rgba(247,162,27,0.15);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;margin-bottom:0.3rem;">
          <span style="font-size:0.8rem;font-weight:700;color:#fff;">${escHtml(f.machine)}</span>
          <span class="warn" style="font-size:0.68rem;font-weight:700;">${f.failure_count} failures · ${f.total_downtime_h}h DT</span>
        </div>
        <div style="font-size:0.68rem;color:rgba(255,255,255,0.4);">Matched calc: ${escHtml(f.matched_calc)}</div>
        <p style="font-size:0.7rem;color:rgba(255,255,255,0.55);margin-top:0.3rem;">${escHtml(f.recommendation)}</p>
      </div>`).join('');
    return `<div class="card">
      <div class="card-title">Engineering Validation <span class="card-standard">WAT pattern — ${d.flagged_count} match(es) flagged</span></div>
      ${rows}
    </div>`;
  }

  // ── Render Phase 3 — Predictive ──────────────────────────────────────────
  function renderPredictive(data) {
    _kpiCardId = 0;
    const panel = document.getElementById('results-panel');
    const gen = data.generated_at ? new Date(data.generated_at).toLocaleString('en-PH') : '';
    let html = `<p style="font-size:0.68rem;color:rgba(255,255,255,0.2);margin-bottom:1rem;">Generated: ${escHtml(gen)} · Period: last ${data.period_days} days</p>`;
    // Order: trend → specific predictions → triage → realtime sensors → schedule → supply → leading indicator
    html += renderFailureTrend(data.failure_trend);                  // high-altitude direction
    html += renderNextFailureDates(data.next_failure_dates);         // specific assets + dates — most actionable
    html += renderHealthScores(data.health_scores);                  // per-asset composite for triage
    html += renderAnomalyBaseline(data.anomaly_baseline);            // sensors flagging something off NOW
    html += renderPMDueCalendar(data.pm_due_calendar);               // scheduled work coming up
    html += renderPartsStockout(data.parts_stockout);                // supply chain forecast
    html += renderPartsSpike(data.parts_consumption_spike);          // early-warning indicator — secondary signal
    panel.innerHTML = html;
    flushCharts();
  }

  function renderPartsSpike(d) {
    if (!d?.spikes?.length) return `<div class="card">
      <div class="card-title">Parts Consumption Spike <span class="card-standard">Rule-based · current vs previous period</span></div>
      <div class="empty" style="color:#4ade80;padding:1rem 0;">✓ No consumption spikes detected. Parts usage is consistent with the previous period.</div>
    </div>`;

    const color = d.critical_count > 0 ? 'red' : 'yellow';
    const detail = renderListWithShowAll({
      items: d.spikes,
      wrap: 'cards',
      defaultN: 6,
      itemNoun: 'part',
      searchable: true,
      renderRow: (s) => {
        const sColor = s.signal === 'CRITICAL' ? '#f87171' : s.signal === 'NEW_USAGE' ? '#29B6D9' : '#F7A21B';
        return `<div style="padding:0.6rem 0;border-bottom:1px solid rgba(255,255,255,0.05);">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;margin-bottom:0.2rem;">
            <span style="font-size:0.78rem;font-weight:700;color:#fff;">${escHtml(s.part_name)}</span>
            <span style="font-size:0.65rem;font-weight:700;color:${sColor};white-space:nowrap;flex-shrink:0;">
              ${s.spike_factor ? s.spike_factor + '× spike' : 'New usage'}
            </span>
          </div>
          <div style="font-size:0.68rem;color:rgba(255,255,255,0.4);margin-bottom:0.25rem;">
            Now: ${s.current_rate}/mo ${s.previous_rate > 0 ? `· Before: ${s.previous_rate}/mo` : '· No prior usage'}
          </div>
          <p style="font-size:0.7rem;color:rgba(255,255,255,0.55);">${escHtml(s.interpretation)}</p>
        </div>`;
      },
    });

    return kpiCard({
      title: 'Parts Consumption Spike',
      standard: 'Rule-based — Predictive Analytics Stage 2',
      value: d.spike_count,
      unit: `part${d.spike_count !== 1 ? 's' : ''} with unusual consumption`,
      sublabel: d.critical_count > 0
        ? `${d.critical_count} CRITICAL — inspect assets using these parts immediately`
        : 'Consumption rising — schedule inspection before next failure',
      color,
      detail,
      legend: 'Spike = current period rate ≥ 2× previous period. Signals degradation BEFORE a fault is logged.',
    });
  }

  function renderAnomalyBaseline(d) {
    if (!d?.baselines?.length) return `<div class="card">
      <div class="card-title">Anomaly Baseline Detection <span class="card-standard">ISO 7870-2 SPC · ±2σ control limits</span></div>
      <div class="empty" style="padding:1rem 0;">${escHtml(d?.note || 'No readings data yet. Fill Quick Readings in Breakdown entries to activate.')}</div>
    </div>`;

    const anomalies = d.anomalies || [];
    const anomalyHtml = anomalies.length
      ? anomalies.map(a => `<div style="padding:0.6rem;border-radius:0.625rem;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);margin-bottom:0.5rem;">
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:0.75rem;font-weight:700;color:#fff;">${escHtml(a.machine)}</span>
            <span class="alert" style="font-size:0.7rem;font-weight:700;">${escHtml(a.direction)} · ${a.deviation}σ</span>
          </div>
          <p style="font-size:0.68rem;color:rgba(255,255,255,0.5);margin-top:0.2rem;">${escHtml(a.alert)}</p>
        </div>`).join('')
      : `<p style="font-size:0.72rem;color:#4ade80;margin-bottom:0.75rem;">✓ All readings within 2σ control limits.</p>`;

    const baselineList = renderListWithShowAll({
      items: d.baselines,
      tableHeader: '<thead><tr><th>Machine</th><th>Reading</th><th class="num">Mean</th><th class="num">UCL</th><th class="num">Last</th></tr></thead>',
      defaultN: 8,
      itemNoun: 'reading',
      searchable: true,
      searchPlaceholder: 'Filter by machine or reading type…',
      renderRow: (b) => `<tr>
        <td class="machine-name">${escHtml(b.machine)}</td>
        <td style="font-size:0.68rem;color:rgba(255,255,255,0.5);">${escHtml(b.label)} (${escHtml(b.unit)})</td>
        <td class="num">${b.mean}</td>
        <td class="num">${b.ucl}</td>
        <td class="num">${b.last_value}</td>
      </tr>`,
    });

    return `<div class="card">
      <div class="card-title">Anomaly Baseline Detection <span class="card-standard">ISO 7870-2 SPC · ${d.machines_tracked} machine(s) · ${d.anomaly_count} alert(s)</span></div>
      ${anomalyHtml}
      <p style="font-size:0.62rem;color:rgba(255,255,255,0.25);margin:0.75rem 0 0.4rem;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">Baseline reference (top 8 by sample count)</p>
      ${baselineList}
    </div>`;
  }

  function renderHealthScores(d) {
    if (!d?.health_scores?.length) return cardEmpty('Equipment Health Score', 'SMRP-inspired composite (0-100)', d?.note || 'No data available.');
    const worst   = d.health_scores[0]; // sorted lowest first
    const heroColor = worst.color === 'red' ? 'red' : worst.color === 'yellow' ? 'yellow' : 'green';
    const chartId = `chart-health-${_kpiCardId}`;

    queueChart(() => {
      const top5 = d.health_scores.slice(0, 5);
      const colors = top5.map(s => s.color === 'red' ? '#f87171' : s.color === 'yellow' ? '#F7A21B' : '#4ade80');
      const traces = [{
        type: 'bar', orientation: 'h',
        x: top5.map(s => s.health_score),
        y: top5.map(s => s.machine),
        marker: { color: colors },
        text: top5.map(s => s.health_score),
        textposition: 'outside',
        hovertemplate: '%{y}: %{x}/100<extra></extra>',
      }];
      const layout = {
        ...PLOTLY_BASE_LAYOUT,
        margin: { l: 130, r: 40, t: 10, b: 20 },
        xaxis: { ...PLOTLY_BASE_LAYOUT.xaxis, range: [0, 110] },
        height: Math.max(160, top5.length * 38),
        shapes: [
          { type:'line', x0:80, x1:80, y0:-0.5, y1:top5.length-0.5, line:{ color:'rgba(74,222,128,0.4)', width:1, dash:'dot' } },
          { type:'line', x0:60, x1:60, y0:-0.5, y1:top5.length-0.5, line:{ color:'rgba(247,162,27,0.4)', width:1, dash:'dot' } },
        ],
      };
      if (document.getElementById(chartId)) {
        Plotly.newPlot(chartId, traces, layout, PLOTLY_CONFIG);
      }
    });

    // Show component breakdown for worst machine
    const worstComps = worst.components || {};
    const compBreakdown = worstComps.pm_score !== undefined ? `
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;">
        <span style="font-size:0.62rem;padding:0.15rem 0.5rem;border-radius:999px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);">PM ${worstComps.pm_score}</span>
        <span style="font-size:0.62rem;padding:0.15rem 0.5rem;border-radius:999px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);">Fault ${worstComps.fault_score}</span>
        <span style="font-size:0.62rem;padding:0.15rem 0.5rem;border-radius:999px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);">Time ${worstComps.time_score}</span>
        <span style="font-size:0.62rem;padding:0.15rem 0.5rem;border-radius:999px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);">Repeat ${worstComps.repeat_score}</span>
      </div>` : '';

    return kpiCard({
      title: 'Equipment Health Score', standard: 'Predictive Analytics skill — 4-component formula',
      value: worst.health_score, unit: '/ 100 lowest',
      sublabel: `${worst.machine} — ${worst.status} · ${d.at_risk_count} at risk · ${d.watch_count} watch · ${d.healthy_count} healthy`,
      color: heroColor,
      detail: `<div id="${chartId}" style="width:100%;"></div>${compBreakdown}`,
      legend: 'Weights: 30% PM overdue + 30% fault frequency + 20% time-to-failure + 20% repeat faults. Green = 80, Yellow = 60.',
    });
  }

  function renderNextFailureDates(d) {
    if (!d?.predictions?.length) return cardEmpty('Next Failure Prediction', 'ISO 14224:2016 + ISO 13381-1:2015', d?.note || 'Need ≥ 2 failures per machine to predict.');

    const list = renderListWithShowAll({
      items: d.predictions,
      tableHeader: '<thead><tr><th>Machine</th><th class="num">MTBF</th><th class="num">Last Logged</th><th class="num">Predicted Next</th><th>Status</th></tr></thead>',
      defaultN: 8,
      itemNoun: 'machine',
      searchable: true,
      renderRow: (p) => {
        const isOverdue = p.days_until < 0;
        const isSuspect = p.mtbf_days < 1; // < 1 day MTBF = likely data quality issue
        let statusHtml;
        if (isSuspect) {
          statusHtml = `<span style="font-size:0.62rem;color:#F7A21B;">⚠ Check data</span>`;
        } else if (isOverdue) {
          statusHtml = `<span style="font-size:0.62rem;color:#f87171;">Overdue by ${Math.abs(Math.round(p.days_until))}d — not yet logged</span>`;
        } else {
          statusHtml = `<span style="font-size:0.62rem;color:${p.risk==='MEDIUM'?'#F7A21B':'#4ade80'};">Due in ${Math.round(p.days_until)} days</span>`;
        }
        const dateColor = isOverdue ? '#f87171' : p.risk === 'MEDIUM' ? '#F7A21B' : 'rgba(255,255,255,0.6)';
        const dateLabel = isOverdue ? `${escHtml(p.predicted_next)} ← past` : escHtml(p.predicted_next);
        return `<tr style="${isSuspect ? 'opacity:0.6;' : ''}">
          <td class="machine-name">${escHtml(p.machine)}${isSuspect ? ' <span style="font-size:0.6rem;color:#F7A21B;">⚠</span>' : ''}</td>
          <td class="num" style="color:${isSuspect?'#F7A21B':'rgba(255,255,255,0.6)'};">${p.mtbf_days}d</td>
          <td class="num" style="color:rgba(255,255,255,0.5);">${escHtml(p.last_failure)}</td>
          <td class="num" style="color:${dateColor};font-size:0.72rem;">${dateLabel}</td>
          <td>${statusHtml}</td>
        </tr>`;
      },
    });

    const suspectCount = d.predictions.filter(p => p.mtbf_days < 1).length;

    return kpiCard({
      title: 'Next Failure Prediction',
      standard: `ISO 13381-1:2015 · last failure + MTBF`,
      value: d.high_risk,
      unit: `machine${d.high_risk !== 1 ? 's' : ''} overdue`,
      sublabel: d.high_risk > 0 ? `${d.high_risk} machine(s) past predicted failure date — check if logged` : `${d.medium_risk} machine(s) due within 14 days`,
      color: d.high_risk > 0 ? 'red' : d.medium_risk > 0 ? 'yellow' : 'green',
      detail: `
        ${list}
        ${suspectCount > 0 ? `<p style="font-size:0.65rem;color:#F7A21B;margin-top:0.75rem;">⚠ ${suspectCount} machine(s) with MTBF < 1 day — likely multiple failures logged in same shift. Review logbook entries for data accuracy.</p>` : ''}
        <p style="font-size:0.62rem;color:rgba(255,255,255,0.2);margin-top:0.5rem;">Past dates mean the machine was due to fail again based on MTBF — check if a new failure was logged or if the machine is overdue for inspection.</p>`,
      legend: 'Prediction = last logged failure date + mean interval between historical failures. Requires ≥ 2 failures per machine.',
    });
  }

  function renderPMDueCalendar(d) {
    if (!d?.calendar?.length) return cardEmpty('PM Due Calendar', 'Deterministic — last completion + frequency', 'No PM scope items found.');

    if (!d.overdue_count && !d.due_soon_count) return `<div class="card">
      <div class="card-title">PM Due Calendar <span class="card-standard">Deterministic · All ${d.total_tasks} tasks on schedule</span></div>
      <div class="empty" style="color:#4ade80;padding:1rem 0;">✓ All ${d.total_tasks} PM tasks are on schedule.</div>
    </div>`;

    // Group by asset — only show tasks that need attention
    const actionable = d.calendar.filter(c => c.risk !== 'OK');
    const byAsset = {};
    actionable.forEach(c => {
      const key = c.asset_name || 'Unknown';
      if (!byAsset[key]) byAsset[key] = [];
      byAsset[key].push(c);
    });

    // Sort assets: most urgent first (by worst task risk)
    const assetOrder = Object.keys(byAsset).sort((a, b) => {
      const worst = arr => arr.some(t => t.risk === 'OVERDUE') ? 0 : arr.some(t => t.risk === 'DUE SOON') ? 1 : 2;
      return worst(byAsset[a]) - worst(byAsset[b]);
    });

    let pmCardId = 0;
    const assetBlocks = assetOrder.map(assetName => {
      const tasks     = byAsset[assetName];
      const hasOver   = tasks.some(t => t.risk === 'OVERDUE');
      const hasSoon   = tasks.some(t => t.risk === 'DUE SOON');
      const assetColor = hasOver ? '#f87171' : hasSoon ? '#F7A21B' : '#a78bfa';
      const badge     = hasOver ? `<span style="font-size:0.6rem;font-weight:700;padding:0.15rem 0.4rem;border-radius:999px;background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.25);">${tasks.filter(t=>t.risk==='OVERDUE').length} OVERDUE</span>`
                      : hasSoon ? `<span style="font-size:0.6rem;font-weight:700;padding:0.15rem 0.4rem;border-radius:999px;background:rgba(247,162,27,0.15);color:#F7A21B;border:1px solid rgba(247,162,27,0.25);">${tasks.length} DUE SOON</span>` : '';
      const id = `pm-asset-${pmCardId++}`;
      // Auto-expand overdue assets
      const autoOpen = hasOver;

      const taskRows = tasks.map(t => {
        const tc = t.risk === 'OVERDUE' ? '#f87171' : t.risk === 'DUE SOON' ? '#F7A21B' : '#a78bfa';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <div style="flex:1;min-width:0;">
            <p style="font-size:0.73rem;color:rgba(255,255,255,0.75);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(t.task)}</p>
            <p style="font-size:0.62rem;color:rgba(255,255,255,0.3);margin-top:0.1rem;">${escHtml(t.frequency)} · Last: ${escHtml(t.last_done)}</p>
          </div>
          <span style="font-size:0.68rem;font-weight:700;color:${tc};white-space:nowrap;margin-left:0.75rem;flex-shrink:0;">${escHtml(t.status)}</span>
        </div>`;
      }).join('');

      return `<div style="margin-bottom:0.5rem;border-radius:0.75rem;overflow:hidden;border:1px solid rgba(255,255,255,0.07);">
        <button onclick="togglePMAsset('${id}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;background:rgba(255,255,255,0.03);border:none;cursor:pointer;min-height:48px;-webkit-tap-highlight-color:transparent;">
          <div style="display:flex;align-items:center;gap:0.625rem;flex:1;min-width:0;">
            <span style="width:8px;height:8px;border-radius:50%;background:${assetColor};flex-shrink:0;"></span>
            <span style="font-size:0.8rem;font-weight:700;color:#fff;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(assetName)}</span>
            ${badge}
            <span style="font-size:0.65rem;color:rgba(255,255,255,0.3);">${tasks.length} task${tasks.length!==1?'s':''}</span>
          </div>
          <span id="${id}-chev" style="font-size:0.65rem;color:rgba(255,255,255,0.25);transition:transform 0.25s;flex-shrink:0;margin-left:0.5rem;${autoOpen?'transform:rotate(180deg)':''}">▼</span>
        </button>
        <div id="${id}" style="max-height:${autoOpen?'800px':'0'};overflow:hidden;transition:max-height 0.3s ease;padding:${autoOpen?'0 1rem':'0'};background:rgba(22,32,50,0.4);">
          <div style="padding-bottom:0.5rem;">${taskRows}</div>
        </div>
      </div>`;
    }).join('');

    return kpiCard({
      title: 'PM Due Calendar',
      standard: `🔴 ${d.overdue_count} overdue · 🟡 ${d.due_soon_count} due soon · ${d.total_tasks} total`,
      value: d.overdue_count + d.due_soon_count,
      unit: 'tasks need attention',
      sublabel: `${assetOrder.length} asset(s) with pending PM tasks`,
      color: d.overdue_count > 0 ? 'red' : d.due_soon_count > 0 ? 'yellow' : 'green',
      detail: assetBlocks,
    });
  }

  function togglePMAsset(id) {
    const panel = document.getElementById(id);
    const chev  = document.getElementById(id + '-chev');
    if (!panel) return;
    const isOpen = panel.style.maxHeight !== '0px' && panel.style.maxHeight !== '0';
    panel.style.maxHeight  = isOpen ? '0' : '800px';
    panel.style.padding    = isOpen ? '0 1rem' : '0 1rem';
    if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
  }

  function renderPartsStockout(d) {
    if (!d?.stockout_risk?.length) return `<div class="card">
      <div class="card-title">Parts Stockout Risk <span class="card-standard">Deterministic — qty / daily consumption rate</span></div>
      <div class="empty" style="color:#4ade80;padding:1rem 0;">✓ No parts projected to stock out soon.</div>
    </div>`;
    const list = renderListWithShowAll({
      items: d.stockout_risk,
      tableHeader: '<thead><tr><th>Part</th><th class="num">In Stock</th><th class="num">Daily Rate</th><th class="num">Stockout In</th><th class="num">Risk</th></tr></thead>',
      defaultN: 8,
      itemNoun: 'part',
      searchable: true,
      renderRow: (p) => {
        const cls = p.risk === 'CRITICAL' ? 'alert' : p.risk === 'HIGH' ? 'warn' : '';
        return `<tr>
          <td class="machine-name">${escHtml(p.part_name)}</td>
          <td class="num">${p.qty_on_hand}</td>
          <td class="num">${p.daily_rate || '—'}</td>
          <td class="num ${cls}">${p.days_to_stockout !== null ? p.days_to_stockout + 'd' : '—'}</td>
          <td class="num"><span style="font-size:0.65rem;font-weight:700;color:${p.risk==='CRITICAL'?'#f87171':p.risk==='HIGH'?'#F7A21B':'#a78bfa'}">${p.risk}</span></td>
        </tr>`;
      },
