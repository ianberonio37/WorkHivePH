    return `<div class="card">
      <div class="card-title">Parts Stockout Risk <span class="card-standard">SMRP inventory · ${d.at_risk_count} parts at risk</span></div>
      ${list}
    </div>`;
  }

  function renderFailureTrend(d) {
    if (!d?.trend?.length) return cardEmpty('Failure Trend', 'Linear trend analysis', d?.note || 'Insufficient data.');
    const dirColor = d.direction === 'INCREASING' ? 'red' : d.direction === 'DECREASING' ? 'green' : 'grey';
    const chartId  = `chart-trend-${_kpiCardId}`;

    queueChart(() => {
      const weeks  = d.trend.map(t => t.week);
      const counts = d.trend.map(t => t.count);
      const fWks   = (d.forecast || []).map(f => f.week);
      const fCnts  = (d.forecast || []).map(f => f.predicted_count);

      const lineColor = d.direction === 'INCREASING' ? '#f87171' : d.direction === 'DECREASING' ? '#4ade80' : '#a78bfa';
      const traces = [
        {
          type: 'scatter', mode: 'lines+markers', name: 'Actual',
          x: weeks, y: counts,
          line: { color: lineColor, width: 2 },
          marker: { color: lineColor, size: 5 },
          hovertemplate: 'Week %{x}: %{y} failures<extra></extra>',
        },
        ...(fWks.length ? [{
          type: 'scatter', mode: 'lines+markers', name: 'Forecast',
          x: [weeks[weeks.length - 1], ...fWks],
          y: [counts[counts.length - 1], ...fCnts],
          line: { color: lineColor, width: 2, dash: 'dot' },
          marker: { color: lineColor, size: 4, opacity: 0.6 },
          hovertemplate: 'Forecast %{x}: ~%{y}<extra></extra>',
        }] : []),
      ];
      const maxCount = Math.max(...counts, ...fCnts, 1);
      const layout = {
        ...PLOTLY_BASE_LAYOUT,
        margin: { l: 30, r: 20, t: 10, b: 40 },
        xaxis: { ...PLOTLY_BASE_LAYOUT.xaxis, tickangle: -30, nticks: 8 },
        yaxis: { ...PLOTLY_BASE_LAYOUT.yaxis, title: { text: 'Failures/week', font: { size: 10 } }, autorange: false, range: [0, maxCount + 1] },
        height: 200,
      };
      if (document.getElementById(chartId)) {
        Plotly.newPlot(chartId, traces, layout, PLOTLY_CONFIG);
      }
    });

    const arrow = d.direction === 'INCREASING' ? '↑ Rising' : d.direction === 'DECREASING' ? '↓ Falling' : '→ Stable';
    const totalFailures = d.trend.reduce((s, t) => s + t.count, 0);
    return kpiCard({
      title: 'Failure Trend', standard: `Linear trend · ${d.data_points} weeks`,
      value: totalFailures, unit: 'failures in period',
      sublabel: `${arrow} — ${escHtml(d.trend_label || '')}`,
      color: dirColor,
      detail: `<div id="${chartId}" style="width:100%;"></div>`,
      legend: 'Y-axis = failures per week. Declining line = improving maintenance. Dotted line = 4-week forecast.',
    });
  }

  // ── Render Phase 4 — Prescriptive ────────────────────────────────────────
  function renderPrescriptive(data) {
    _kpiCardId = 0;
    const panel = document.getElementById('results-panel');
    const gen = data.generated_at ? new Date(data.generated_at).toLocaleString('en-PH') : '';
    let html = `<p style="font-size:0.68rem;color:rgba(255,255,255,0.2);margin-bottom:1rem;">Generated: ${escHtml(gen)} · Period: last ${data.period_days} days</p>`;
    // Order: AI synthesis → triage → this-week ops actions → scheduling change → HR development
    if (data.action_plan) html += renderActionPlan(data.action_plan);  // cross-phase synthesis
    html += renderPriorityRanking(data.priority_ranking);              // which assets to attack first
    html += renderTechAssignment(data.technician_assignment);          // who works on what (this week)
    html += renderPartsReorder(data.parts_reorder);                    // what to buy now
    html += renderPMOptimization(data.pm_interval_optimization);       // longer-horizon schedule change
    html += renderTrainingGaps(data.training_gaps);                    // longest-horizon HR action
    panel.innerHTML = html;
  }

  function renderActionPlan(plan) {
    if (!plan?.this_week?.length) return '';
    const items = plan.this_week.map(a => `<li style="margin-bottom:0.4rem;color:rgba(255,255,255,0.8);">${escHtml(a)}</li>`).join('');
    const watchItems = (plan.watch_list || []).map(w => `<span style="font-size:0.7rem;padding:0.2rem 0.5rem;border-radius:999px;background:rgba(247,162,27,0.12);color:#F7A21B;border:1px solid rgba(247,162,27,0.25);margin-right:0.4rem;">${escHtml(w)}</span>`).join('');
    return `<div class="card" style="border-color:rgba(167,139,250,0.3);background:linear-gradient(145deg,rgba(124,58,237,0.12),rgba(31,46,69,0.7));margin-bottom:1rem;">
      <div class="card-title" style="color:#a78bfa;">⚡ AI Action Plan <span class="card-standard">WorkHive AI · ISO 55000:2014</span></div>
      ${plan.summary ? `<p style="font-size:0.8rem;font-weight:600;color:#fff;margin-bottom:0.75rem;">${escHtml(plan.summary)}</p>` : ''}
      <ul style="padding-left:1.25rem;font-size:0.75rem;line-height:1.7;">${items}</ul>
      ${watchItems ? `<div style="margin-top:0.75rem;"><p style="font-size:0.65rem;color:rgba(255,255,255,0.3);margin-bottom:0.4rem;">Watch list:</p>${watchItems}</div>` : ''}
    </div>`;
  }

  function renderPriorityRanking(d) {
    if (!d?.ranking?.length) return cardEmpty('Priority Maintenance Ranking', 'ISO 55001 risk framework', 'No corrective failure data found in the selected period.');
    const list = renderListWithShowAll({
      items: d.ranking,
      tableHeader: '<thead><tr><th>Priority</th><th>Machine</th><th>Criticality</th><th class="num">Failures</th><th class="num">Avg DT</th><th class="num">Score</th></tr></thead>',
      defaultN: 8,
      itemNoun: 'asset',
      searchable: true,
      renderRow: (r) => {
        const pColor = r.priority==='P1' ? '#f87171' : r.priority==='P2' ? '#F7A21B' : '#4ade80';
        return `<tr>
          <td><span style="font-size:0.7rem;font-weight:800;color:${pColor};padding:0.15rem 0.4rem;border-radius:999px;background:rgba(0,0,0,0.2);">${r.priority}</span></td>
          <td class="machine-name">${escHtml(r.machine)}</td>
          <td style="font-size:0.68rem;color:rgba(255,255,255,0.4);">${escHtml(r.criticality)}</td>
          <td class="num">${r.failure_count}</td>
          <td class="num">${r.avg_downtime_h}h</td>
          <td class="num" style="color:#a78bfa;font-weight:800;">${r.risk_score}</td>
        </tr>`;
      },
    });
    return `<div class="card">
      <div class="card-title">Priority Maintenance Ranking <span class="card-standard">ISO 55001 · 🔴 ${d.p1_count} P1 · 🟡 ${d.p2_count} P2</span></div>
      ${list}
      <p style="font-size:0.62rem;color:rgba(255,255,255,0.2);margin-top:0.5rem;">Score = Criticality × Failure count × Avg downtime. P1 ≥ 150, P2 ≥ 60.</p>
    </div>`;
  }

  function renderPMOptimization(d) {
    // Distinguish three empty cases honestly:
    //  - compared_count > 0 and 0 recommendations → really healthy
    //  - compared_count == 0 → couldn't match any asset (data plumbing issue, see PRODUCTION_FIXES #17)
    //  - scope_asset_count == 0 → no PM scopes registered yet
    if (!d?.recommendations?.length) {
      const cmp     = d?.compared_count ?? 0;
      const scopeN  = d?.scope_asset_count ?? 0;
      const skipped = d?.skipped_count ?? 0;
      let empty;
      if (scopeN === 0) {
        empty = `<div class="empty" style="color:rgba(255,255,255,0.4);padding:1rem 0;font-size:0.82rem;">No PM scopes registered yet. Add PM tasks to assets in PM Scheduler to enable interval optimisation.</div>`;
      } else if (cmp === 0) {
        empty = `<div class="empty" style="color:rgba(255,255,255,0.4);padding:1rem 0;font-size:0.82rem;">Couldn't compare PM intervals: ${scopeN} assets have PM scopes but none have matching failure history in logbook for this period. Recommendations will appear once breakdowns log against the same assets.</div>`;
      } else {
        empty = `<div class="empty" style="color:#4ade80;padding:1rem 0;">✓ Compared ${cmp} asset${cmp === 1 ? '' : 's'}: current PM intervals are appropriate based on failure history.</div>`;
      }
      return `<div class="card">
        <div class="card-title">PM Interval Optimization <span class="card-standard">SAE JA1011 §7 RCM</span></div>
        ${empty}
      </div>`;
    }
    const list = renderListWithShowAll({
      items: d.recommendations,
      wrap: 'cards',
      defaultN: 5,
      itemNoun: 'recommendation',
      searchable: true,
      searchPlaceholder: 'Filter by asset name or code…',
      renderRow: (r) => {
        const codeBadge = r.machine_code
          ? `<code style="font-size:0.65rem;color:#F7A21B;background:rgba(247,162,27,0.08);padding:1px 6px;border-radius:4px;margin-left:0.4rem;">${escHtml(r.machine_code)}</code>`
          : '';
        const scopeNote = r.scope_items_count
          ? ` · covers ${r.scope_items_count} PM task${r.scope_items_count === 1 ? '' : 's'}`
          : '';
        return `
          <div style="margin-bottom:0.75rem;padding:0.75rem;border-radius:0.75rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem;">
              <span style="font-size:0.78rem;font-weight:700;color:#fff;">${escHtml(r.asset_name)}${codeBadge}</span>
              <span style="font-size:0.65rem;font-weight:700;color:${r.action.includes('INCREASE')?'#f87171':'#F7A21B'};">${escHtml(r.action)}</span>
            </div>
            <p style="font-size:0.68rem;color:rgba(255,255,255,0.5);">${escHtml(r.reason)}</p>
            <p style="font-size:0.65rem;color:#a78bfa;margin-top:0.25rem;">Recommended: every ${r.recommended_days} days (currently tightest = ${r.current_frequency}${scopeNote})</p>
          </div>`;
      },
    });
    return `<div class="card">
      <div class="card-title">PM Interval Optimization <span class="card-standard">SAE JA1011 §7 RCM · ${d.count} recommendation(s)</span></div>
      ${list}
    </div>`;
  }

  function renderTechAssignment(d) {
    if (!d?.assignments?.length && !d?.skill_gaps?.length) return cardEmpty('Technician Assignment', 'SMRP workforce metrics', d?.note || 'No open jobs to assign.');
    const assignments = (d.assignments || []).map(a => `<tr>
      <td class="machine-name">${escHtml(a.machine)}</td>
      <td style="font-size:0.68rem;color:rgba(255,255,255,0.5);">${escHtml(a.problem)}</td>
      <td style="font-size:0.72rem;font-weight:600;color:#29B6D9;">${escHtml(a.assigned_to)}</td>
      <td class="num good">L${a.skill_level}</td>
    </tr>`).join('');
    // Group identical gaps so we don't render 8 copies of "No qualified Mechanical
    // technician found." Each gap row shows the discipline + the machines waiting on it.
    const gapsByDisc = {};
    (d.skill_gaps || []).forEach(g => {
      const key = g.discipline || 'unknown';
      if (!gapsByDisc[key]) gapsByDisc[key] = { discipline: key, machines: [] };
      if (g.machine) gapsByDisc[key].machines.push(g.machine);
    });
    const gaps = Object.values(gapsByDisc).map(grp => {
      const machineList = grp.machines.length
        ? `<span style="color:rgba(255,255,255,0.55);"> · ${escHtml(grp.machines.slice(0, 4).join(', '))}${grp.machines.length > 4 ? ` +${grp.machines.length - 4} more` : ''}</span>`
        : '';
      return `<div style="font-size:0.74rem;color:#f87171;margin-top:0.5rem;">⚠ No qualified <strong>${escHtml(grp.discipline)}</strong> technician in the team. <span style="color:rgba(255,255,255,0.4);">(${grp.machines.length} machine${grp.machines.length === 1 ? '' : 's'} affected)</span>${machineList}</div>`;
    }).join('');
    return `<div class="card">
      <div class="card-title">Technician Assignment <span class="card-standard">SMRP workforce · ${d.open_job_count || 0} open job(s)</span></div>
      ${assignments ? `<table class="data-table"><thead><tr><th>Machine</th><th>Problem</th><th>Assign To</th><th class="num">Level</th></tr></thead><tbody>${assignments}</tbody></table>` : ''}
      ${gaps}
    </div>`;
  }

  function renderPartsReorder(d) {
    if (!d?.reorder?.length) return `<div class="card">
      <div class="card-title">Parts Reorder Recommendation <span class="card-standard">Inventory × PM cross-reference</span></div>
      <div class="empty" style="color:#4ade80;padding:1rem 0;">✓ All parts are above reorder points.</div>
    </div>`;
    const list = renderListWithShowAll({
      items: d.reorder,
      tableHeader: '<thead><tr><th>Part</th><th class="num">In Stock</th><th class="num">Reorder At</th><th class="num">Urgency</th><th>Action</th></tr></thead>',
      defaultN: 8,
      itemNoun: 'part',
      searchable: true,
      renderRow: (r) => {
        const cls = r.urgency==='CRITICAL' ? 'alert' : r.urgency==='HIGH' ? 'warn' : '';
        return `<tr>
          <td class="machine-name">${escHtml(r.part_name)}${r.pm_relevant ? ' <span style="font-size:0.6rem;color:#a78bfa;">PM</span>' : ''}</td>
          <td class="num">${r.qty_on_hand}</td>
          <td class="num">${r.reorder_point}</td>
          <td class="num ${cls}">${r.urgency}</td>
          <td style="font-size:0.68rem;color:rgba(255,255,255,0.5);">Order ${r.suggested_order}</td>
        </tr>`;
      },
    });
    return `<div class="card">
      <div class="card-title">Parts Reorder Recommendation <span class="card-standard">🔴 ${d.critical_count} critical · PM-linked parts marked</span></div>
      ${list}
    </div>`;
  }

  function renderTrainingGaps(d) {
    // Distinguish empty states honestly:
    //  - categories_evaluated > 0 and above_threshold_count == 0 → real "no spike"
    //  - categories_evaluated == 0 → no closed corrective entries with downtime
    //  - above_threshold_count > 0 but gaps == 0 → spike exists but no low-skill workers (everyone is L3+) — that's also good
    //  - badge_count == 0 → no skill badges seeded yet
    if (!d?.gaps?.length) {
      const cats   = d?.categories_evaluated ?? 0;
      const above  = d?.above_threshold_count ?? 0;
      const badges = d?.badge_count ?? 0;
      let empty;
      if (cats === 0) {
        empty = `<div class="empty" style="color:rgba(255,255,255,0.4);padding:1rem 0;font-size:0.82rem;">${escHtml(d?.note || 'No closed corrective entries with downtime in this period — nothing to evaluate yet.')}</div>`;
      } else if (badges === 0) {
        empty = `<div class="empty" style="color:rgba(255,255,255,0.4);padding:1rem 0;font-size:0.82rem;">No skill badges yet. Workers need to take exams in Skill Matrix before training gaps can be detected.</div>`;
      } else if (above === 0) {
        empty = `<div class="empty" style="color:#4ade80;padding:1rem 0;">✓ Evaluated ${cats} categor${cats === 1 ? 'y' : 'ies'}: no MTTR spike above the +20% threshold. Repair times are consistent across the team.</div>`;
      } else {
        empty = `<div class="empty" style="color:#4ade80;padding:1rem 0;">✓ ${above} categor${above === 1 ? 'y has' : 'ies have'} elevated MTTR, but every worker in the affected disciplines is already Level 3+. No upskilling needed.</div>`;
      }
      return `<div class="card">
        <div class="card-title">Training Gap Recommendation <span class="card-standard">MTTR × Skill cross-reference</span></div>
        ${empty}
      </div>`;
    }
    const cards = d.gaps.map(g => `
      <div style="margin-bottom:0.75rem;padding:0.75rem;border-radius:0.75rem;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);">
        <div style="display:flex;justify-content:space-between;margin-bottom:0.3rem;">
          <span style="font-size:0.8rem;font-weight:700;color:#fff;">${escHtml(g.discipline)}</span>
          <span style="font-size:0.7rem;color:#f87171;">Avg MTTR: ${g.avg_mttr_h}h (+${g.above_avg_by_h}h above avg)</span>
        </div>
        <p style="font-size:0.72rem;color:rgba(255,255,255,0.6);">${escHtml(g.recommendation)}</p>
        ${g.low_skill_workers?.length ? `<div style="margin-top:0.4rem;">${g.low_skill_workers.map(w=>`<span style="font-size:0.65rem;color:#a78bfa;margin-right:0.5rem;">${escHtml(w.worker)} (L${w.current_level})</span>`).join('')}</div>` : ''}
      </div>`).join('');
    return `<div class="card">
      <div class="card-title">Training Gap Recommendation <span class="card-standard">SMRP workforce development · ${d.gap_count} gap(s)</span></div>
      ${cards}
    </div>`;
  }

  // ── Empty card helper ──────────────────────────────────────────────────────
  function cardEmpty(title, std, msg) {
    return `<div class="card">
      <div class="card-title">${escHtml(title)} <span class="card-standard">${escHtml(std)}</span></div>
      <div class="empty">${escHtml(msg)}</div>
    </div>`;
  }

  // ── Top-N + "Show all" pattern ─────────────────────────────────────────
  // Used by panels with long lists (MTBF, MTTR, Availability, Repeat
  // Failures, PM Interval Optimization, Next Failure Dates, Parts Reorder,
  // etc). Renders the first defaultN items visibly and the rest in a
  // hidden container that the toggle reveals. No re-render on toggle.
  //
  // Usage:
  //   renderListWithShowAll({
  //     items: arr,
  //     renderRow: (item) => '<tr>...</tr>',  // or '<div>...</div>' for cards
  //     wrap: 'table' | 'cards',
  //     tableHeader: '<thead>...</thead>',    // table wrap only
  //     defaultN: 8,
  //     itemNoun: 'asset',                    // for "Show all 30 assets ↓"
  //   });
  function renderListWithShowAll({ items, renderRow, wrap = 'table', tableHeader = '', defaultN = 8, itemNoun = 'item', searchable = false, searchPlaceholder = '' }) {
    if (!items?.length) return '';
    const total = items.length;

    // Below the threshold: just render flat, no toggle, no search.
    // (Search adds clutter when there are only 5 rows.)
    if (total <= defaultN && !searchable) {
      const html = items.map(renderRow).join('');
      return wrap === 'table'
        ? `<table class="data-table">${tableHeader}<tbody>${html}</tbody></table>`
        : `<div class="cards-stack">${html}</div>`;
    }

    const visibleHtml = items.slice(0, defaultN).map(renderRow).join('');
    const hiddenHtml  = total > defaultN ? items.slice(defaultN).map(renderRow).join('') : '';
    const showAllTxt  = `Show all ${total} ${itemNoun}${total === 1 ? '' : 's'} ↓`;
    const showLessTxt = `Show top ${defaultN} ↑`;

    // Search input — only when explicitly enabled AND list is big enough to
    // benefit (>=8 items). Small lists don't need search clutter. Auto-expands
    // hidden rows on input so matches outside the top-N are still findable.
    const showSearch = searchable && total >= 8;
    const searchInput = showSearch ? `
      <input type="search" class="list-search" placeholder="${escHtml(searchPlaceholder || ('Filter ' + itemNoun + 's…'))}"
        oninput="filterShowAllList(this)" />
    ` : '';

    if (wrap === 'table') {
      return `<div class="list-with-showall">
        ${searchInput}
        <table class="data-table">
          ${tableHeader}
          <tbody>${visibleHtml}</tbody>
          ${hiddenHtml ? `<tbody class="extra-rows" hidden>${hiddenHtml}</tbody>` : ''}
        </table>
        ${total > defaultN ? `<button type="button" class="showall-toggle" onclick="toggleShowAll(this)"
          data-show-all="${escHtml(showAllTxt)}" data-show-less="${escHtml(showLessTxt)}">${escHtml(showAllTxt)}</button>` : ''}
      </div>`;
    }
    return `<div class="list-with-showall">
      ${searchInput}
      <div class="cards-stack">${visibleHtml}</div>
      ${hiddenHtml ? `<div class="extra-cards" hidden>${hiddenHtml}</div>` : ''}
      ${total > defaultN ? `<button type="button" class="showall-toggle" onclick="toggleShowAll(this)"
        data-show-all="${escHtml(showAllTxt)}" data-show-less="${escHtml(showLessTxt)}">${escHtml(showAllTxt)}</button>` : ''}
    </div>`;
  }

  // Filter rows/cards by typed query. Reveals hidden rows so matches anywhere
  // are findable. Clearing the input restores the original Top-N view.
  function filterShowAllList(input) {
    const wrap = input.closest('.list-with-showall');
    if (!wrap) return;
    const q = (input.value || '').trim().toLowerCase();
    const extra = wrap.querySelector('.extra-rows, .extra-cards');
    const toggleBtn = wrap.querySelector('.showall-toggle');
    const allRows = Array.from(wrap.querySelectorAll('tbody tr, .cards-stack > *, .extra-cards > *'));

    if (!q) {
      // Empty query: restore default state (extras hidden, all visible rows shown).
      allRows.forEach(r => { r.style.display = ''; });
      if (extra && !extra.hasAttribute('hidden')) {
        extra.setAttribute('hidden', '');
        if (toggleBtn) toggleBtn.textContent = toggleBtn.dataset.showAll;
      }
      return;
    }

    // Searching: expand the hidden container so matches in there are visible.
    if (extra && extra.hasAttribute('hidden')) {
      extra.removeAttribute('hidden');
      if (toggleBtn) toggleBtn.textContent = toggleBtn.dataset.showLess;
    }
    let matchCount = 0;
    allRows.forEach(r => {
      const text = (r.textContent || '').toLowerCase();
      const hit = text.includes(q);
      r.style.display = hit ? '' : 'none';
      if (hit) matchCount++;
    });
    // Optional: surface a "no results" state inline. Skipped for now — empty
    // table is self-explanatory.
  }

  function toggleShowAll(btn) {
    const wrap = btn.closest('.list-with-showall');
    const extra = wrap?.querySelector('.extra-rows, .extra-cards');
    if (!extra) return;
    const isHidden = extra.hasAttribute('hidden');
    if (isHidden) {
      extra.removeAttribute('hidden');
      btn.textContent = btn.dataset.showLess;
    } else {
      extra.setAttribute('hidden', '');
      btn.textContent = btn.dataset.showAll;
    }
  }

  // ── Role-Based Views ─────────────────────────────────────────────────────
  // Two views: worker (field tech) and supervisor (team lead).
  // Defaults from HIVE_ROLE — the only actual roles in hive_members per the
  // multitenant model.

  let _role = HIVE_ROLE === 'supervisor' ? 'supervisor' : 'worker';

  function setRole(role) {
    // Clamp to known roles — Manager was retired (was UI-only, not a real role)
    if (role !== 'supervisor') role = 'worker';
    _role = role;
    document.querySelectorAll('.role-btn').forEach(b => {
      b.classList.toggle('active', b.id === `role-${role}`);
    });
    renderRoleQuickView();
  }

  function renderRoleQuickView() {
    const el = document.getElementById('role-quick-view');
    if (!el) return;

    const desc  = _cache.descriptive;
    const pred  = _cache.predictive;
    const presc = _cache.prescriptive;

    if (!desc && !pred && !presc) { el.innerHTML = ''; return; }

    if (_role === 'supervisor') {
      el.innerHTML = buildSupervisorView(desc, pred, presc);
    } else {
      el.innerHTML = buildWorkerView(pred, presc);
    }
  }

  // ── PM task helpers (shared by worker view + dropdown filter) ────────────────
  function _buildPMTaskRows(tasks) {
    return tasks.map(t => `
      <div class="role-row" style="padding-left:1rem;">
        <span class="label">${escHtml(t.asset_name)} — ${escHtml(t.task.slice(0, 45))}</span>
        <span class="val" style="color:${t.risk==='OVERDUE'?'#f87171':'#F7A21B'};">${escHtml(t.status)}</span>
      </div>`).join('');
  }

  function filterPMTasks(assetName) {
    const cal    = _cache.predictive?.pm_due_calendar?.calendar || [];
    const urgent = cal.filter(c => c.risk === 'OVERDUE' || c.risk === 'DUE SOON');
    const tasks  = assetName
      ? urgent.filter(t => t.asset_name === assetName)  // all tasks for selected asset
      : urgent.slice(0, 5);                              // default: top 5 across all
    const el = document.getElementById('pm-task-list');
    if (el) el.innerHTML = _buildPMTaskRows(tasks);
  }

  // ── Worker Quick View: PM due + open jobs + parts needed ──────────────────
  function buildWorkerView(pred, presc) {
    const rows = [];

    // PM tasks — asset dropdown (scales to any number of assets)
    const cal    = pred?.pm_due_calendar?.calendar || [];
    const urgent = cal.filter(c => c.risk === 'OVERDUE' || c.risk === 'DUE SOON');

    if (urgent.length) {
      // Group tasks by asset
      const assetMap = {};
      urgent.forEach(t => {
        if (!assetMap[t.asset_name]) assetMap[t.asset_name] = [];
        assetMap[t.asset_name].push(t);
      });
      const assetNames = Object.keys(assetMap).sort();

      // Summary row
      rows.push(`<div class="role-row"><span class="label">📅 PM tasks due</span><span class="val" style="color:#F7A21B;">${urgent.length} need attention</span></div>`);

      // Asset dropdown
      const opts = [`<option value="">— Filter by asset (${assetNames.length}) —</option>`]
        .concat(assetNames.map(a =>
          `<option value="${escHtml(a)}">${escHtml(a)} (${assetMap[a].length})</option>`
        )).join('');
      rows.push(`<div class="role-row" style="padding-left:0.5rem;">
        <select class="pm-asset-select" onchange="filterPMTasks(this.value)">
          ${opts}
        </select>
      </div>`);

      // Task list container — shows first 5 by default, filtered on dropdown change
      const defaultTasks = urgent.slice(0, 5);
      rows.push(`<div id="pm-task-list">${_buildPMTaskRows(defaultTasks)}</div>`);
    } else {
      rows.push(`<div class="role-row"><span class="label">📅 PM tasks</span><span class="val" style="color:#4ade80;">All on schedule ✓</span></div>`);
    }

    // Parts needed
    const reorder = presc?.parts_reorder?.reorder?.filter(r => r.urgency === 'CRITICAL').slice(0, 3) || [];
    if (reorder.length) {
      rows.push(`<div class="role-row"><span class="label">📦 Critical parts</span><span class="val" style="color:#f87171;">${reorder.length} out of stock</span></div>`);
      reorder.forEach(r => rows.push(`<div class="role-row" style="padding-left:1rem;">
        <span class="label">${escHtml(r.part_name)}</span>
        <span class="val" style="color:#f87171;">Out — order ${r.suggested_order}</span>
      </div>`));
    }

    // Next predicted failure
    const nextFail = pred?.next_failure_dates?.predictions?.filter(p => p.risk === 'HIGH')[0];
    if (nextFail) {
      rows.push(`<div class="role-row"><span class="label">⚠ Next failure risk</span><span class="val" style="color:#f87171;">${escHtml(nextFail.machine)} by ${escHtml(nextFail.predicted_next)}</span></div>`);
    }

    if (!rows.length) return '';
    return `<div class="role-card"><div class="role-card-title">🔧 Field Tech — My Focus Today</div>${rows.join('')}</div>`;
  }

  // ── Supervisor Quick View: team KPIs + overdue + training ─────────────────
  function buildSupervisorView(desc, pred, presc) {
    const rows = [];

    // MTBF worst
    const mtbf = desc?.mtbf?.mtbf_by_asset?.filter(a => a.mtbf_days !== null)[0];
    if (mtbf) rows.push(`<div class="role-row"><span class="label">⏱ Worst MTBF</span><span class="val" style="color:${mtbf.mtbf_days<14?'#f87171':mtbf.mtbf_days<30?'#F7A21B':'#4ade80'};">${mtbf.machine} · ${mtbf.mtbf_days}d</span></div>`);

    // MTTR worst
    const mttr = desc?.mttr?.mttr_by_asset?.[0];
    if (mttr) rows.push(`<div class="role-row"><span class="label">🔧 Slowest repair</span><span class="val" style="color:${mttr.mttr_hours>24?'#f87171':mttr.mttr_hours>8?'#F7A21B':'#4ade80'};">${mttr.machine} · ${mttr.mttr_hours}h</span></div>`);

    // PM compliance
    const pm = desc?.pm_compliance?.overall_pct;
    if (pm !== null && pm !== undefined) rows.push(`<div class="role-row"><span class="label">📋 PM compliance</span><span class="val" style="color:${pm<70?'#f87171':pm<85?'#F7A21B':'#4ade80'};">${pm}%</span></div>`);

    // Overdue PMs
    const overdue = pred?.pm_due_calendar?.overdue_count;
    if (overdue > 0) rows.push(`<div class="role-row"><span class="label">🔴 Overdue PMs</span><span class="val" style="color:#f87171;">${overdue} task(s) overdue</span></div>`);

    // Training gaps
    const gaps = presc?.training_gaps?.gaps?.[0];
    if (gaps) rows.push(`<div class="role-row"><span class="label">📚 Training gap</span><span class="val" style="color:#F7A21B;">${escHtml(gaps.discipline)} — avg MTTR ${gaps.avg_mttr_h}h</span></div>`);

    // AI synthesis — full text in-card (no separate banner below since #27).
    // Tied to the bottom because it integrates everything above.
    const aiSummary = presc?.action_plan?.summary;
    let aiBlock = '';
    if (aiSummary) {
      aiBlock = `<div class="role-ai-rec">
        <div class="role-ai-rec-label">⚡ AI recommendation</div>
        <p class="role-ai-rec-text">${escHtml(aiSummary)}</p>
      </div>`;
    }

    if (!rows.length && !aiBlock) return '';
    return `<div class="role-card"><div class="role-card-title">👷 Supervisor — Team Status</div>${rows.join('')}${aiBlock}</div>`;
  }

  // (Removed: buildManagerView and updateCommandBar — see PRODUCTION_FIXES #27.
  // The Manager view was UI-only (platform has Worker/Supervisor only). The
  // command bar with KPI pills + duplicate AI banner restated info already
  // shown inside each role card and inside the analytics phase panels.)

  // ── Kick off on page load ─────────────────────────────────────────────────
  // Runs automatically — no button click needed
  window.addEventListener('DOMContentLoaded', async () => {
    // C4: restore identity from auth session on new device
    if (!WORKER_NAME) { WORKER_NAME = await restoreIdentityFromSession(db); }
    if (!WORKER_NAME) { window.location.href = 'index.html?signin=1'; return; }
    // Set default role based on HIVE_ROLE
    setRole(_role);
    autoLoad();

    // Refresh status bar every minute so "Updated X min ago" stays current
    const _statusBarTimer = setInterval(() => updateStatusBar(_phase), 60000);
  });
</script>
