  // ── Role-Based Views ─────────────────────────────────────────────────────
  // Three views: worker (field tech), supervisor (team lead), manager (plant)
  // Defaults from HIVE_ROLE. Manually switchable.

  let _role = HIVE_ROLE === 'supervisor' ? 'supervisor' : 'worker';

  function setRole(role) {
    _role = role;
    document.querySelectorAll('.role-btn').forEach(b => {
      b.classList.toggle('active', b.id === `role-${role}`);
    });
    renderRoleQuickView();
  }

  function renderRoleQuickView() {
    const el = document.getElementById('role-quick-view');
    if (!el) return;

    const desc  = _cache.descriptive;
    const pred  = _cache.predictive;
    const presc = _cache.prescriptive;

    if (!desc && !pred && !presc) { el.innerHTML = ''; return; }

    if (_role === 'worker') {
      el.innerHTML = buildWorkerView(pred, presc);
    } else if (_role === 'supervisor') {
      el.innerHTML = buildSupervisorView(desc, pred, presc);
    } else {
      el.innerHTML = buildManagerView(desc, pred, presc);
    }
  }

  // ── PM task helpers (shared by worker view + dropdown filter) ────────────────
  function _buildPMTaskRows(tasks) {
    return tasks.map(t => `
      <div class="role-row" style="padding-left:1rem;">
        <span class="label">${escHtml(t.asset_name)} — ${escHtml(t.task.slice(0, 45))}</span>
        <span class="val" style="color:${t.risk==='OVERDUE'?'#f87171':'#F7A21B'};">${escHtml(t.status)}</span>
      </div>`).join('');
  }

  function filterPMTasks(assetName) {
    const cal    = _cache.predictive?.pm_due_calendar?.calendar || [];
    const urgent = cal.filter(c => c.risk === 'OVERDUE' || c.risk === 'DUE SOON');
    const tasks  = assetName
      ? urgent.filter(t => t.asset_name === assetName)  // all tasks for selected asset
      : urgent.slice(0, 5);                              // default: top 5 across all
    const el = document.getElementById('pm-task-list');
    if (el) el.innerHTML = _buildPMTaskRows(tasks);
  }

  // ── Worker Quick View: PM due + open jobs + parts needed ──────────────────
  function buildWorkerView(pred, presc) {
    const rows = [];

    // PM tasks — asset dropdown (scales to any number of assets)
    const cal    = pred?.pm_due_calendar?.calendar || [];
    const urgent = cal.filter(c => c.risk === 'OVERDUE' || c.risk === 'DUE SOON');

    if (urgent.length) {
      // Group tasks by asset
      const assetMap = {};
      urgent.forEach(t => {
        if (!assetMap[t.asset_name]) assetMap[t.asset_name] = [];
        assetMap[t.asset_name].push(t);
      });
      const assetNames = Object.keys(assetMap).sort();

      // Summary row
      rows.push(`<div class="role-row"><span class="label">📅 PM tasks due</span><span class="val" style="color:#F7A21B;">${urgent.length} need attention</span></div>`);

      // Asset dropdown
      const opts = [`<option value="">— Filter by asset (${assetNames.length}) —</option>`]
        .concat(assetNames.map(a =>
          `<option value="${escHtml(a)}">${escHtml(a)} (${assetMap[a].length})</option>`
        )).join('');
      rows.push(`<div class="role-row" style="padding-left:0.5rem;">
        <select class="pm-asset-select" onchange="filterPMTasks(this.value)">
          ${opts}
        </select>
      </div>`);

      // Task list container — shows first 5 by default, filtered on dropdown change
      const defaultTasks = urgent.slice(0, 5);
      rows.push(`<div id="pm-task-list">${_buildPMTaskRows(defaultTasks)}</div>`);
    } else {
      rows.push(`<div class="role-row"><span class="label">📅 PM tasks</span><span class="val" style="color:#4ade80;">All on schedule ✓</span></div>`);
    }

    // Parts needed
    const reorder = presc?.parts_reorder?.reorder?.filter(r => r.urgency === 'CRITICAL').slice(0, 3) || [];
    if (reorder.length) {
      rows.push(`<div class="role-row"><span class="label">📦 Critical parts</span><span class="val" style="color:#f87171;">${reorder.length} out of stock</span></div>`);
      reorder.forEach(r => rows.push(`<div class="role-row" style="padding-left:1rem;">
        <span class="label">${escHtml(r.part_name)}</span>
        <span class="val" style="color:#f87171;">Out — order ${r.suggested_order}</span>
      </div>`));
    }

    // Next predicted failure
    const nextFail = pred?.next_failure_dates?.predictions?.filter(p => p.risk === 'HIGH')[0];
    if (nextFail) {
      rows.push(`<div class="role-row"><span class="label">⚠ Next failure risk</span><span class="val" style="color:#f87171;">${escHtml(nextFail.machine)} by ${escHtml(nextFail.predicted_next)}</span></div>`);
    }

    if (!rows.length) return '';
    return `<div class="role-card"><div class="role-card-title">🔧 Field Tech — My Focus Today</div>${rows.join('')}</div>`;
  }

  // ── Supervisor Quick View: team KPIs + overdue + training ─────────────────
  function buildSupervisorView(desc, pred, presc) {
    const rows = [];

    // MTBF worst
    const mtbf = desc?.mtbf?.mtbf_by_asset?.filter(a => a.mtbf_days !== null)[0];
    if (mtbf) rows.push(`<div class="role-row"><span class="label">⏱ Worst MTBF</span><span class="val" style="color:${mtbf.mtbf_days<14?'#f87171':mtbf.mtbf_days<30?'#F7A21B':'#4ade80'};">${mtbf.machine} · ${mtbf.mtbf_days}d</span></div>`);

    // MTTR worst
    const mttr = desc?.mttr?.mttr_by_asset?.[0];
    if (mttr) rows.push(`<div class="role-row"><span class="label">🔧 Slowest repair</span><span class="val" style="color:${mttr.mttr_hours>24?'#f87171':mttr.mttr_hours>8?'#F7A21B':'#4ade80'};">${mttr.machine} · ${mttr.mttr_hours}h</span></div>`);

    // PM compliance
    const pm = desc?.pm_compliance?.overall_pct;
    if (pm !== null && pm !== undefined) rows.push(`<div class="role-row"><span class="label">📋 PM compliance</span><span class="val" style="color:${pm<70?'#f87171':pm<85?'#F7A21B':'#4ade80'};">${pm}%</span></div>`);

    // Overdue PMs
    const overdue = pred?.pm_due_calendar?.overdue_count;
    if (overdue > 0) rows.push(`<div class="role-row"><span class="label">🔴 Overdue PMs</span><span class="val" style="color:#f87171;">${overdue} task(s) overdue</span></div>`);

    // Training gaps
    const gaps = presc?.training_gaps?.gaps?.[0];
    if (gaps) rows.push(`<div class="role-row"><span class="label">📚 Training gap</span><span class="val" style="color:#F7A21B;">${escHtml(gaps.discipline)} — avg MTTR ${gaps.avg_mttr_h}h</span></div>`);

    if (!rows.length) return '';
    return `<div class="role-card"><div class="role-card-title">👷 Supervisor — Team Status</div>${rows.join('')}</div>`;
  }

  // ── Manager Quick View: OEE + trend + AI action ───────────────────────────
  function buildManagerView(desc, pred, presc) {
    const rows = [];

    // OEE worst
    const oee = desc?.oee?.oee_by_asset?.filter(a => a.oee_pct !== null)[0];
    if (oee) rows.push(`<div class="role-row"><span class="label">📊 OEE (lowest)</span><span class="val" style="color:${oee.oee_pct<65?'#f87171':oee.oee_pct<85?'#F7A21B':'#4ade80'};">${oee.machine} · ${oee.oee_pct}%</span></div>`);

    // Failure trend
    const trend = pred?.failure_trend;
    if (trend?.direction) {
      const tColor = trend.direction === 'INCREASING' ? '#f87171' : trend.direction === 'DECREASING' ? '#4ade80' : '#a78bfa';
      rows.push(`<div class="role-row"><span class="label">📈 Failure trend</span><span class="val" style="color:${tColor};">${trend.direction} · ${trend.slope_per_week > 0 ? '+' : ''}${trend.slope_per_week}/week</span></div>`);
    }

    // Anomalies
    const anomalies = pred?.anomaly_baseline?.anomaly_count;
    if (anomalies > 0) rows.push(`<div class="role-row"><span class="label">⚠ Sensor anomalies</span><span class="val" style="color:#f87171;">${anomalies} reading(s) outside control limits</span></div>`);

    // AI action plan summary
    const action = presc?.action_plan?.summary;
    if (action) rows.push(`<div class="role-row"><span class="label">⚡ AI recommendation</span><span class="val" style="color:#a78bfa;max-width:60%;text-align:right;font-size:0.68rem;font-weight:600;">${escHtml(action.slice(0,80))}...</span></div>`);

    if (!rows.length) return '';
    return `<div class="role-card"><div class="role-card-title">📋 Manager — Plant Overview</div>${rows.join('')}</div>`;
  }

  // ── Command Summary Bar ───────────────────────────────────────────────────
  // Reads from _cache and shows key KPIs as RAG pills.
  // Updates whenever any phase finishes loading.

  function ragColor(value, greenThresh, yellowThresh, higherIsBetter = true) {
    if (value === null || value === undefined) return 'grey';
    if (higherIsBetter) {
      return value >= greenThresh ? 'green' : value >= yellowThresh ? 'yellow' : 'red';
    } else {
      return value <= greenThresh ? 'green' : value <= yellowThresh ? 'yellow' : 'red';
    }
  }

  function makePill(label, value, unit, color, phaseTarget) {
    const tip = phaseTarget ? `onclick="setPhase('${phaseTarget}')"` : '';
    return `<button class="cmd-pill ${color}" ${tip} title="Jump to ${phaseTarget || ''} analytics">
      <span class="pill-label">${escHtml(label)}</span>
      <span>${escHtml(String(value))}${escHtml(unit)}</span>
    </button>`;
  }

  function updateCommandBar() {
    const bar   = document.getElementById('command-bar');
    const pills = document.getElementById('command-pills');
    const alert = document.getElementById('command-alert');
    const desc  = _cache.descriptive;
    const pred  = _cache.predictive;
    const presc = _cache.prescriptive;

    if (!desc && !pred && !presc) return; // nothing loaded yet

    bar.classList.remove('hidden');
    let pillsHtml = '';
    let topAlert  = '';

    // ── MTBF pill (descriptive) ──
    if (desc?.mtbf?.mtbf_by_asset?.length) {
      const withMTBF = desc.mtbf.mtbf_by_asset.filter(a => a.mtbf_days !== null);
      if (withMTBF.length) {
        const worst = withMTBF[0]; // sorted lowest first
        const color = ragColor(worst.mtbf_days, 30, 14, true);
        pillsHtml += makePill('MTBF', worst.mtbf_days + 'd', ` worst`, color, 'descriptive');
      }
    }

    // ── MTTR pill (descriptive) ──
    if (desc?.mttr?.mttr_by_asset?.length) {
      const worst = desc.mttr.mttr_by_asset[0]; // sorted highest first
      const color = ragColor(worst.mttr_hours, 8, 24, false);
      pillsHtml += makePill('MTTR', worst.mttr_hours + 'h', ` avg`, color, 'descriptive');
    }

    // ── PM Compliance pill (descriptive) ──
    if (desc?.pm_compliance?.overall_pct !== null && desc?.pm_compliance?.overall_pct !== undefined) {
      const pct   = desc.pm_compliance.overall_pct;
      const color = ragColor(pct, 85, 70, true);
      pillsHtml += makePill('PM', pct + '%', ' compliance', color, 'descriptive');
    }

    // ── OEE pill (descriptive) ──
    if (desc?.oee?.oee_by_asset?.length) {
      const withOEE = desc.oee.oee_by_asset.filter(a => a.oee_pct !== null);
      if (withOEE.length) {
        const worst = withOEE[0];
        const color = ragColor(worst.oee_pct, 85, 65, true);
        pillsHtml += makePill('OEE', worst.oee_pct + '%', ' worst', color, 'descriptive');
      }
    }

    // ── Anomaly alert pill (predictive) ──
    if (pred?.anomaly_baseline?.anomaly_count > 0) {
      const n = pred.anomaly_baseline.anomaly_count;
      pillsHtml += makePill('⚠', n, ` anomal${n === 1 ? 'y' : 'ies'}`, 'red', 'predictive');
      topAlert = pred.anomaly_baseline.anomalies?.[0]?.alert || '';
    }

    // ── HIGH risk failures pill (predictive) ──
    if (pred?.next_failure_dates?.high_risk > 0) {
      const n = pred.next_failure_dates.high_risk;
      pillsHtml += makePill('🔴', n, ` failure${n === 1 ? '' : 's'} overdue`, 'red', 'predictive');
    }

    // ── Prescriptive summary pill ──
    if (presc?.action_plan?.summary) {
      pillsHtml += makePill('⚡', 'AI plan ready', '', 'green', 'prescriptive');
      if (!topAlert) topAlert = presc.action_plan.summary;
    }

    pills.innerHTML = pillsHtml || '<span class="cmd-pill grey">Loading summary...</span>';

    if (topAlert) {
      alert.textContent = '⚡ ' + topAlert;
      alert.classList.remove('hidden');
    } else {
      alert.classList.add('hidden');
    }
  }

  // ── Kick off on page load ─────────────────────────────────────────────────
  // Runs automatically — no button click needed
  window.addEventListener('DOMContentLoaded', async () => {
    // C4: restore identity from auth session on new device
    if (!WORKER_NAME) { WORKER_NAME = await restoreIdentityFromSession(db); }
    if (!WORKER_NAME) { window.location.href = 'index.html?signin=1'; return; }
    // Set default role based on HIVE_ROLE
    setRole(_role);
    autoLoad();

    // Refresh status bar every minute so "Updated X min ago" stays current
    const _statusBarTimer = setInterval(() => updateStatusBar(_phase), 60000);
  });
</script>

<script src="nav-hub.js"></script>
</body>
